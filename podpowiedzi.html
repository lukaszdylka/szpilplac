<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Podpowiedzi · Szpilplac · Familock</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;600;800&display=swap&subset=latin,latin-ext" rel="stylesheet">
<style>
:root{
  --bg:#f0e8d4;--surface:#fbf7ee;--surface2:#f3ecda;
  --ink:#23201a;--ink2:#6a6150;--line:#c9bfa6;
  --green:#2f4a39;--gold:#bf8a3a;--correct:#3f8a5a;
  --c0:#3f8a5a;--c1:#bf8a3a;--c2:#5a7ab8;--c3:#9a5a3a;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#161310;--surface:#262018;--surface2:#2e2820;
  --ink:#ede5d0;--ink2:#9a907a;--line:#3d3629;
  --green:#4a7a56;--gold:#d4a04a;--correct:#4a9a6a;
  --c0:#4a9a6a;--c1:#c49050;--c2:#6a8ac8;--c3:#aa6a4a;
}}
[data-theme=light]{--bg:#f0e8d4;--surface:#fbf7ee;--surface2:#f3ecda;--ink:#23201a;--ink2:#6a6150;--line:#c9bfa6;}
[data-theme=dark]{--bg:#161310;--surface:#262018;--surface2:#2e2820;--ink:#ede5d0;--ink2:#9a907a;--line:#3d3629;}
*{box-sizing:border-box;transition:background-color .2s,color .2s}
html,body{margin:0;min-height:100%}
body{font-family:"Inter",system-ui,sans-serif;color:var(--ink);background:var(--bg);
  -webkit-font-smoothing:antialiased;display:flex;flex-direction:column;
  align-items:center;padding:0 16px 40px}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

header{width:100%;max-width:560px;padding-top:16px}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.back{font-size:12px;font-weight:600;color:var(--green)}
.back:hover{text-decoration:underline}
.icon-btn{width:32px;height:32px;border-radius:999px;border:1px solid var(--line);
  background:var(--surface2);display:flex;align-items:center;justify-content:center;color:var(--ink2)}
.icon-btn:hover{background:var(--surface);color:var(--ink)}
h1{font-family:"Oswald";font-size:clamp(26px,8vw,36px);text-transform:uppercase;
  letter-spacing:.02em;margin:0 0 4px;color:var(--ink)}
.subtitle{font-size:12.5px;color:var(--ink2);margin-bottom:22px}

main{width:100%;max-width:560px}

/* ZAKŁADKI GRY */
.game-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.game-tab{padding:8px 18px;border-radius:999px;border:1px solid var(--line);
  background:var(--surface2);font-size:13px;font-weight:700;color:var(--ink2)}
.game-tab.on{background:var(--green);color:#fff;border-color:var(--green)}
.game-section{display:none}
.game-section.on{display:block}

/* FILTRY */
.filter-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filter-row input{flex:1;min-width:160px;padding:8px 12px;border-radius:9px;
  border:1px solid var(--line);background:var(--surface);font-size:13px;
  font-family:inherit;color:var(--ink)}
.filter-row input:focus{outline:3px solid var(--gold);outline-offset:2px}
.filter-row input::placeholder{color:var(--ink2)}
.btn-expand{font-size:12px;font-weight:700;color:var(--green);padding:6px 12px;
  border-radius:9px;border:1px solid var(--line);background:var(--surface2)}
.btn-expand:hover{background:var(--surface)}

/* LISTA DNI */
.days-list{display:flex;flex-direction:column;gap:8px}

.day-card{background:var(--surface);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.day-header{display:flex;align-items:center;gap:12px;padding:12px 15px;cursor:pointer;
  user-select:none}
.day-header:hover{background:var(--surface2)}
.day-date{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:var(--ink2);min-width:90px}
.day-title{font-family:"Oswald";font-size:17px;text-transform:uppercase;
  letter-spacing:.03em;flex:1;color:var(--ink)}
.day-no{font-size:11px;color:var(--ink2);font-weight:600}
.day-arrow{font-size:12px;color:var(--ink2);transition:transform .2s;flex:none}
.day-card.open .day-arrow{transform:rotate(90deg)}
.day-body{display:none;padding:0 15px 14px;border-top:1px solid var(--line)}
.day-card.open .day-body{display:block}

/* TREŚĆ PODPOWIEDZI */
.hint-block{margin-top:12px}
.hint-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;
  font-weight:700;color:var(--ink2);margin-bottom:5px}
.hint-text{font-size:14px;color:var(--ink);line-height:1.55}
.hint-text b{color:var(--green)}

/* Sekcje podpowiedzi w kartach */
.hints-grid{display:grid;gap:10px;margin-top:10px}
.hint-item{background:var(--surface2);border-radius:9px;padding:10px 13px;
  border-left:3px solid var(--gold)}
.hint-item.spoiler-hidden{border-left-color:var(--line);cursor:pointer}
.hint-item.spoiler-hidden .hint-text{filter:blur(4px);user-select:none;transition:filter .2s}
.hint-item.spoiler-hidden:hover .hint-text{filter:blur(2px)}
.hint-item.spoiler-hidden.revealed .hint-text{filter:none}
.hint-item.spoiler-hidden.revealed{border-left-color:var(--gold);cursor:default}
.spoiler-note{font-size:10.5px;color:var(--ink2);margin-top:4px;display:none}
.hint-item.spoiler-hidden .spoiler-note{display:block}
.hint-item.spoiler-hidden.revealed .spoiler-note{display:none}

/* Kolory Cuzamen */
.cat-pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;
  font-weight:700;color:#fff;margin-right:4px;margin-bottom:3px}
.cat-0{background:var(--c0)}
.cat-1{background:var(--c1)}
.cat-2{background:var(--c2)}
.cat-3{background:var(--c3)}

.empty-msg{text-align:center;padding:30px;color:var(--ink2);font-size:13px}

footer{width:100%;max-width:560px;text-align:center;color:var(--ink2);
  font-size:11.5px;margin-top:20px}
footer a{color:var(--green);font-weight:600}
footer a:hover{text-decoration:underline}
</style>
</head>
<body>
<header>
  <div class="topbar">
    <a class="back" href="index.html">← Szpilplac</a>
    <button class="icon-btn" id="themeBtn">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="8" cy="8" r="3.5"/><line x1="8" y1=".5" x2="8" y2="2.5"/><line x1="8" y1="13.5" x2="8" y2="15.5"/><line x1=".5" y1="8" x2="2.5" y2="8"/><line x1="13.5" y1="8" x2="15.5" y2="8"/><line x1="2.57" y1="2.57" x2="3.99" y2="3.99"/><line x1="12.01" y1="12.01" x2="13.43" y2="13.43"/><line x1="13.43" y1="2.57" x2="12.01" y2="3.99"/><line x1="3.99" y1="12.01" x2="2.57" y2="13.43"/></svg>
    </button>
  </div>
  <h1>Podpowiedzi</h1>
  <div class="subtitle">Kliknij dzień żeby rozwinąć. Spoilery ukryte — kliknij żeby odkryć.</div>
</header>

<main>
  <div class="game-tabs">
    <button class="game-tab on" data-game="slowko">Słōwko</button>
    <button class="game-tab" data-game="klodka">Kłōdka</button>
    <button class="game-tab" data-game="cuzamen">Cuzamen Szpil</button>
  </div>

  <!-- ═══ SŁŌWKO ═══════════════════════════════════════════════════ -->
  <div class="game-section on" id="sec-slowko">
    <div class="filter-row">
      <input type="search" id="filterSlowko" placeholder="Szukaj dnia lub słowa…">
      <button class="btn-expand" id="expandSlowko">Rozwiń wszystkie</button>
    </div>
    <div class="days-list" id="listSlowko"></div>
  </div>

  <!-- ═══ KŁŌDKA ═══════════════════════════════════════════════════ -->
  <div class="game-section" id="sec-klodka">
    <div class="filter-row">
      <input type="search" id="filterKlodka" placeholder="Szukaj dnia…">
      <button class="btn-expand" id="expandKlodka">Rozwiń wszystkie</button>
    </div>
    <div class="days-list" id="listKlodka"></div>
  </div>

  <!-- ═══ CUZAMEN SZPIL ═════════════════════════════════════════════ -->
  <div class="game-section" id="sec-cuzamen">
    <div class="filter-row">
      <input type="search" id="filterCuzamen" placeholder="Szukaj dnia lub słowa…">
      <button class="btn-expand" id="expandCuzamen">Rozwiń wszystkie</button>
    </div>
    <div class="days-list" id="listCuzamen"></div>
  </div>
</main>

<footer>
  <a href="https://www.familock.pl" target="_blank" rel="noopener">familock.pl</a> ·
  escape room <b>Starzik</b>, Świyntochłowice
</footer>

<script>
"use strict";
var TK="szpilplac_theme";
var store=(function(){var m={},ok=false;
  try{localStorage.setItem("__t","1");localStorage.removeItem("__t");ok=true;}catch(e){}
  return{get:function(k){if(!ok)return m[k]||null;try{return localStorage.getItem(k);}catch(e){return m[k]||null;}},
         set:function(k,v){if(!ok){m[k]=v;return;}try{localStorage.setItem(k,v);}catch(e){m[k]=v;}}};})();

/* ── MOTYW ── */
var TSVG={
  system:'<svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="8" cy="8" r="6.5"/><line x1="8" y1="1.5" x2="8" y2="14.5"/><path d="M8 1.5a6.5 6.5 0 010 13z" fill="currentColor" stroke="none"/></svg>',
  light:'<svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="8" cy="8" r="3.5"/><line x1="8" y1=".5" x2="8" y2="2.5"/><line x1="8" y1="13.5" x2="8" y2="15.5"/><line x1=".5" y1="8" x2="2.5" y2="8"/><line x1="13.5" y1="8" x2="15.5" y2="8"/><line x1="2.57" y1="2.57" x2="3.99" y2="3.99"/><line x1="12.01" y1="12.01" x2="13.43" y2="13.43"/><line x1="13.43" y1="2.57" x2="12.01" y2="3.99"/><line x1="3.99" y1="12.01" x2="2.57" y2="13.43"/></svg>',
  dark:'<svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor"><path d="M13.5 10.5a5.5 5.5 0 01-7.07-7.07A6 6 0 1013.5 10.5z"/></svg>'
};
var THEMES=["system","light","dark"],theme=store.get(TK)||"system";
function applyTheme(){
  if(theme==="system")document.documentElement.removeAttribute("data-theme");
  else document.documentElement.setAttribute("data-theme",theme);
  document.getElementById("themeBtn").innerHTML=TSVG[theme];
}
document.getElementById("themeBtn").addEventListener("click",function(){
  theme=THEMES[(THEMES.indexOf(theme)+1)%THEMES.length];store.set(TK,theme);applyTheme();
});
applyTheme();

/* ── DANE ───────────────────────────────────────────────────────────
   Edytuj poniższe tablice. Każdy dzień to obiekt:

   SŁŌWKO:
   { date:"2026-06-23", no:1, hints:["wskazówka 1","wskazówka 2"], spoiler:"SŁOWO" }

   KŁŌDKA:
   { date:"2026-06-23", no:1, hints:["wskazówka 1"], spoiler:"1234" }

   CUZAMEN SZPIL:
   { date:"2026-06-23", no:1, hints:[
       { color:0, label:"Jedzenie",          clue:"wszystkie to produkty śląskiej kuchni" },
       { color:1, label:"Mieszkanie/familok", clue:"znajdziesz je w każdej kawalerce" },
       { color:2, label:"Kolory kart",        clue:"kolory w talii kart do gry" },
       { color:3, label:"Kolej i transport",  clue:"coś wspólnego z podróżą koleją" }
     ], spoiler:["WUSZT KOLOCZ WODZIONKA KRUPNIOK","SZRANK BIFYJ ANTRYJ IZBA","HERC GRIN KROJC SZEL","CUG BANA GLAJZA BANHOF"]
   }
   ─────────────────────────────────────────────────────────────────── */

var DATA = {

  slowko: [
    {
      date: "2026-06-23",
      no: 1,
      hints: [
        "To śląskie słowo oznacza coś, bez czego nie da się zrobić kawy.",
        "Znajdziesz je w każdym śląskim domu, często na ławie w kuchni.",
        "Zaczyna się na K, ma 5 liter."
      ],
      spoiler: "KAFYJ"
    }
    /* ── dopisuj kolejne dni tutaj, np.:
    {
      date: "2026-06-24",
      no: 2,
      hints: ["Wskazówka 1", "Wskazówka 2"],
      spoiler: "SŁOWO"
    },
    ── */
  ],

  klodka: [
    /* ── przykładowy format:
    {
      date: "2026-06-23",
      no: 1,
      hints: [
        "Pierwsza cyfra to liczba liter w słowie FAMILOK.",
        "Dwie środkowe cyfry to rok urodzenia Starzika (ostatnie dwie).",
        "Ostatnia cyfra to liczba escape roomów w Familocku."
      ],
      spoiler: "7231"
    },
    ── */
  ],

  cuzamen: [
    {
      date: "2026-06-23",
      no: 1,
      hints: [
        { color:0, label:"Jedzenie",             clue:"Cztery rzeczy, które możesz zjeść na śląskim stole." },
        { color:1, label:"Mieszkanie / familok",  clue:"Cztery słowa związane z wnętrzem domu lub kamienicy." },
        { color:2, label:"Kolory kart do gry",    clue:"Kolory w talii — po śląsku, nie po polsku." },
        { color:3, label:"Kolej i transport",     clue:"Cztery słowa, które usłyszysz na dworcu lub w pociągu. To najtrudniejsza grupa." }
      ],
      spoiler: [
        "🟩 WUSZT · KOLOCZ · WODZIONKA · KRUPNIOK",
        "🟨 SZRANK · BIFYJ · ANTRYJ · IZBA",
        "🟦 HERC · GRIN · KROJC · SZEL",
        "🟫 CUG · BANA · GLAJZA · BANHOF"
      ]
    }
    /* ── dopisuj kolejne zestawy tutaj ── */
  ]

};

/* ── HELPERS ── */
var EPOCH = new Date(2026,5,23);
function fmtDate(str){
  var d=new Date(str+"T00:00:00");
  return d.toLocaleDateString("pl-PL",{weekday:"short",day:"numeric",month:"long",year:"numeric"});
}
function escH(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

/* ── RENDER ── */
function renderSlowko(filter){
  var list=document.getElementById("listSlowko");
  var items=DATA.slowko.filter(function(d){
    if(!filter)return true;
    var f=filter.toLowerCase();
    return d.date.includes(f)||String(d.no).includes(f)||(d.spoiler||"").toLowerCase().includes(f)||
      (d.hints||[]).some(function(h){return h.toLowerCase().includes(f);});
  });
  if(!items.length){list.innerHTML='<div class="empty-msg">Brak wyników.</div>';return;}
  list.innerHTML=items.map(function(d){
    var hintsHtml=d.hints.map(function(h,i){
      return'<div class="hint-item"><div class="hint-label">Wskazówka '+(i+1)+'</div>'+
        '<div class="hint-text">'+escH(h)+'</div></div>';
    }).join("");
    var spoilerHtml=d.spoiler?
      '<div class="hint-item spoiler-hidden" data-spoiler="'+escH(d.spoiler)+'">'+
        '<div class="hint-label">Odpowiedź (spoiler)</div>'+
        '<div class="hint-text">'+escH(d.spoiler)+'</div>'+
        '<div class="spoiler-note">Kliknij żeby odkryć</div></div>':'';
    return'<div class="day-card" data-no="'+d.no+'">'+
      '<div class="day-header">'+
        '<span class="day-date">'+fmtDate(d.date)+'</span>'+
        '<span class="day-title">Słōwko #'+d.no+'</span>'+
        '<span class="day-arrow">›</span>'+
      '</div>'+
      '<div class="day-body"><div class="hints-grid">'+hintsHtml+spoilerHtml+'</div></div></div>';
  }).join("");
  bindCards(list);
}

function renderKlodka(filter){
  var list=document.getElementById("listKlodka");
  var items=DATA.klodka.filter(function(d){
    if(!filter)return true;
    var f=filter.toLowerCase();
    return d.date.includes(f)||String(d.no).includes(f)||
      (d.hints||[]).some(function(h){return h.toLowerCase().includes(f);});
  });
  if(!items.length){
    list.innerHTML='<div class="empty-msg">Kłōdka jeszcze nie aktywna — podpowiedzi pojawią się tutaj po uruchomieniu gry.</div>';
    return;
  }
  list.innerHTML=items.map(function(d){
    var hintsHtml=d.hints.map(function(h,i){
      return'<div class="hint-item"><div class="hint-label">Wskazówka '+(i+1)+'</div>'+
        '<div class="hint-text">'+escH(h)+'</div></div>';
    }).join("");
    var spoilerHtml=d.spoiler?
      '<div class="hint-item spoiler-hidden" data-spoiler="'+escH(d.spoiler)+'">'+
        '<div class="hint-label">Kod (spoiler)</div>'+
        '<div class="hint-text">'+escH(d.spoiler)+'</div>'+
        '<div class="spoiler-note">Kliknij żeby odkryć</div></div>':'';
    return'<div class="day-card" data-no="'+d.no+'">'+
      '<div class="day-header">'+
        '<span class="day-date">'+fmtDate(d.date)+'</span>'+
        '<span class="day-title">Kłōdka #'+d.no+'</span>'+
        '<span class="day-arrow">›</span>'+
      '</div>'+
      '<div class="day-body"><div class="hints-grid">'+hintsHtml+spoilerHtml+'</div></div></div>';
  }).join("");
  bindCards(list);
}

function renderCuzamen(filter){
  var list=document.getElementById("listCuzamen");
  var items=DATA.cuzamen.filter(function(d){
    if(!filter)return true;
    var f=filter.toLowerCase();
    return d.date.includes(f)||String(d.no).includes(f)||
      (d.hints||[]).some(function(h){return h.label.toLowerCase().includes(f)||h.clue.toLowerCase().includes(f);});
  });
  if(!items.length){list.innerHTML='<div class="empty-msg">Brak wyników.</div>';return;}
  list.innerHTML=items.map(function(d){
    var catHints=d.hints.map(function(h){
      return'<div class="hint-item">'+
        '<div class="hint-label"><span class="cat-pill cat-'+h.color+'">'+escH(h.label)+'</span></div>'+
        '<div class="hint-text">'+escH(h.clue)+'</div></div>';
    }).join("");
    var spoilerRows=(d.spoiler||[]).map(function(row){return escH(row);}).join("<br>");
    var spoilerHtml=spoilerRows?
      '<div class="hint-item spoiler-hidden">'+
        '<div class="hint-label">Rozwiązanie (spoiler)</div>'+
        '<div class="hint-text">'+spoilerRows+'</div>'+
        '<div class="spoiler-note">Kliknij żeby odkryć</div></div>':'';
    return'<div class="day-card" data-no="'+d.no+'">'+
      '<div class="day-header">'+
        '<span class="day-date">'+fmtDate(d.date)+'</span>'+
        '<span class="day-title">Cuzamen Szpil #'+d.no+'</span>'+
        '<span class="day-arrow">›</span>'+
      '</div>'+
      '<div class="day-body"><div class="hints-grid">'+catHints+spoilerHtml+'</div></div></div>';
  }).join("");
  bindCards(list);
}

/* ── INTERAKCJE ── */
function bindCards(container){
  // rozwijanie kart
  container.querySelectorAll(".day-header").forEach(function(hdr){
    hdr.addEventListener("click",function(){
      hdr.closest(".day-card").classList.toggle("open");
    });
  });
  // odkrywanie spoilerów
  container.querySelectorAll(".hint-item.spoiler-hidden").forEach(function(el){
    el.addEventListener("click",function(){el.classList.add("revealed");});
  });
}

function expandAll(listId){
  document.querySelectorAll("#"+listId+" .day-card").forEach(function(c){c.classList.add("open");});
}

/* ── FILTRY ── */
var filterTimers={};
function setupFilter(inputId,renderFn){
  document.getElementById(inputId).addEventListener("input",function(){
    var v=this.value;clearTimeout(filterTimers[inputId]);
    filterTimers[inputId]=setTimeout(function(){renderFn(v);},200);
  });
}
setupFilter("filterSlowko", function(v){renderSlowko(v);});
setupFilter("filterKlodka", function(v){renderKlodka(v);});
setupFilter("filterCuzamen",function(v){renderCuzamen(v);});

document.getElementById("expandSlowko").addEventListener("click",function(){expandAll("listSlowko");});
document.getElementById("expandKlodka").addEventListener("click",function(){expandAll("listKlodka");});
document.getElementById("expandCuzamen").addEventListener("click",function(){expandAll("listCuzamen");});

/* ── ZAKŁADKI ── */
document.querySelectorAll(".game-tab").forEach(function(btn){
  btn.addEventListener("click",function(){
    document.querySelectorAll(".game-tab").forEach(function(b){b.classList.remove("on");});
    document.querySelectorAll(".game-section").forEach(function(s){s.classList.remove("on");});
    btn.classList.add("on");
    document.getElementById("sec-"+btn.dataset.game).classList.add("on");
  });
});

/* ── INIT ── */
renderSlowko();
renderKlodka();
renderCuzamen();
</script>
</body>
</html>
