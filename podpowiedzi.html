<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Podpowiedzi · Szpilplac</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;600;800&display=swap&subset=latin,latin-ext" rel="stylesheet">
<style>
:root{
  --bg:#f0e8d4;--surface:#fbf7ee;--surface2:#f3ecda;
  --ink:#23201a;--ink2:#6a6150;--line:#c9bfa6;
  --green:#2f4a39;--gold:#bf8a3a;--correct:#3f8a5a;--red:#b84040;
  --c0:#3f8a5a;--c1:#bf8a3a;--c2:#5a7ab8;--c3:#9a5a3a;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#161310;--surface:#262018;--surface2:#2e2820;
  --ink:#ede5d0;--ink2:#9a907a;--line:#3d3629;
  --green:#4a7a56;--gold:#d4a04a;--correct:#4a9a6a;
  --c0:#4a9a6a;--c1:#c49050;--c2:#6a8ac8;--c3:#aa6a4a;
}}
[data-theme=light]{--bg:#f0e8d4;--surface:#fbf7ee;--surface2:#f3ecda;--ink:#23201a;--ink2:#6a6150;--line:#c9bfa6;}
[data-theme=dark]{--bg:#161310;--surface:#262018;--surface2:#2e2820;--ink:#ede5d0;--ink2:#9a907a;--line:#3d3629;}
*{box-sizing:border-box;transition:background-color .2s,color .2s}
html,body{margin:0;min-height:100%}
body{font-family:"Inter",system-ui,sans-serif;color:var(--ink);background:var(--bg);
  -webkit-font-smoothing:antialiased;display:flex;flex-direction:column;align-items:center;padding:0 16px 40px}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;box-sizing:border-box}
.admin-only{display:none}
.is-admin .admin-only{display:inline-flex}
/* HEADER */
header{width:100%;max-width:680px;padding-top:16px}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.back{font-size:12px;font-weight:600;color:var(--green)}
.back:hover{text-decoration:underline}
.topbar-right{display:flex;gap:8px;align-items:center}
.icon-btn{width:32px;height:32px;border-radius:999px;border:1px solid var(--line);
  background:var(--surface2);display:flex;align-items:center;justify-content:center;color:var(--ink2)}
.icon-btn:hover{background:var(--surface);color:var(--ink)}
h1{font-family:"Oswald";font-size:clamp(24px,7vw,34px);text-transform:uppercase;
  letter-spacing:.02em;margin:0 0 4px}
.subtitle{font-size:12.5px;color:var(--ink2);margin-bottom:16px}

/* ADMIN BADGE */
.admin-bar{display:none;align-items:center;gap:10px;padding:8px 14px;
  background:var(--surface);border:1px solid var(--gold);border-radius:10px;
  margin-bottom:14px;font-size:13px}
.admin-bar.on{display:flex}
.admin-badge{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
  background:var(--gold);color:#fff;padding:3px 8px;border-radius:999px}
.admin-bar .logout-small{font-size:12px;font-weight:700;color:var(--ink2);margin-left:auto;
  padding:4px 10px;border-radius:999px;border:1px solid var(--line);background:var(--surface2)}
.admin-bar .logout-small:hover{color:var(--ink);background:var(--surface)}

/* LOGIN PANEL */
.login-panel{background:var(--surface);border:1px solid var(--line);border-radius:12px;
  padding:16px;margin-bottom:16px;display:none}
.login-panel.open{display:block}
.login-panel h3{font-family:"Oswald";font-size:16px;text-transform:uppercase;margin:0 0 10px}
.login-row{display:flex;gap:8px}
.login-row input{flex:1;padding:9px 12px;border-radius:8px;border:1px solid var(--line);
  background:var(--surface2);font-size:13px;color:var(--ink)}
.login-row input:focus{outline:3px solid var(--gold);outline-offset:2px}
.btn-primary{padding:9px 18px;border-radius:8px;background:var(--green);color:#fff;
  font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:.04em}
.btn-primary:hover{filter:brightness(1.08)}
.login-err{font-size:12px;color:var(--red);margin-top:6px;display:none}

/* ZAKŁADKI */
main{width:100%;max-width:680px}
.game-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.game-tab{padding:8px 18px;border-radius:999px;border:1px solid var(--line);
  background:var(--surface2);font-size:13px;font-weight:700;color:var(--ink2)}
.game-tab.on{background:var(--green);color:#fff;border-color:var(--green)}
.game-section{display:none}
.game-section.on{display:block}

/* TOOLBAR */
.toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.toolbar input[type=search]{flex:1;min-width:150px;padding:8px 12px;border-radius:9px;
  border:1px solid var(--line);background:var(--surface);font-size:13px;color:var(--ink)}
.toolbar input:focus{outline:3px solid var(--gold);outline-offset:2px}
.btn-ghost{padding:7px 14px;border-radius:9px;border:1px solid var(--line);
  background:var(--surface2);font-size:12px;font-weight:700;color:var(--ink2)}
.btn-ghost:hover{background:var(--surface);color:var(--ink)}
.btn-add{padding:7px 14px;border-radius:9px;border:1px solid var(--green);
  background:var(--green);font-size:12px;font-weight:700;color:#fff}
.btn-add:hover{filter:brightness(1.08)}

/* KARTY DNI */
.days-list{display:flex;flex-direction:column;gap:8px}
.day-card{background:var(--surface);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.day-header{display:flex;align-items:center;gap:10px;padding:12px 15px;cursor:pointer;user-select:none}
.day-header:hover{background:var(--surface2)}
.day-date{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--ink2);min-width:88px}
.day-title{font-family:"Oswald";font-size:17px;text-transform:uppercase;letter-spacing:.03em;flex:1;color:var(--ink)}
.day-arrow{font-size:12px;color:var(--ink2);transition:transform .2s;flex:none}
.day-card.open .day-arrow{transform:rotate(90deg)}
.day-actions{display:flex;gap:6px;flex:none}
.btn-edit{font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;
  border:1px solid var(--gold);color:var(--gold);display:none}
.btn-edit:hover{background:var(--surface2)}
.is-admin .btn-edit{display:block}
.btn-del{font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;
  border:1px solid var(--red);color:var(--red);display:none}
.btn-del:hover{background:#fff0f0}
.is-admin .btn-del{display:block}

.day-body{display:none;padding:0 15px 14px;border-top:1px solid var(--line)}
.day-card.open .day-body{display:block}

/* PODPOWIEDZI — widok */
.hints-grid{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.hint-item{background:var(--surface2);border-radius:9px;padding:10px 13px;border-left:3px solid var(--gold)}
.hint-item.spoiler-hidden{border-left-color:var(--line);cursor:pointer}
.hint-item.spoiler-hidden .hint-content{filter:blur(4px);user-select:none;transition:filter .2s}
.hint-item.spoiler-hidden:hover .hint-content{filter:blur(2px)}
.hint-item.spoiler-hidden.revealed .hint-content{filter:none}
.hint-item.spoiler-hidden.revealed{border-left-color:var(--gold);cursor:default}
.spoiler-note{font-size:10.5px;color:var(--ink2);margin-top:4px;display:none}
.hint-item.spoiler-hidden .spoiler-note{display:block}
.hint-item.spoiler-hidden.revealed .spoiler-note{display:none}
.hint-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;color:var(--ink2);margin-bottom:4px}
.hint-content{font-size:14px;color:var(--ink);line-height:1.55}
.hint-content img{max-width:100%;border-radius:8px;margin-top:6px}
.hint-content svg{max-width:100%}
.cat-pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:700;color:#fff;margin-right:4px}
.cat-0{background:var(--c0)}.cat-1{background:var(--c1)}.cat-2{background:var(--c2)}.cat-3{background:var(--c3)}
.notes-box{margin-top:10px;padding:8px 12px;background:#fff8e1;border-radius:8px;
  font-size:12px;color:#7a6020;border:1px solid #e8d080;display:none}
.is-admin .notes-box{display:block}

/* EDYTOR */
.editor-panel{background:var(--surface);border:1px dashed var(--gold);border-radius:12px;
  padding:18px;margin-bottom:16px;display:none}
.editor-panel.open{display:block}
.editor-panel h3{font-family:"Oswald";font-size:16px;text-transform:uppercase;margin:0 0 14px;color:var(--ink)}
.form-row{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.form-col{display:flex;flex-direction:column;gap:4px;flex:1;min-width:140px}
.form-col label{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink2)}
.form-col input,.form-col select,.form-col textarea{padding:9px 11px;border-radius:8px;
  border:1px solid var(--line);background:var(--surface2);font-size:13px;color:var(--ink);width:100%}
.form-col input:focus,.form-col select:focus,.form-col textarea:focus{outline:3px solid var(--gold);outline-offset:2px}
.form-col textarea{resize:vertical;min-height:80px;font-size:13px;line-height:1.45}
.hints-editor{margin-bottom:14px}
.hints-editor h4{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:var(--ink2);margin:0 0 8px}
.hint-editor-row{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start}
.hint-editor-row textarea{flex:1;padding:8px 10px;border-radius:8px;border:1px solid var(--line);
  background:var(--surface2);font-size:13px;color:var(--ink);resize:vertical;min-height:60px}
.hint-editor-row textarea:focus{outline:3px solid var(--gold);outline-offset:2px}
.btn-remove-hint{width:28px;height:28px;border-radius:999px;border:1px solid var(--red);
  color:var(--red);font-size:16px;display:flex;align-items:center;justify-content:center;flex:none;margin-top:4px}
.btn-remove-hint:hover{background:#fff0f0}
.btn-add-hint{font-size:12px;font-weight:700;color:var(--green);padding:5px 12px;
  border-radius:8px;border:1px solid var(--green);margin-bottom:14px}
.btn-add-hint:hover{background:var(--surface2)}
.editor-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn-save{padding:10px 22px;border-radius:9px;background:var(--correct);color:#fff;
  font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:.04em}
.btn-save:hover{filter:brightness(1.08)}
.btn-save:disabled{opacity:.5;cursor:default;filter:none}
.btn-cancel{padding:10px 16px;border-radius:9px;border:1px solid var(--line);
  background:var(--surface2);font-size:13px;font-weight:700;color:var(--ink2)}
.btn-cancel:hover{background:var(--surface)}
.save-msg{font-size:12px;font-weight:700;color:var(--correct);display:none}
.save-err{font-size:12px;font-weight:700;color:var(--red);display:none}

/* UPLOAD */
.upload-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.upload-row input[type=file]{font-size:12px;color:var(--ink2)}
.upload-preview{max-width:120px;max-height:80px;border-radius:6px;display:none;margin-top:4px}
.upload-url{font-size:11px;color:var(--green);margin-top:4px;word-break:break-all;display:none}

.empty-msg{text-align:center;padding:30px;color:var(--ink2);font-size:13px}
.spinner{text-align:center;padding:20px;color:var(--ink2);font-size:13px}

/* podgląd słów dnia */
.words-card{background:var(--surface);border:1px solid var(--gold);border-radius:12px;
  padding:16px 18px;margin-bottom:14px;display:none}
.words-card.open{display:block}
.words-card h3{font-family:"Oswald";font-size:15px;text-transform:uppercase;
  letter-spacing:.06em;margin:0 0 12px;color:var(--gold)}
.words-row{display:flex;gap:10px;flex-wrap:wrap}
.word-tile{flex:1;min-width:130px;background:var(--surface2);border:1px solid var(--line);
  border-radius:9px;padding:11px 14px}
.word-tile .wt-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--ink2);margin-bottom:3px;font-weight:700}
.word-tile .wt-word{font-family:"Oswald";font-size:24px;color:var(--correct);letter-spacing:.06em}
.word-tile.tomorrow .wt-word{color:var(--gold)}
.word-tile .wt-meaning{font-size:12px;color:var(--ink2);margin-top:2px}
.btn-words{padding:5px 12px;border-radius:999px;border:1px solid var(--gold);
  background:transparent;font-size:12px;font-weight:700;color:var(--gold);display:none}
.btn-words:hover{background:var(--surface2)}
.is-admin .btn-words{display:inline-block}

footer{width:100%;max-width:680px;text-align:center;color:var(--ink2);font-size:11.5px;margin-top:20px}
footer a{color:var(--green);font-weight:600}
footer a:hover{text-decoration:underline}
.words-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
.words-head h3{margin:0}
#daysAhead{font-family:inherit;font-size:12px;padding:5px 8px;border-radius:8px;
  border:1px solid var(--line);background:var(--surface2);color:var(--ink)}
.words-row{display:block}
.day-row{display:grid;grid-template-columns:118px 1fr 64px;gap:10px;align-items:center;
  padding:7px 4px;border-bottom:1px solid var(--line)}
.day-row:last-child{border-bottom:none}
.day-row.dr-header{font-size:10px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--ink2);font-weight:700;border-bottom:1px solid var(--line)}
.dr-when{display:flex;flex-direction:column;line-height:1.25}
.dr-no{font-family:"Oswald";font-size:15px;color:var(--green)}
.dr-date{font-size:11px;color:var(--ink2)}
.dr-now{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;
  color:#fff;background:var(--gold);border-radius:999px;padding:1px 6px;width:max-content;margin-top:2px}
.dr-mid{display:flex;flex-direction:column;line-height:1.25;min-width:0}
.dr-word{font-family:"Oswald";font-size:17px;color:var(--ink);letter-spacing:.02em}
.dr-mean{font-size:11.5px;color:var(--ink2)}
.dr-code{font-family:"Oswald";font-size:20px;letter-spacing:.12em;color:var(--gold);text-align:right}
.dr-code b{font-weight:inherit}
.dr-dim{color:var(--ink2);opacity:.5}
</style>
</head>
<body>
<header>
  <div class="topbar">
    <a class="back" href="index.html">← Szpilplac</a>
    <div class="topbar-right">
      <button class="icon-btn" id="themeBtn"></button>
      <button class="icon-btn" id="adminLoginBtn" title="Zaloguj jako admin" style="font-size:11px;font-weight:700;width:auto;padding:0 10px;color:var(--gold);border-color:var(--gold)">Admin</button>
    </div>
  </div>
  <h1>Podpowiedzi</h1>
  <div class="subtitle">Kliknij dzień żeby rozwinąć. Spoilery ukryte — kliknij żeby odkryć.</div>

  <div class="admin-bar" id="adminBar">
    <span class="admin-badge">Admin</span>
    <span style="font-size:13px;color:var(--ink2)">Tryb edycji aktywny</span>
    <button class="btn-words" id="wordsBtn">🔮 Słowa i kody dni</button>
    <button class="logout-small" id="adminLogoutBtn">Wyloguj</button>
  </div>
  <div class="words-card" id="wordsCard">
    <div class="words-head">
      <h3>Podgląd dni</h3>
      <select id="daysAhead">
        <option value="7">7 dni</option>
        <option value="14" selected>14 dni</option>
        <option value="30">30 dni</option>
      </select>
    </div>
    <div class="words-row" id="wordsRow"><div class="spinner" style="padding:8px">Pobieram…</div></div>
  </div>

  <div class="login-panel" id="loginPanel">
    <h3>Logowanie admina</h3>
    <div class="login-row">
      <input type="password" id="adminKeyInput" placeholder="Service role key">
      <button class="btn-primary" id="adminLoginSubmit">Zaloguj</button>
    </div>
    <div class="login-err" id="loginErr">Nieprawidłowy klucz.</div>
  </div>
</header>

<main>
  <div class="game-tabs">
    <button class="game-tab on" data-game="slowko">Słōwko</button>
  </div>

  <a class="btn-ghost admin-only" href="podpowiedzi_klodka_tygodniowki.html">
  Kłōdka — tygodniówki
</a>

  <div class="editor-panel" id="editorPanel"></div>

  <div class="game-section on" id="sec-slowko">
    <div class="toolbar">
      <input type="search" id="filterSlowko" placeholder="Szukaj…">
      <button class="btn-ghost" id="expandSlowko">Rozwiń wszystkie</button>
      <button class="btn-add admin-only" id="addSlowko" style="display:none">+ Dodaj dzień</button>
    </div>
    <div class="days-list" id="listSlowko"><div class="spinner">Ładuję…</div></div>
  </div>
</main>

<footer>
  <a href="https://www.familock.pl" target="_blank" rel="noopener">familock.pl</a> ·
  escape room <b>Starzik</b>, Świyntochłowice
</footer>

<script>
"use strict";
var SUPABASE_URL = "https://xyivrakegwybwhmmcawq.supabase.co";
var SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5aXZyYWtlZ3d5YndobW1jYXdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1OTkxMjYsImV4cCI6MjA5MjE3NTEyNn0.68zlOkL7AOtX6qEukCpEV6R0rpo0bQ1dG9U7pPhVGvo";
var ADMIN_KEY_LS = "szpilplac_admin_key";
var TK = "szpilplac_theme";

/* ── STORE ── */
var store=(function(){var m={},ok=false;
  try{localStorage.setItem("__t","1");localStorage.removeItem("__t");ok=true;}catch(e){}
  return{get:function(k){if(!ok)return m[k]||null;try{return localStorage.getItem(k);}catch(e){return m[k]||null;}},
         set:function(k,v){if(!ok){m[k]=v;return;}try{localStorage.setItem(k,v);}catch(e){m[k]=v;}},
         del:function(k){try{localStorage.removeItem(k);}catch(e){delete m[k];}}};})();

/* ── MOTYW ── */
var TSVG={
  system:'<svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="8" cy="8" r="6.5"/><line x1="8" y1="1.5" x2="8" y2="14.5"/><path d="M8 1.5a6.5 6.5 0 010 13z" fill="currentColor" stroke="none"/></svg>',
  light:'<svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="8" cy="8" r="3.5"/><line x1="8" y1=".5" x2="8" y2="2.5"/><line x1="8" y1="13.5" x2="8" y2="15.5"/><line x1=".5" y1="8" x2="2.5" y2="8"/><line x1="13.5" y1="8" x2="15.5" y2="8"/><line x1="2.57" y1="2.57" x2="3.99" y2="3.99"/><line x1="12.01" y1="12.01" x2="13.43" y2="13.43"/><line x1="13.43" y1="2.57" x2="12.01" y2="3.99"/><line x1="3.99" y1="12.01" x2="2.57" y2="13.43"/></svg>',
  dark:'<svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor"><path d="M13.5 10.5a5.5 5.5 0 01-7.07-7.07A6 6 0 1013.5 10.5z"/></svg>'
};
var THEMES=["system","light","dark"],theme=store.get(TK)||"system";
function applyTheme(){
  if(theme==="system")document.documentElement.removeAttribute("data-theme");
  else document.documentElement.setAttribute("data-theme",theme);
  document.getElementById("themeBtn").innerHTML=TSVG[theme];
}
document.getElementById("themeBtn").addEventListener("click",function(){
  theme=THEMES[(THEMES.indexOf(theme)+1)%THEMES.length];store.set(TK,theme);applyTheme();
});
applyTheme();

/* ── ADMIN AUTH ── */
var adminKey = store.get(ADMIN_KEY_LS) || "";
var isAdmin = false;

function setAdmin(key){
  adminKey=key; isAdmin=true; store.set(ADMIN_KEY_LS,key);
  document.body.classList.add("is-admin");
  document.getElementById("adminBar").classList.add("on");
  document.getElementById("adminLoginBtn").style.display="none";
  document.getElementById("loginPanel").classList.remove("open");
  document.querySelectorAll(".admin-only").forEach(function(el){el.style.display="";});
}
function clearAdmin(){
  adminKey=""; isAdmin=false; store.del(ADMIN_KEY_LS);
  document.body.classList.remove("is-admin");
  document.getElementById("adminBar").classList.remove("on");
  document.getElementById("adminLoginBtn").style.display="";
  document.querySelectorAll(".admin-only").forEach(function(el){el.style.display="none";});
}

document.getElementById("adminLoginBtn").addEventListener("click",function(){
  document.getElementById("loginPanel").classList.toggle("open");
});
document.getElementById("adminLoginSubmit").addEventListener("click",function(){
  var v=document.getElementById("adminKeyInput").value.trim();
  if(!v)return;
  // Weryfikacja: próbuj pobrać jeden rekord z tabeli przez ten klucz
  fetch(SUPABASE_URL+"/rest/v1/szpilplac_hints?limit=1",{
    headers:{"apikey":v,"Authorization":"Bearer "+v}
  }).then(function(r){
    if(r.ok){setAdmin(v);document.getElementById("loginErr").style.display="none";loadAll();}
    else{document.getElementById("loginErr").style.display="block";}
  }).catch(function(){document.getElementById("loginErr").style.display="block";});
});
document.getElementById("adminKeyInput").addEventListener("keydown",function(e){
  if(e.key==="Enter")document.getElementById("adminLoginSubmit").click();
});
document.getElementById("adminLogoutBtn").addEventListener("click",function(){clearAdmin();loadAll();});

// Auto-login jeśli klucz zapisany
if(adminKey){
  fetch(SUPABASE_URL+"/rest/v1/szpilplac_hints?limit=1",{
    headers:{"apikey":adminKey,"Authorization":"Bearer "+adminKey}
  }).then(function(r){if(r.ok)setAdmin(adminKey);else store.del(ADMIN_KEY_LS);}).catch(function(){});
}

/* ── API ── */
function apiKey(){return isAdmin?adminKey:SUPABASE_ANON;}

function apiFetch(path,opts){
  var key=apiKey();
  var headers=Object.assign({"apikey":key,"Authorization":"Bearer "+key},opts&&opts.headers||{});
  return fetch(SUPABASE_URL+path,Object.assign({},opts,{headers:headers}))
    .then(function(r){
      if(!r.ok)return r.text().then(function(t){throw new Error(t||r.status);});
      if(r.status===204)return null;
      return r.json();
    });
}

function loadHints(game){
  var filter=isAdmin?"game=eq."+game:"game=eq."+game+"&published=eq.true";
  return apiFetch("/rest/v1/szpilplac_hints?"+filter+"&order=puzzle_no.asc");
}

function saveHint(data,id){
  if(id){
    return apiFetch("/rest/v1/szpilplac_hints?id=eq."+id,{
      method:"PATCH",
      headers:{"Content-Type":"application/json","Prefer":"return=representation"},
      body:JSON.stringify(data)
    });
  } else {
    return apiFetch("/rest/v1/szpilplac_hints",{
      method:"POST",
      headers:{"Content-Type":"application/json","Prefer":"return=representation"},
      body:JSON.stringify(data)
    });
  }
}

function deleteHint(id){
  return apiFetch("/rest/v1/szpilplac_hints?id=eq."+id,{method:"DELETE"});
}

/* ── STORAGE UPLOAD ── */
function uploadFile(file,onDone){
  var ext=file.name.split(".").pop().toLowerCase();
  var fname=Date.now()+"-"+Math.random().toString(36).slice(2)+"."+ext;
  var key=apiKey();
  fetch(SUPABASE_URL+"/storage/v1/object/hints-media/"+fname,{
    method:"POST",
    headers:{"apikey":key,"Authorization":"Bearer "+key,"Content-Type":file.type},
    body:file
  }).then(function(r){
    if(!r.ok)throw new Error("Upload failed");
    var url=SUPABASE_URL+"/storage/v1/object/public/hints-media/"+fname;
    onDone(url);
  }).catch(function(e){alert("Błąd uploadu: "+e.message);});
}

/* ── RENDER WIDOK ── */
function escH(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function fmtDate(str){
  try{var d=new Date(str+"T12:00:00");
    return d.toLocaleDateString("pl-PL",{weekday:"short",day:"numeric",month:"long",year:"numeric"});}
  catch(e){return str;}
}

function renderHintItem(h,idx,isSpoiler,label,colorCls){
  var content=h; // może być HTML
  var labelHtml=colorCls
    ?'<div class="hint-label"><span class="cat-pill '+colorCls+'">'+escH(label)+'</span></div>'
    :'<div class="hint-label">'+(label||("Wskazówka "+(idx+1)))+'</div>';
  if(isSpoiler){
    return'<div class="hint-item spoiler-hidden">'+labelHtml+
      '<div class="hint-content">'+content+'</div>'+
      '<div class="spoiler-note">Kliknij żeby odkryć</div></div>';
  }
  return'<div class="hint-item">'+labelHtml+'<div class="hint-content">'+content+'</div></div>';
}

function renderDayCard(d,game){
  var hints=Array.isArray(d.hints)?d.hints:[];
  var hintsHtml="";

  if(game==="cuzamen"){
    hintsHtml=hints.map(function(h,i){
      var colorCls="cat-"+(h.color!==undefined?h.color:i);
      return renderHintItem(h.clue||h,i,false,h.label||("Grupa "+(i+1)),colorCls);
    }).join("");
  } else {
    hintsHtml=hints.map(function(h,i){
      return renderHintItem(typeof h==="string"?h:(h.text||""),i,false,null,null);
    }).join("");
  }

  // spoiler
  var spoilerHtml="";
  if(d.spoiler){
    var sc=Array.isArray(d.spoiler)?d.spoiler.join("<br>"):String(d.spoiler);
    spoilerHtml=renderHintItem(sc,0,true,"Odpowiedź / Rozwiązanie",null);
  }

  var notesHtml=d.notes?'<div class="notes-box">📝 '+escH(d.notes)+'</div>':"";
  var unpubHtml=(!d.published&&isAdmin)?'<span style="font-size:10px;color:var(--red);font-weight:700;margin-left:6px">UKRYTE</span>':"";
  var schedHtml=(isAdmin&&d.publish_at&&new Date(d.publish_at)>new Date())?
    '<span style="font-size:10px;color:var(--gold);font-weight:700;margin-left:6px">⏱ '+
    new Date(d.publish_at).toLocaleString("pl-PL",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"})+
    '</span>':"";

  return'<div class="day-card" data-id="'+d.id+'" data-game="'+game+'">'+
    '<div class="day-header">'+
      '<span class="day-date">'+fmtDate(d.puzzle_date)+'</span>'+
      '<span class="day-title">#'+d.puzzle_no+unpubHtml+schedHtml+'</span>'+
      '<div class="day-actions">'+
        '<button class="btn-edit">Edytuj</button>'+
        '<button class="btn-del">Usuń</button>'+
      '</div>'+
      '<span class="day-arrow">›</span>'+
    '</div>'+
    '<div class="day-body">'+
      '<div class="hints-grid">'+hintsHtml+spoilerHtml+'</div>'+
      notesHtml+
    '</div></div>';
}

function renderList(listId,data,game,filter){
  var el=document.getElementById(listId);
  var items=filter?data.filter(function(d){
    var f=filter.toLowerCase();
    return String(d.puzzle_no).includes(f)||
      (d.puzzle_date||"").includes(f)||
      JSON.stringify(d.hints||"").toLowerCase().includes(f)||
      JSON.stringify(d.spoiler||"").toLowerCase().includes(f);
  }):data;

  if(!items||!items.length){
    el.innerHTML='<div class="empty-msg">Brak podpowiedzi'+(game==="klodka"?" — Kłōdka jeszcze nie aktywna.":".")+'</div>';
    return;
  }
  el.innerHTML=items.map(function(d){return renderDayCard(d,game);}).join("");
  bindCards(el,game);
}

/* ── INTERAKCJE KART ── */
function bindCards(container,game){
  container.querySelectorAll(".day-header").forEach(function(hdr){
    hdr.addEventListener("click",function(e){
      if(e.target.closest(".day-actions"))return;
      hdr.closest(".day-card").classList.toggle("open");
    });
  });
  container.querySelectorAll(".hint-item.spoiler-hidden").forEach(function(el){
    el.addEventListener("click",function(){el.classList.add("revealed");});
  });
  container.querySelectorAll(".btn-edit").forEach(function(btn){
    btn.addEventListener("click",function(){
      var card=btn.closest(".day-card");
      var id=card.dataset.id;
      var rec=allData[game]&&allData[game].find(function(d){return d.id===id;});
      if(rec)openEditor(rec,game);
    });
  });
  container.querySelectorAll(".btn-del").forEach(function(btn){
    btn.addEventListener("click",function(){
      var card=btn.closest(".day-card");
      if(!confirm("Usunąć tę podpowiedź?"))return;
      deleteHint(card.dataset.id).then(function(){loadGame(game);}).catch(function(e){alert("Błąd: "+e.message);});
    });
  });
}

/* ── DANE ── */
var allData={slowko:[],klodka:[],cuzamen:[]};
var currentGame="slowko";

function loadGame(game){
  var listMap={slowko:"listSlowko",klodka:"listKlodka",cuzamen:"listCuzamen"};
  var el=document.getElementById(listMap[game]);
  el.innerHTML='<div class="spinner">Ładuję…</div>';
  loadHints(game).then(function(data){
    allData[game]=data||[];
    var filter=document.getElementById("filter"+capitalize(game)).value;
    renderList(listMap[game],allData[game],game,filter);
  }).catch(function(e){
    el.innerHTML='<div class="empty-msg" style="color:var(--red)">Błąd: '+escH(e.message)+'</div>';
  });
}
function loadAll(){loadGame("slowko");}
function capitalize(s){return s.charAt(0).toUpperCase()+s.slice(1);}

/* ── FILTRY ── */
var ft={};
["Slowko"].forEach(function(g){
  var gl=g.toLowerCase();
  document.getElementById("filter"+g).addEventListener("input",function(){
    var v=this.value; clearTimeout(ft[gl]);
    ft[gl]=setTimeout(function(){
      renderList("list"+g,allData[gl],gl,v);},200);
  });
  document.getElementById("expand"+g).addEventListener("click",function(){
    document.querySelectorAll("#list"+g+" .day-card").forEach(function(c){c.classList.add("open");});
  });
});
document.getElementById("addSlowko").addEventListener("click",function(){openEditor(null,"slowko");});

/* ── ZAKŁADKI ── */
document.querySelectorAll(".game-tab").forEach(function(btn){
  btn.addEventListener("click",function(){
    document.querySelectorAll(".game-tab").forEach(function(b){b.classList.remove("on");});
    document.querySelectorAll(".game-section").forEach(function(s){s.classList.remove("on");});
    btn.classList.add("on");
    currentGame=btn.dataset.game;
    document.getElementById("sec-"+currentGame).classList.add("on");

});

/* ── EDYTOR ── */
var editingId=null,editingGame=null;

function openEditor(rec,game){
  editingId=rec?rec.id:null;
  editingGame=game;
  var panel=document.getElementById("editorPanel");
  panel.classList.add("open");

  var hints=rec&&Array.isArray(rec.hints)?rec.hints:[""];
  var spoiler=rec&&rec.spoiler?(Array.isArray(rec.spoiler)?rec.spoiler.join("\n"):rec.spoiler):"";
  var isCuz=game==="cuzamen";

  // Buduj pola wskazówek
  function hintRow(val,i){
    var txt=isCuz?(val&&val.clue?val.clue:(typeof val==="string"?val:"")):(typeof val==="string"?val:(val&&val.text?val.text:""));
    var labelVal=isCuz&&val&&val.label?val.label:"";
    var colorVal=isCuz&&val&&val.color!==undefined?val.color:i;
    return'<div class="hint-editor-row" data-idx="'+i+'">'+
      (isCuz?'<div style="display:flex;flex-direction:column;gap:4px;flex:0 0 120px">'+
        '<input type="text" class="hint-label-inp" placeholder="Etykieta grupy" value="'+escH(labelVal)+'">'+
        '<select class="hint-color-sel">'+
          [0,1,2,3].map(function(c){return'<option value="'+c+'"'+(c==colorVal?" selected":"")+'>'+(["🟩 Łatwa","🟨 Średnia","🟦 Trudna","🟫 Pułapka"][c])+'</option>';}).join("")+
        '</select></div>':'')+ 
      '<textarea class="hint-text-inp" placeholder="Treść wskazówki (HTML dozwolony: &lt;b&gt;, &lt;img&gt;, &lt;svg&gt;...)" rows="3">'+escH(txt)+'</textarea>'+
      '<button class="btn-remove-hint" title="Usuń">×</button>'+
    '</div>';
  }

  panel.innerHTML=
    '<h3>'+(rec?"Edytuj":"Nowy dzień")+'</h3>'+
    '<div class="form-row">'+
      '<div class="form-col"><label>Gra</label>'+
        '<select id="eGame">'+
          ['slowko'].map(function(g){
            return'<option value="'+g+'"'+(g===game?" selected":"")+'>'+(g==="slowko"?"Słōwko":g==="klodka"?"Kłōdka":"Cuzamen Szpil")+'</option>';
          }).join("")+
        '</select></div>'+
      '<div class="form-col"><label>Numer dnia</label>'+
        '<input type="number" id="eNo" min="1" value="'+(rec?rec.puzzle_no:"")+'"></div>'+
      '<div class="form-col"><label>Data</label>'+
        '<input type="date" id="eDate" value="'+(rec?rec.puzzle_date:"")+'"></div>'+
    '</div>'+
    '<div class="form-row">'+
      '<div class="form-col" style="min-width:80px"><label>Opublikuj</label>'+
        '<select id="ePub"><option value="true"'+((!rec||rec.published)?" selected":"")+'">Tak</option>'+
          '<option value="false"'+((rec&&!rec.published)?" selected":"")+'">Nie (ukryte)</option></select></div>'+
      '<div class="form-col"><label>⏱ Pokaż od (data i godzina)</label>'+
        '<input type="datetime-local" id="ePublishAt" value="'+(rec&&rec.publish_at?rec.publish_at.slice(0,16):"")+'">'+
        '<small style="color:var(--ink2);font-size:11px;margin-top:3px">Puste = natychmiast po opublikowaniu</small></div>'+
    '</div>'+
    '<div class="hints-editor">'+
      '<h4>Wskazówki</h4>'+
      '<div id="hintsRows">'+hints.map(hintRow).join("")+'</div>'+
      '<button class="btn-add-hint" id="addHintRow">+ Dodaj wskazówkę</button>'+
    '</div>'+
    '<div class="form-col" style="margin-bottom:14px"><label>Odpowiedź / Spoiler (każda linia = osobny wiersz)</label>'+
      '<textarea id="eSpoiler" rows="3">'+escH(spoiler)+'</textarea></div>'+
    // Upload zdjęcia
    (isAdmin?'<div class="form-col" style="margin-bottom:14px"><label>Wgraj zdjęcie / SVG do podpowiedzi</label>'+
      '<div class="upload-row"><input type="file" id="eFile" accept="image/*,.svg">'+
      '<button class="btn-ghost" id="eUploadBtn">Wgraj</button></div>'+
      '<img id="ePreview" class="upload-preview">'+
      '<div id="eUploadUrl" class="upload-url"></div></div>':'')+
    '<div class="form-col" style="margin-bottom:14px"><label>Notatki prywatne (widoczne tylko dla admina)</label>'+
      '<textarea id="eNotes" rows="2">'+escH(rec?rec.notes||"":"")+'</textarea></div>'+
    '<div class="editor-actions">'+
      '<button class="btn-save" id="eSave">Zapisz</button>'+
      '<button class="btn-cancel" id="eCancel">Anuluj</button>'+
      '<span class="save-msg" id="saveMsg">✓ Zapisano!</span>'+
      '<span class="save-err" id="saveErr"></span>'+
    '</div>';

  // Usuń wskazówkę
  panel.addEventListener("click",function(e){
    if(e.target.classList.contains("btn-remove-hint")){
      var row=e.target.closest(".hint-editor-row");
      if(panel.querySelectorAll(".hint-editor-row").length>1)row.remove();
    }
  });

  // Dodaj wskazówkę
  document.getElementById("addHintRow").addEventListener("click",function(){
    var rows=document.getElementById("hintsRows");
    var idx=rows.querySelectorAll(".hint-editor-row").length;
    var tmp=document.createElement("div");
    tmp.innerHTML=hintRow("",idx);
    rows.appendChild(tmp.firstChild);
  });

  // Upload
  if(isAdmin){
    document.getElementById("eUploadBtn").addEventListener("click",function(){
      var f=document.getElementById("eFile").files[0];
      if(!f)return;
      uploadFile(f,function(url){
        var prev=document.getElementById("ePreview");
        var urlEl=document.getElementById("eUploadUrl");
        prev.src=url;prev.style.display="block";
        urlEl.style.display="block";
        urlEl.innerHTML='<b>URL:</b> '+url+'<br>'+
          '<small>Wklej do wskazówki: <code>&lt;img src="'+url+'"&gt;</code></small>';
      });
    });
  }

  // Zapisz
  document.getElementById("eSave").addEventListener("click",function(){
    var btn=document.getElementById("eSave");
    btn.disabled=true;
    var gameVal=document.getElementById("eGame").value;
    var noVal=parseInt(document.getElementById("eNo").value,10);
    var dateVal=document.getElementById("eDate").value;
    var pubVal=document.getElementById("ePub").value==="true";
    var publishAtRaw=document.getElementById("ePublishAt").value;
    // datetime-local daje czas lokalny — interpretujemy jako Europe/Warsaw
    var publishAtVal=publishAtRaw?new Date(publishAtRaw).toISOString():null;
    var notesVal=document.getElementById("eNotes").value.trim();
    var spoilerRaw=document.getElementById("eSpoiler").value.trim();
    var spoilerVal=spoilerRaw?spoilerRaw.split("\n").map(function(s){return s.trim();}).filter(Boolean):null;
    if(spoilerVal&&spoilerVal.length===1)spoilerVal=spoilerVal[0];

    var isCuzamen=gameVal==="cuzamen";
    var hintRows=document.querySelectorAll("#hintsRows .hint-editor-row");
    var hintsVal=Array.from(hintRows).map(function(row){
      var txt=row.querySelector(".hint-text-inp").value;
      if(isCuzamen){
        return{
          label:row.querySelector(".hint-label-inp")?row.querySelector(".hint-label-inp").value:"",
          color:parseInt(row.querySelector(".hint-color-sel").value,10),
          clue:txt
        };
      }
      return txt;
    });

    if(!noVal||!dateVal){
      document.getElementById("saveErr").textContent="Wypełnij numer dnia i datę.";
      document.getElementById("saveErr").style.display="block";
      btn.disabled=false;return;
    }

    var payload={game:gameVal,puzzle_no:noVal,puzzle_date:dateVal,
      hints:hintsVal,spoiler:spoilerVal||null,
      notes:notesVal||null,published:pubVal,
      publish_at:publishAtVal};

    saveHint(payload,editingId).then(function(){
      document.getElementById("saveMsg").style.display="inline";
      document.getElementById("saveErr").style.display="none";
      setTimeout(function(){
        document.getElementById("saveMsg").style.display="none";
        closeEditor();loadGame(gameVal);
      },1000);
    }).catch(function(e){
      document.getElementById("saveErr").textContent="Błąd: "+e.message;
      document.getElementById("saveErr").style.display="block";
      btn.disabled=false;
    });
  });

  document.getElementById("eCancel").addEventListener("click",closeEditor);
  panel.scrollIntoView({behavior:"smooth",block:"start"});
}

function closeEditor(){
  document.getElementById("editorPanel").classList.remove("open");
  document.getElementById("editorPanel").innerHTML="";
  editingId=null;editingGame=null;
}

/* ── SŁOWA DNIA (admin) ── */
function loadWords(){
  var row=document.getElementById("wordsRow");
  row.innerHTML='<div class="spinner" style="padding:8px">Pobieram…</div>';
  var epoch=new Date(2026,5,23);
  var now=new Date();
  var today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  var todayIdx=Math.floor((today-epoch)/86400000);
  var sel=document.getElementById("daysAhead");
  var n=(sel&&parseInt(sel.value,10))||14;
  function rpcAdmin(fn,args){
    return fetch(SUPABASE_URL+"/rest/v1/rpc/"+fn,{method:"POST",
      headers:{"Content-Type":"application/json","apikey":adminKey,
               "Authorization":"Bearer "+adminKey},
      body:JSON.stringify(args||{})
    }).then(function(r){if(!r.ok)throw new Error(r.status);return r.json();});
  }
  var dows=["niedz","pon","wt","śr","czw","pt","sob"];
  function fmtDate(d){return dows[d.getDay()]+" "+("0"+d.getDate()).slice(-2)+"."+("0"+(d.getMonth()+1)).slice(-2);}
  var tasks=[];
  for(var i=0;i<n;i++){
    (function(off){
      var sIdx=todayIdx+off;        // Słōwko: numeracja 0-based
      var kIdx=todayIdx+off+1;      // Kłōdka: numeracja 1-based
      var d=new Date(today); d.setDate(today.getDate()+off);
      tasks.push(Promise.all([
        rpcAdmin("wihajster_reveal_day",{p_day:sIdx}).catch(function(){return{word:null,meaning:null};}),
        rpcAdmin("klodka_reveal",{p_mode:"daily",p_idx:kIdx}).catch(function(){return null;})
      ]).then(function(r){
        var code=(typeof r[1]==="string"?r[1]:(r[1]&&r[1].klodka_reveal)||null);
        return {idx:kIdx, date:fmtDate(d),
                word:(r[0]&&r[0].word)||"–", meaning:(r[0]&&r[0].meaning)||"",
                code:code};
      }));
    })(i);
  }
  Promise.all(tasks).then(function(days){
    row.innerHTML=
      '<div class="day-row dr-header"><div class="dr-when">Dzień</div><div class="dr-mid">Słōwko</div><div class="dr-code">Kłōdka</div></div>'+
      days.map(function(x,i){
        return '<div class="day-row">'+
          '<div class="dr-when"><span class="dr-no">#'+x.idx+'</span><span class="dr-date">'+x.date+'</span>'+
            (i===0?'<span class="dr-now">dziś</span>':'')+'</div>'+
          '<div class="dr-mid"><span class="dr-word">'+escH(x.word)+'</span>'+
            (x.meaning?'<span class="dr-mean">'+escH(x.meaning)+'</span>':'')+'</div>'+
          '<div class="dr-code">'+(x.code?'<b>'+escH(x.code)+'</b>':'<span class="dr-dim">—</span>')+'</div>'+
        '</div>';
      }).join("");
  }).catch(function(e){
    row.innerHTML='<p style="color:var(--red);padding:4px;font-size:13px">Błąd: '+e.message+'</p>';
  });
}

var wordsVisible=false;
document.getElementById("wordsBtn").addEventListener("click",function(){
  var card=document.getElementById("wordsCard");
  wordsVisible=!wordsVisible;
  if(wordsVisible){card.classList.add("open");loadWords();}
  else{card.classList.remove("open");}
});
document.getElementById("daysAhead").addEventListener("change",function(){
  if(wordsVisible) loadWords();
});

/* ── INIT ── */
loadAll();
