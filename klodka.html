<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kłōdka · Szpilplac · Familock</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="description" content="Codziennie nowy 4-cyfrowy kod do kłódki — zgadnij go w 6 próbach. Gra od Familocka Starzik.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;600;800&display=swap&subset=latin,latin-ext" rel="stylesheet">

<!-- ════════════════════════════════════════════════════════════════════
     ZAGADKA TYGODNIA  (easter egg — tu wpisujesz trop do kodu tygodniówki)
     ────────────────────────────────────────────────────────────────────
     Tydzień: 1   (23–29.06.2026)
     Widoczny trop i trop z konsoli pobierają się z Supabase: kodka_weekly_hints.
     Nie wpisuj podpowiedzi luzem w <head>, bo wtedy może wyświetlić się na samej górze strony.

     Kod tygodnia ustawiasz osobno w bazie (Supabase → SQL Editor).
     ════════════════════════════════════════════════════════════════════ -->

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f0e8d4;--surface:#fbf7ee;--surface2:#f3ecda;
  --ink:#23201a;--ink2:#6a6150;--line:#c9bfa6;
  --green:#2f4a39;--gold:#bf8a3a;
}
[data-theme=light]{--bg:#f0e8d4;--surface:#fbf7ee;--surface2:#f3ecda;--ink:#23201a;--ink2:#6a6150;--line:#c9bfa6;--green:#2f4a39;--gold:#bf8a3a;--correct:#3f8a5a;--present:#bf8a3a;--absent:#736d5f;--wrong:#a14b3a}
[data-theme=dark]{--bg:#161310;--surface:#262018;--surface2:#2e2820;--ink:#ede5d0;--ink2:#9a907a;--line:#3d3629;--green:#4a7a56;--gold:#d4a04a;--correct:#4a9a6a;--present:#c49050;--absent:#5a5448;--wrong:#c06a55}

body{font-family:"Inter",system-ui,sans-serif;background:var(--bg);color:var(--ink);
  min-height:100dvh;display:flex;flex-direction:column;align-items:center;
  transition:background .2s,color .2s}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{color:inherit;text-decoration:none}
:focus-visible{outline:3px solid var(--gold);outline-offset:2px;border-radius:6px}

header{width:100%;max-width:480px;padding:14px 18px 4px}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px}
.back{font-size:12px;font-weight:600;color:var(--green);display:inline-flex;align-items:center;gap:4px}
.controls{display:flex;align-items:center;gap:7px}
.lang-tog{display:flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:var(--surface2)}
.lang-tog button{font-size:11px;font-weight:700;padding:5px 9px;color:var(--ink2)}
.lang-tog button.on{background:var(--green);color:#fff}
.icon-btn{width:32px;height:32px;border-radius:999px;border:1px solid var(--line);
  background:var(--surface2);display:flex;align-items:center;justify-content:center;color:var(--ink2)}
.icon-btn:hover{background:var(--surface);color:var(--ink)}

/* NAWIGACJA DNI — archiwum jak w Słōwku */
.nav-bar{display:flex;align-items:center;gap:8px;margin-top:10px}
.nav-btn{width:28px;height:28px;border-radius:999px;border:1px solid var(--line);
  background:var(--surface2);display:flex;align-items:center;justify-content:center;
  color:var(--ink2);font-size:14px;flex:none}
.nav-btn:hover{background:var(--surface);color:var(--ink)}
.nav-btn:disabled{opacity:.3;cursor:default}
.nav-day{flex:1;text-align:center;font-size:12px;font-weight:700;color:var(--ink2)}
.nav-day .dayno{font-family:"Oswald";font-size:18px;color:var(--ink);letter-spacing:.02em}
.nav-cal{width:28px;height:28px;border-radius:999px;border:1px solid var(--line);
  background:var(--surface2);display:flex;align-items:center;justify-content:center;color:var(--ink2);flex:none}
.nav-cal:hover{background:var(--surface);color:var(--ink)}
.archive-badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:10px;
  font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:var(--gold);
  color:#fff;margin-left:6px}

main{width:100%;max-width:480px;padding:6px 18px 28px;flex:1;display:flex;flex-direction:column}

.title-row{display:flex;align-items:baseline;justify-content:space-between;margin:8px 2px 2px}
.title{font-family:"Oswald";font-size:30px;letter-spacing:.04em;text-transform:uppercase;line-height:1}
.pno{font-size:12px;color:var(--ink2);font-weight:700}
.tagline{font-size:12.5px;color:var(--ink2);margin:2px 2px 0}
.weekly-hint{display:none;margin:10px 0 8px;padding:11px 13px;border:1px solid var(--line);border-radius:12px;background:var(--surface2);font-size:13px;line-height:1.45;color:var(--ink);box-shadow:0 8px 22px -16px rgba(35,32,26,.55)}
.weekly-hint.on{display:block}
.weekly-hint .hint-kicker{display:block;margin-bottom:3px;font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--gold)}
.weekly-hint b{color:var(--green)}

.toast{min-height:22px;font-weight:700;font-size:13.5px;color:var(--green);
  text-align:center;margin:10px 0 2px;transition:opacity .2s}

/* ── PLANSZA ── */
.board{display:flex;flex-direction:column;gap:8px;align-items:center;margin:8px 0 4px}
.repeat-info{min-height:22px;text-align:center;font-size:12px;color:var(--ink2);font-weight:700;
  margin:2px 0 4px;letter-spacing:.02em}
.repeat-info b{color:var(--green)}
.row{display:flex;gap:8px}
.tile{width:54px;height:54px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-family:"Oswald";font-size:30px;color:var(--ink);
  background:var(--surface2);border:2px solid var(--line);transition:transform .08s}
.tile.filled{border-color:var(--ink2);animation:pop .1s}
.tile.correct{background:var(--correct);border-color:var(--correct);color:#fff}
.tile.present{background:var(--present);border-color:var(--present);color:#fff}
.tile.absent{background:var(--absent);border-color:var(--absent);color:#fff}
.tile.dir-higher,.tile.dir-lower{position:relative;overflow:hidden}
.tile.dir-higher::after,.tile.dir-lower::after{position:absolute;right:5px;bottom:3px;font-family:"Inter",system-ui,sans-serif;font-size:16px;font-weight:900;line-height:1;color:#fff;opacity:.98;text-shadow:0 1px 2px rgba(0,0,0,.35)}
.tile.dir-higher::after{content:"↑"}
.tile.dir-lower::after{content:"↓"}
.tile.wrong{background:var(--surface2);border-color:var(--wrong);color:var(--wrong)}
.tile.neutral{background:var(--surface2);border-color:var(--ink2);color:var(--ink)}
.tile.reveal{animation:flip .4s ease forwards}
.row.shake{animation:shake .35s}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.06)}100%{transform:scale(1)}}
@keyframes flip{0%{transform:rotateX(0)}50%{transform:rotateX(90deg)}100%{transform:rotateX(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

/* ── KLAWIATURA NUMERYCZNA ── */
.pad{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;max-width:300px;margin:14px auto 0;width:100%}
.key{height:54px;border-radius:11px;background:var(--surface2);border:1px solid var(--line);
  font-family:"Oswald";font-size:24px;color:var(--ink);display:flex;align-items:center;justify-content:center;
  transition:transform .06s,background .1s}
.key:active{transform:scale(.94)}
.key.wide{font-family:"Inter";font-size:14px;font-weight:800;letter-spacing:.02em}
.key.enter{background:var(--green);color:#fff;border-color:var(--green)}
.key.del{color:var(--ink2)}
.key.correct{background:var(--correct);border-color:var(--correct);color:#fff}
.key.present{background:var(--present);border-color:var(--present);color:#fff}
.key.absent{background:var(--absent);border-color:var(--absent);color:#fff}
.key[disabled]{opacity:.4}

/* ── KAFELEK TYGODNIÓWKI ── */
.weektile{display:flex;align-items:center;gap:13px;margin:20px 0 0;padding:14px 16px;
  background:var(--surface2);border:1px solid var(--line);border-radius:13px;width:100%;text-align:left;
  transition:transform .1s,box-shadow .1s}
.weektile:hover{transform:translateY(-1px);box-shadow:0 8px 20px -10px rgba(35,32,26,.35);background:var(--surface)}
.weektile .wt-ico{flex:none;width:42px;height:42px;border-radius:10px;border:1px solid var(--line);
  background:var(--bg);display:flex;align-items:center;justify-content:center;color:var(--green)}
.weektile .wt-ico svg{width:22px;height:22px;display:block}
.weektile .wt-body{flex:1;min-width:0}
.weektile .wt-name{font-family:"Oswald";font-size:17px;text-transform:uppercase;letter-spacing:.02em;line-height:1.05}
.weektile .wt-status{font-size:12px;color:var(--ink2);margin-top:3px}
.weektile .wt-arr{color:var(--ink2);font-size:15px;flex:none}
.badge{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;
  padding:2px 7px;border-radius:999px;margin-left:6px;vertical-align:middle}
.badge.new{background:var(--gold);color:#fff}
.badge.won{background:var(--correct);color:#fff}
.badge.lost{background:var(--wrong);color:#fff}
.badge.soon{background:var(--surface);color:var(--ink2);border:1px solid var(--line)}

/* KALENDARZ ARCHIWUM */
.cal-scrim{position:fixed;inset:0;z-index:60;display:none;
  align-items:flex-start;justify-content:center;padding-top:80px;background:rgba(20,16,10,.28)}
.cal-scrim.open{display:flex}
.cal-box{background:var(--surface);border:1px solid var(--line);border-radius:14px;
  padding:16px;box-shadow:0 16px 40px -12px rgba(0,0,0,.45);
  max-width:340px;width:calc(100vw - 32px)}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-head h3{font-family:"Oswald";text-transform:uppercase;font-size:17px;margin:0;color:var(--ink)}
.cal-head button{width:28px;height:28px;border-radius:999px;border:1px solid var(--line);
  background:var(--surface2);color:var(--ink2);font-size:14px;display:flex;align-items:center;justify-content:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center}
.cal-dow{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink2);
  padding:2px 0;font-weight:700}
.cal-day{aspect-ratio:1;border-radius:8px;font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid transparent;color:var(--ink2)}
.cal-day.empty{cursor:default}
.cal-day.today{border-color:var(--green);color:var(--ink);background:var(--surface2)}
.cal-day.active{box-shadow:0 0 0 2px var(--gold) inset;color:var(--ink)}
.cal-day.played{background:var(--gold);color:#fff;border-color:var(--gold)}
.cal-day.played.won{background:var(--correct);border-color:var(--correct)}
.cal-day.past:not(.played){border-color:var(--line);color:var(--ink2)}
.cal-day.past:not(.played):hover{background:var(--surface2);border-color:var(--ink2)}
.cal-day.future{opacity:.25;cursor:default}
.cal-nav{display:flex;justify-content:space-between;margin-top:10px}
.cal-nav button{font-size:12px;font-weight:600;color:var(--green);padding:4px 8px;
  border-radius:6px;border:1px solid var(--line);background:var(--surface2)}
.cal-nav button:disabled{opacity:.3;cursor:default}

.subback{font-size:12px;font-weight:600;color:var(--green);display:inline-flex;gap:5px;align-items:center;margin:2px 2px 0}

/* ── MODAL ── */
.scrim{position:fixed;inset:0;background:rgba(20,16,10,.55);display:none;align-items:center;justify-content:center;padding:18px;z-index:50}
.scrim.open{display:flex}
.modal{background:var(--surface);border-radius:14px;max-width:380px;width:100%;padding:22px 22px 20px;
  border:1px solid var(--line);position:relative;max-height:88vh;overflow-y:auto}
.modal-close{position:absolute;top:10px;right:12px;font-size:22px;color:var(--ink2);width:30px;height:30px}
.modal h2{font-family:"Oswald";font-size:22px;text-transform:uppercase;letter-spacing:.03em;text-align:center;margin-bottom:4px}
.reveal-card{text-align:center;margin:12px 0 16px;padding:14px;border-radius:10px;
  background:var(--surface2);border:1px dashed var(--line)}
.reveal-lbl{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink2);margin-bottom:6px}
.reveal-code{font-family:"Oswald";font-size:34px;letter-spacing:.22em;color:var(--green)}
.stats{display:flex;gap:8px;margin:6px 0 14px}
.stat{flex:1;text-align:center}
.stat .n{font-family:"Oswald";font-size:24px;color:var(--green)}
.stat .l{font-size:10.5px;color:var(--ink2);line-height:1.2;margin-top:2px}
.dist{margin:2px 0 14px}
.dist h3{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink2);margin:0 0 7px}
.bar-row{display:flex;align-items:center;gap:7px;font-size:12px;margin:3px 0}
.bar-i{width:12px;font-weight:800;color:var(--ink2);text-align:center}
.bar-wrap{flex:1;background:var(--surface2);border-radius:4px;overflow:hidden;border:1px solid rgba(0,0,0,.04)}
.bar{background:var(--absent);color:#fff;text-align:right;padding:3px 7px;font-weight:800;font-size:11px;min-width:24px;border-radius:4px}
.bar.win{background:var(--correct)}
.cd{text-align:center;font-size:13px;color:var(--ink2);margin:4px 0 14px}
.cd b{color:var(--ink);font-family:"Oswald";letter-spacing:.05em}
.btn{display:block;width:100%;padding:12px;border-radius:10px;background:var(--green);color:#fff;
  font-weight:700;font-size:14px;text-align:center;margin-top:8px}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink2)}
.btn.share{background:var(--gold);color:#fff;border:1px solid var(--gold)}
.share-msg{text-align:center;font-size:12px;font-weight:800;color:var(--correct);min-height:18px;margin-top:6px;opacity:0;transition:opacity .18s}
.share-msg.on{opacity:1;background:var(--surface2);border:1px solid var(--line);border-radius:8px;padding:8px 10px}
.cta{display:block;text-align:center;margin-top:12px;font-size:12.5px;color:var(--green);font-weight:600}

.howlist{font-size:13.5px;color:var(--ink2);line-height:1.6}
.howlist b{color:var(--ink)}
.swatch{display:inline-block;width:14px;height:14px;border-radius:3px;vertical-align:-2px;margin-right:5px}

/* USTAWIENIA */
.sett-row{display:flex;align-items:center;justify-content:space-between;gap:14px;
  padding:12px 0;border-bottom:1px solid var(--line)}
.sett-row:last-child{border-bottom:none;padding-bottom:0}
.sett-label{font-size:14px;color:var(--ink);font-weight:700}
.sett-sub{font-size:11.5px;color:var(--ink2);margin-top:2px;line-height:1.35}
.seg{display:flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:var(--surface2);flex:none}
.seg button{font-size:11px;font-weight:800;padding:6px 10px;color:var(--ink2);white-space:nowrap}
.seg button.on{background:var(--green);color:#fff}
.cb{--correct:#1a6fc4;--present:#e07b1a;--absent:#555}
[data-theme=dark].cb{--correct:#3a8fe4;--present:#f09030;--absent:#555}
.no-anim .tile.reveal,.no-anim .tile.filled,.no-anim .row.shake,.no-anim .key:active{animation:none!important;transition:none!important}

footer{width:100%;max-width:480px;text-align:center;color:var(--ink2);font-size:12px;margin:10px 0 18px;line-height:1.8}
footer a{color:var(--green);font-weight:600}

.hidden{display:none!important}
@media(prefers-reduced-motion:reduce){.tile.reveal,.tile.filled,.row.shake,.key:active{animation:none!important}}
</style>
</head>
<body>

<header>
  <div class="topbar">
    <a class="back" href="index.html">← Szpilplac</a>
    <div class="controls">
      <div class="lang-tog" role="group" aria-label="Język">
        <button id="lPl" class="on">PL</button>
        <button id="lSzl">ŚL</button>
      </div>
      <button class="icon-btn" id="themeBtn" title="Motyw" aria-label="Zmień motyw">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="8" cy="8" r="3.5"/><line x1="8" y1=".5" x2="8" y2="2.5"/><line x1="8" y1="13.5" x2="8" y2="15.5"/><line x1=".5" y1="8" x2="2.5" y2="8"/><line x1="13.5" y1="8" x2="15.5" y2="8"/><line x1="2.57" y1="2.57" x2="3.99" y2="3.99"/><line x1="12.01" y1="12.01" x2="13.43" y2="13.43"/><line x1="13.43" y1="2.57" x2="12.01" y2="3.99"/><line x1="3.99" y1="12.01" x2="2.57" y2="13.43"/></svg>
      </button>
      <button class="icon-btn" id="helpBtn" title="Jak grać" aria-label="Jak grać">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="8" cy="8" r="6.5"/><path d="M6 6.5a2 2 0 113 1.73c-.6.35-1 .97-1 1.77"/><circle cx="8" cy="12" r=".7" fill="currentColor" stroke="none"/></svg>
      </button>
      <button class="icon-btn" id="settBtn" title="Ustawienia" aria-label="Ustawienia">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9.4 4.01 8.51 1.25h6.98l-.89 2.76 1.21.51 1.32-2.59 4.94 4.94-2.59 1.32.51 1.21 2.76-.89v6.98l-2.76-.89-.51 1.21 2.59 1.32-4.94 4.94-1.32-2.59-1.21.51.89 2.76H8.51l.89-2.76-1.21-.51-1.32 2.59-4.94-4.94 2.59-1.32-.51-1.21-2.76.89V8.51l2.76.89.51-1.21-2.59-1.32 4.94-4.94 1.32 2.59z"/><circle cx="12" cy="12" r="4.4"/></svg>
      </button>
      <button class="icon-btn" id="statBtn" title="Statystyki" aria-label="Statystyki">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="9" width="3" height="6" rx=".8"/><rect x="6.5" y="5" width="3" height="10" rx=".8"/><rect x="12" y="2" width="3" height="13" rx=".8"/></svg>
      </button>
    </div>
  </div>

  <div class="nav-bar" id="navBar">
    <button class="nav-btn" id="prevBtn" title="Poprzedni dzień" aria-label="Poprzedni dzień" disabled>
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="10,3 5,8 10,13"/></svg>
    </button>
    <div class="nav-day">
      <div class="dayno" id="navDayNo"></div>
      <div id="navDayLabel"></div>
    </div>
    <button class="nav-btn" id="nextBtn" title="Następny dzień" aria-label="Następny dzień" disabled>
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6,3 11,8 6,13"/></svg>
    </button>
    <button class="nav-cal" id="calBtn" title="Kalendarz" aria-label="Kalendarz">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1.5" y="2.5" width="13" height="12" rx="2"/><line x1="1.5" y1="6" x2="14.5" y2="6"/><line x1="5" y1="1" x2="5" y2="4"/><line x1="11" y1="1" x2="11" y2="4"/></svg>
    </button>
  </div>
</header>

<main>
  <div class="title-row">
    <div class="title" id="title">Kłōdka</div>
    <div class="pno" id="pno"></div>
  </div>
  <div class="tagline" id="tagline"></div>

  <a class="subback hidden" id="subback">← <span>codzienna</span></a>

  <div class="toast" id="toast"></div>

  <div class="weekly-hint" id="weeklyHint" aria-live="polite"></div>

  <div class="board" id="board"></div>
  <div class="repeat-info" id="repeatInfo"></div>

  <div class="pad" id="pad"></div>

  <button class="weektile" id="weektile">
    <div class="wt-ico" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="8" cy="12" r="3.5"></circle>
        <path d="M11.5 12H21"></path>
        <path d="M18 12V9.5"></path>
        <path d="M15.5 12V10.5"></path>
      </svg>
    </div>

function rpc(fn,args){
  return fetch(SUPABASE_URL+"/rest/v1/rpc/"+fn,{method:"POST",
    headers:{"Content-Type":"application/json","Accept":"application/json",
             "apikey":SUPABASE_ANON_KEY,"Authorization":"Bearer "+SUPABASE_ANON_KEY},
    body:JSON.stringify(args||{})
  }).then(function(r){if(!r.ok)throw new Error(fn+" "+r.status);return r.json();});
}
function restGet(path){
  return fetch(SUPABASE_URL+path,{method:"GET",
    headers:{"Accept":"application/json","apikey":SUPABASE_ANON_KEY,"Authorization":"Bearer "+SUPABASE_ANON_KEY}
  }).then(function(r){if(!r.ok)throw new Error("GET "+path+" "+r.status);return r.json();});
}

             "Authorization":"Bearer "+SUPABASE_ANON_KEY,"Prefer":"return=minimal"},
    body:JSON.stringify(p)
  }).catch(function(){});
}

/* ── STAN GRY ─────────────────────────────────────────────────────── */
/* view: "daily" | "weekly" */
var view = "daily";
var game = null;       // {mode, idx, guesses:[{code,states?,correct}], status, reveal}
var current = "";      // wpisywane cyfry

function freshGame(mode, idx){ return {mode:mode, idx:idx, guesses:[], status:"playing", reveal:null}; }

function currentIdx(){return view==="daily"?DAY_NO:WEEK_NO;}
function dailyKey(dayNo){return DAILY_KEY+"_d"+dayNo;}
function weeklyKey(weekNo){return WEEK_KEY+"_w"+weekNo;}
function keyFor(mode,idx){return mode==="daily"?dailyKey(idx):weeklyKey(idx);}
function idFieldFor(mode){return mode==="daily"?"day":"week";}
function storeKey(){return keyFor(view,currentIdx());}
function histKey(mode){return (mode==="weekly"?WEEK_KEY:DAILY_KEY)+"__hist";}
function storeIdField(){return idFieldFor(view);}

function loadSavedGame(mode,idx){
  var saved=loadJSON(keyFor(mode,idx));
  // wsteczna zgodność ze starą wersją, która trzymała tylko bieżący dzień/tydzień
  if(!saved && mode==="daily" && idx===TODAY_NO) saved=loadJSON(DAILY_KEY);
  if(!saved && mode==="weekly" && idx===WEEK_NO) saved=loadJSON(WEEK_KEY);

  if(!saved) return null;

  // Aktualny format: {day/week: idx, game:{...}}
  if(saved.game){
    var savedIdx = saved[idFieldFor(mode)];
    if(savedIdx===idx || String(savedIdx)===String(idx)) return saved.game;
  }

  // Awaryjnie: starszy surowy zapis samej gry {status, guesses...}
  if(saved.status && saved.guesses) return saved;

  return null;
}

function saveGameFor(mode,idx,g){
  var o={}; o[idFieldFor(mode)] = idx; o.game = g;
  saveJSON(keyFor(mode,idx),o);

  // Dodatkowy zapis bieżącej gry pod starym kluczem — dla zgodności ze stroną główną i starszymi wersjami.
  if(mode==="daily" && idx===TODAY_NO) saveJSON(DAILY_KEY,o);
  if(mode==="weekly" && idx===WEEK_NO) saveJSON(WEEK_KEY,o);
}

function loadGame(){
  var idx=currentIdx();
  game = loadSavedGame(view,idx) || freshGame(view,idx);
  if(game && (game.status==="won" || game.status==="lost")){
    recordHistoryFor(view,idx,game.status==="won",(game.guesses||[]).length||MAX_TRIES);
  }
  loadCodeMeta();
}

function persist(){
  var idx=currentIdx(), mode=view;
  saveGameFor(mode,idx,game);

  // Gdy gra jest zakończona, od razu zapisz lokalne statystyki gracza.
  // Dzięki temu statystyki nie zależą od modala ani od pobrania kodu przez RPC reveal.
  if(game && (game.status==="won" || game.status==="lost")){
    recordHistoryFor(mode,idx,game.status==="won",(game.guesses||[]).length||MAX_TRIES);
  }
}

function sameView(mode,idx){return view===mode && currentIdx()===idx;}
function updateRevealInModal(code){var el=document.getElementById("revealCode"); if(el)el.textContent=code||"····";}

/* ── META KODU: informacja o powtórkach cyfr ─────────────────────── */
var codeMetaCache={};
function metaKey(mode,idx){return mode+":"+idx;}
function loadCodeMeta(){
  var idx=currentIdx(), key=metaKey(view,idx);
  if(repeatMode!=="on"||codeMetaCache[key]){updateRepeatInfo();return;}
  // RPC z Supabase zwraca faktyczną informację, czy w kodzie są powtórzone cyfry. Nie zwraca samego kodu.
  rpc("kodka_meta",{p_mode:view,p_idx:idx}).then(function(meta){
    codeMetaCache[key]=meta||{}; updateRepeatInfo();
  }).catch(function(){
    codeMetaCache[key]={has_repeat:null}; updateRepeatInfo();
  });
}
function updateRepeatInfo(){
  var el=document.getElementById("repeatInfo"); if(!el)return;
  if(repeatMode!=="on"||view!=="daily"){el.textContent="";el.style.display="none";return;}
  el.style.display="block";
  var meta=codeMetaCache[metaKey(view,currentIdx())]||{};
  if(meta.has_repeat===true) el.innerHTML=t().repeatYes;
  else if(meta.has_repeat===false) el.innerHTML=t().repeatNo;
  else el.innerHTML=t().repeatMaybe;
}

function applyDirectionHint(tile,g,c){
  if(dirMode!=="on"||view!=="daily"||!g||!g.states||g.states[c]!=="absent"||!g.directions)return;
  var dir=g.directions[c];
  if(dir==="higher") tile.classList.add("dir-higher");
  else if(dir==="lower") tile.classList.add("dir-lower");
}
function escHtml(x){
  return String(x).replace(/[&<>"']/g,function(ch){
    if(ch==="&")return "&amp;";
    if(ch==="<")return "&lt;";
    if(ch===">")return "&gt;";
    if(ch==='"')return "&quot;";
    if(ch==="'")return "&#39;";
    return ch;
  });
}
function activeWeeklyHint(){
  return weeklyHintData || WEEKLY_HINT_DEFAULTS;
}
function printWeeklyConsoleHint(force){
  var h=activeWeeklyHint();
  if(!force && weeklyConsolePrinted)return;
  if(!h.console_hint)return;
  weeklyConsolePrinted=true;
  console.log("%cKłōdka · "+(h.console_title||"Trop z konsoli"),"font-size:15px;font-weight:bold;color:#bf8a3a");
  console.log("%cTydzień "+WEEK_NO+": "+h.console_hint,"font-size:13px");
}
function fetchWeeklyHint(){
  var select="week_no,title,visible_hint,console_title,console_hint,published,publish_at";
  var path="/rest/v1/kodka_weekly_hints?week_no=eq."+encodeURIComponent(WEEK_NO)+"&published=eq.true&select="+encodeURIComponent(select)+"&limit=1";
  return restGet(path).then(function(rows){
    var row=rows && rows[0] ? rows[0] : null;
    if(row && row.publish_at && new Date(row.publish_at).getTime()>Date.now()) row=null;
    if(row){
      weeklyHintData={
        title:row.title||WEEKLY_HINT_DEFAULTS.title,
        visible_hint:row.visible_hint||"",
        console_title:row.console_title||WEEKLY_HINT_DEFAULTS.console_title,
        console_hint:row.console_hint||""
      };
    }else{
      weeklyHintData=null;
    }
    updateWeeklyHint();
    printWeeklyConsoleHint(false);
  }).catch(function(){
    weeklyHintData=null;
    updateWeeklyHint();
    printWeeklyConsoleHint(false);
  });
}
function updateWeeklyHint(){
  var el=document.getElementById("weeklyHint"); if(!el)return;
  var h=activeWeeklyHint();
  if(view!=="weekly" || !h.visible_hint){
    el.classList.remove("on");
    el.innerHTML="";
    return;
  }
  el.classList.add("on");
  el.innerHTML='<span class="hint-kicker">'+escHtml(h.title||"Zagadka tygodnia")+'</span>'+escHtml(h.visible_hint);
}

/* kolory klawiszy — tylko dla codziennej (weekly nie zdradza cyfr) */
function paintPad(){
  var best={};
  if(view==="daily"){
    var rank={absent:0,present:1,correct:2};
    game.guesses.forEach(function(g){
      if(!g.states)return;
      for(var c=0;c<LEN;c++){
        var d=g.code[c], st=g.states[c];
        if(best[d]===undefined||rank[st]>rank[best[d]]) best[d]=st;
      }
    });
  }
  padEl.querySelectorAll(".key").forEach(function(b){
    var k=b.dataset.key; b.classList.remove("correct","present","absent");

/* ── DŹWIĘKI ──────────────────────────────────────────────────────── */
var _ctx=null;
function getCtx(){if(!_ctx){try{_ctx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}return _ctx;}
function playSound(type){
  if(soundMode!=="on")return;
  var ctx=getCtx();if(!ctx)return;
  try{
    var o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    var now=ctx.currentTime, stopAt=now+.1;
    if(type==="key"){
      o.frequency.value=420;
      g.gain.setValueAtTime(.07,now);
      g.gain.exponentialRampToValueAtTime(.001,now+.06);
      stopAt=now+.08;
    }
    else if(type==="ok"){
      o.frequency.setValueAtTime(520,now);
      o.frequency.setValueAtTime(660,now+.08);
      g.gain.setValueAtTime(.12,now);
      g.gain.exponentialRampToValueAtTime(.001,now+.25);
      stopAt=now+.28;
    }
    else if(type==="bad"){
      o.frequency.value=180;
      g.gain.setValueAtTime(.09,now);
      g.gain.exponentialRampToValueAtTime(.001,now+.14);
      stopAt=now+.16;
    }
    else if(type==="win"){
      o.type="triangle";
      o.frequency.setValueAtTime(520,now);
      o.frequency.setValueAtTime(660,now+.1);
      o.frequency.setValueAtTime(780,now+.2);
      g.gain.setValueAtTime(.14,now);
      g.gain.exponentialRampToValueAtTime(.001,now+.45);
      stopAt=now+.48;
    }
    o.start(now);
    o.stop(stopAt);
  }catch(e){}
}

/* ── SUBMIT ───────────────────────────────────────────────────────── */
function computeDailyStates(guess,answer){
  guess=String(guess||""); answer=String(answer||"");
  var states=[], usedA=[false,false,false,false], usedG=[false,false,false,false];
  for(var i=0;i<LEN;i++){
    if(guess[i]===answer[i]){states[i]="correct";usedA[i]=true;usedG[i]=true;}
    else states[i]="absent";
  }
  for(var g=0;g<LEN;g++){
    if(usedG[g])continue;
    for(var a=0;a<LEN;a++){
      if(!usedA[a] && guess[g]===answer[a]){states[g]="present";usedA[a]=true;usedG[g]=true;break;}
    }
  }
  return states;
}
function computeDirections(guess,answer,states){
  var dirs=[];
  for(var i=0;i<LEN;i++){
    dirs[i]=null;
    if(states && states[i]==="absent" && answer.indexOf(guess[i])===-1){
      var gv=parseInt(guess[i],10), av=parseInt(answer[i],10);
      if(!isNaN(gv)&&!isNaN(av)) dirs[i]=gv<av?"higher":(gv>av?"lower":null);
    }
  }
  return dirs;
}
function guessArchiveFromReveal(args){
  return rpc("kodka_reveal",{p_mode:args.p_mode,p_idx:args.p_idx}).then(function(answer){
    answer=String(answer||"");
    if(answer.length!==LEN) throw new Error("archive reveal empty");
    var states=computeDailyStates(String(args.p_guess||""),answer);
    return {correct:String(args.p_guess)===answer,states:states,directions:computeDirections(String(args.p_guess||""),answer,states)};
  });
}
function guessCode(args){
  if(view==="daily"){
    // Nowe RPC dodaje directions. Dla archiwum mamy jeszcze awaryjne sprawdzanie przez reveal,
    // żeby stare dni nie kończyły się komunikatem „coś nie pykło”, jeśli RPC guess odmówi współpracy.
    return rpc("kodka_guess_hints",args).catch(function(){
      return rpc("kodka_guess",args).catch(function(err){
        if(args.p_mode==="daily" && args.p_idx<TODAY_NO) return guessArchiveFromReveal(args);
        throw err;
      });
    });
  }
  return rpc("kodka_guess",args);
}
var busy=false;
function submit(){
  if(busy) return;
  if(current.length<LEN){ shakeRow(); toast(t().short); playSound("bad"); return; }
  var guess=current;
  busy=true;
  guessCode({p_mode:view,p_idx:currentIdx(),p_guess:guess})
    .then(function(res){
      if(res && res.error){ busy=false;
        if(res.error==="no code"){ toast(view==="daily"?t().none:t().soon); }
        else toast(t().short);
        return;
      }
      var entry={code:guess};
      if(view==="daily"){ entry.states=res.states; if(res.directions) entry.directions=res.directions; }
      entry.correct=!!res.correct;
      game.guesses.push(entry);
      current="";
      // Zapisuj od razu po każdej zatwierdzonej próbie — także w archiwum.
      // Dzięki temu gracz nie straci stanu, nawet gdy zamknie stronę przed animacją albo przed pobraniem kodu do modala końcowego.
      persist();
      revealRow(game.guesses.length-1);
      if(res.correct){ playSound("win"); finish(true); }
      else if(game.guesses.length>=MAX_TRIES){ playSound("bad"); finish(false); }
      else { playSound(view==="daily" && res.states && res.states.some(function(x){return x==="correct"||x==="present";})?"ok":"bad"); }
      busy=false;
    })
    .catch(function(){ busy=false; toast(lang==="szl"?"Coś niy pyknyło, sprōbuj zaś.":"Coś nie pykło, spróbuj jeszcze raz."); });
}

function revealRow(r){
  var row=boardEl.querySelectorAll(".row")[r];
  var tiles=row.querySelectorAll(".tile");
  var g=game.guesses[r];
  for(var c=0;c<LEN;c++){
    (function(tile,c){
      var apply=function(){
        tile.classList.add("reveal"); tile.textContent=g.code[c];
        if(view==="daily" && g.states){ tile.classList.add(g.states[c]); applyDirectionHint(tile,g,c); }
        else tile.classList.add(g.correct?"correct":"neutral");
        if(c===LEN-1) paintPad();
      };
      if(animMode==="off")apply();else setTimeout(apply,c*90);
    })(tiles[c],c);
  }
}
function shakeRow(){
  var row=boardEl.querySelectorAll(".row")[game.guesses.length];
  if(!row) return; row.classList.add("shake");
  setTimeout(function(){row.classList.remove("shake");},360);

/* ── KONIEC GRY ───────────────────────────────────────────────────── */
function finish(won){
  game.status=won?"won":"lost";

  var doneMode=view, doneIdx=currentIdx();
  var doneTries=(game.guesses||[]).length||MAX_TRIES;

  // Najważniejsze: najpierw zapisz wynik lokalnie i statystyki.
  // To NIE może zależeć od modala, animacji ani Supabase.
  persist();
  recordHistoryFor(doneMode,doneIdx,won,doneTries);

  var T=t();
  if(won) toast(T.win[Math.floor(Math.random()*T.win.length)]);
  else toast(doneMode==="daily"?T.loseD:T.loseW);

  // Modal końcowy otwieramy z konkretnego zapisanego dnia/tygodnia, a nie z bieżącego widoku.
  // Dzięki temu działa też archiwum i nie gubi się przy zmianie dnia.
  setTimeout(function(){ openEndFor(doneMode,doneIdx); }, animMode==="off"?250:900);

  // Kod do ujawnienia dociągamy równolegle i aktualizujemy modal, jeśli jest już otwarty.
  rpc("kodka_reveal",{p_mode:doneMode,p_idx:doneIdx})
    .then(function(code){
      var saved=loadSavedGame(doneMode,doneIdx) || game;
      if(saved){ saved.reveal=code; saveGameFor(doneMode,doneIdx,saved); }
      if(game && view===doneMode && currentIdx()===doneIdx){
        game.reveal=code;
        saveGameFor(doneMode,doneIdx,game);
      }
      updateRevealInModal(code);
      refreshWeektile();
    })
    .catch(function(){ refreshWeektile(); });

  // log globalny do stats.html
  trackEvent({
    game: "kodka",
    mode: doneMode,
    puzzle_no: doneIdx,
    puzzle_word: null,
    won: won, tries: doneTries, max_tries: MAX_TRIES, lang: lang
  });
}

var scrim=document.getElementById("scrim"), modal=document.getElementById("modal");

function defaultHistory(){return {played:0,won:0,streak:0,best:0,lastIdx:null,lastWon:false,dist:[0,0,0,0,0,0],results:{}};}
function normalizeHistory(hist){
  var def=defaultHistory(); hist=hist||{};
  hist.played=Number(hist.played||0); hist.won=Number(hist.won||0);
  hist.streak=Number(hist.streak||0); hist.best=Number(hist.best||0);
  hist.lastIdx=hist.lastIdx===undefined?null:hist.lastIdx; hist.lastWon=!!hist.lastWon;
  hist.dist=Array.isArray(hist.dist)?hist.dist.slice(0,MAX_TRIES):def.dist.slice();
  while(hist.dist.length<MAX_TRIES)hist.dist.push(0);
  hist.results=hist.results||{};
  return hist;
}
function savedResult(mode,idx){
  var g=loadSavedGame(mode,idx);
  if(!g || (g.status!=="won" && g.status!=="lost")) return null;
  return {won:g.status==="won",tries:(g.guesses||[]).length||MAX_TRIES};
}
function recalcHistory(mode,hist){
  hist=normalizeHistory(hist);
  var maxIdx=mode==="daily"?TODAY_NO:WEEK_NO;
  var ids=Object.keys(hist.results||{}).map(function(k){return parseInt(k,10);})
    .filter(function(n){return !isNaN(n)&&n>=1&&n<=maxIdx;})
    .sort(function(a,b){return a-b;});
  hist.played=ids.length; hist.won=0; hist.dist=[];
  for(var d=0;d<MAX_TRIES;d++)hist.dist.push(0);
  var cur=0,best=0,last=null,lastWin=false;
  ids.forEach(function(idx){
    var r=hist.results[idx]||{};
    if(r.won){
      hist.won++;
      var tries=Math.max(1,Math.min(MAX_TRIES,parseInt(r.tries||MAX_TRIES,10)));
      hist.dist[tries-1]++;
      cur=(last!==null&&idx===last+1&&lastWin)?cur+1:1;
      if(cur>best)best=cur;
    }else cur=0;
    last=idx; lastWin=!!r.won;
  });
  hist.streak=lastWin?cur:0; hist.best=best; hist.lastIdx=last; hist.lastWon=lastWin;
  return hist;
}
function hydrateHistory(mode){
  var hist=normalizeHistory(loadJSON(histKey(mode)));
  var maxIdx=mode==="daily"?TODAY_NO:WEEK_NO;
  for(var i=1;i<=maxIdx;i++){
    if(!hist.results[i]){
      var r=savedResult(mode,i);
      if(r)hist.results[i]=r;
    }
  }
  hist=recalcHistory(mode,hist);
  saveJSON(histKey(mode),hist);
  return hist;
}
function recordHistoryFor(mode,idx,won,tries){
  var hist=normalizeHistory(loadJSON(histKey(mode)));
  tries=Math.max(1,Math.min(MAX_TRIES,parseInt(tries||MAX_TRIES,10)));
  hist.results[idx]={won:!!won,tries:tries};
  hist=recalcHistory(mode,hist);
  saveJSON(histKey(mode),hist);
  return hist;
}
function recordHistory(won){
  return recordHistoryFor(view,currentIdx(),!!won,(game&&game.guesses?game.guesses.length:MAX_TRIES)||MAX_TRIES);
}
function statsPct(hist){return hist.played?Math.round(hist.won/hist.played*100):0;}
function statsSummaryHtml(hist){var T=t();
  return '<div class="stats">'+
    '<div class="stat"><div class="n">'+hist.played+'</div><div class="l">'+T.played+'</div></div>'+
    '<div class="stat"><div class="n">'+statsPct(hist)+'</div><div class="l">'+T.wpct+'</div></div>'+
    '<div class="stat"><div class="n">'+hist.streak+'</div><div class="l">'+T.streak+'</div></div>'+
    '<div class="stat"><div class="n">'+hist.best+'</div><div class="l">'+T.best+'</div></div>'+
  '</div>';
}
function distHtml(hist){var T=t(),max=Math.max(1,Math.max.apply(null,hist.dist||[0])),rows="";
  for(var i=0;i<MAX_TRIES;i++){
    var v=(hist.dist&&hist.dist[i])||0;
    var w=v?Math.max(8,Math.round(v/max*100)):8;
    var hl=(game&&game.status==="won"&&game.guesses.length===i+1)?" win":"";
    rows+='<div class="bar-row"><span class="bar-i">'+(i+1)+'</span><div class="bar-wrap"><div class="bar'+hl+'" style="width:'+w+'%">'+v+'</div></div></div>';
  }
  return '<div class="dist"><h3>'+T.dist+'</h3>'+rows+'</div>';
}

function countdown(toMidnightOrWeek){
  var now=new Date(), target;
  if(view==="daily"){ target=new Date(now.getFullYear(),now.getMonth(),now.getDate()+1); }
  else { var dow=now.getDay(); /* tydzień liczony od epoki — pokaż do najbliższej północy następnego dnia tygodnia kalendarzowego */
         var d=midnight(EPOCH); var nextWeekStart=new Date(d); nextWeekStart.setDate(d.getDate()+WEEK_NO*7);
         target=nextWeekStart; }
  var ms=target-now; if(ms<0)ms=0;
  var h=Math.floor(ms/3600000), m=Math.floor(ms%3600000/60000), s=Math.floor(ms%60000/1000);
  return (h<10?"0":"")+h+":"+(m<10?"0":"")+m+":"+(s<10?"0":"")+s;
}

function resultEmoji(entry,c,mode){
  if(mode==="weekly") return entry.correct?"🟩":"⬛";
  var st=entry.states&&entry.states[c];
  if(st==="correct") return "🟩";
  if(st==="present") return "🟨";
  return "⬛";
}
function buildShareText(mode,idx,g){
  var won=g&&g.status==="won";
  var tries=(g&&g.guesses?g.guesses.length:0)||MAX_TRIES;
  var score=won?tries+"/"+MAX_TRIES:"X/"+MAX_TRIES;
  var title=mode==="daily"?"Kłōdka #"+idx:"Kłōdka — tydzień "+idx;
  var lines=[title+" "+score,"Szpilplac · Familock"];
  (g.guesses||[]).forEach(function(entry){
    var row="";
    for(var c=0;c<LEN;c++) row+=resultEmoji(entry,c,mode);
    lines.push(row);
  });
  lines.push("https://szpilplac.familock.pl/kodka.html");
  return lines.join("\n");
}
function fallbackCopy(text){
  var ta=document.createElement("textarea");
  ta.value=text;
  ta.setAttribute("readonly","");
  ta.style.position="fixed";
  ta.style.top="-1000px";
  ta.style.left="-1000px";
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  var ok=false;
  try{ok=document.execCommand("copy");}catch(e){ok=false;}
  document.body.removeChild(ta);
  return ok;
}
function copyShareText(text,onDone,onFail){
  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(text).then(onDone).catch(function(){
      if(fallbackCopy(text)) onDone(); else onFail();
    });
  } else {
    if(fallbackCopy(text)) onDone(); else onFail();
  }
}

  modal.innerHTML='<button class="modal-close" aria-label="Zamknij">×</button>'+html;
  scrim.classList.add("open");
  modal.querySelector(".modal-close").addEventListener("click",closeModal);
}
function readHistory(mode){return hydrateHistory(mode);}
function showStats(){
  var T=t(), hist=readHistory(view);
  openSimpleModal('<h2>'+T.statsH+'</h2>'+statsSummaryHtml(hist)+distHtml(hist)+'<button class="btn" id="closeBtn">OK</button>');
  modal.querySelector("#closeBtn").addEventListener("click",closeModal);
}
function showSettings(){
  var T=t();
  function tog(cur,key){return '<div class="seg"><button data-k="'+key+'" data-v="on" class="seg-opt'+(cur==="on"?' on':'')+'">'+T.settOn+'</button><button data-k="'+key+'" data-v="off" class="seg-opt'+(cur==="off"?' on':'')+'">'+T.settOff+'</button></div>';}
  openSimpleModal('<h2>'+T.settH+'</h2>'+    '<div class="sett-row"><div><div class="sett-label">'+T.settSoundL+'</div><div class="sett-sub">'+T.settSoundS+'</div></div>'+tog(soundMode,SOUND_KEY)+'</div>'+    '<div class="sett-row"><div><div class="sett-label">'+T.settAnimL+'</div><div class="sett-sub">'+T.settAnimS+'</div></div>'+tog(animMode,ANIM_KEY)+'</div>'+    '<div class="sett-row"><div><div class="sett-label">'+T.settCbL+'</div><div class="sett-sub">'+T.settCbS+'</div></div>'+tog(cbMode,CB_KEY)+'</div>'+    '<div class="sett-row"><div><div class="sett-label">'+T.settDirL+'</div><div class="sett-sub">'+T.settDirS+'</div></div>'+tog(dirMode,DIR_KEY)+'</div>'+    '<div class="sett-row"><div><div class="sett-label">'+T.settRepeatL+'</div><div class="sett-sub">'+T.settRepeatS+'</div></div>'+tog(repeatMode,REPEAT_KEY)+'</div>');
  modal.querySelectorAll(".seg-opt").forEach(function(btn){
    btn.addEventListener("click",function(){
      var k=btn.dataset.k, v=btn.dataset.v;
      modal.querySelectorAll('.seg-opt[data-k="'+k+'"]').forEach(function(b){b.classList.toggle("on",b.dataset.v===v);});
      localStorage.setItem(k,v);
      if(k===SOUND_KEY)soundMode=v;
      if(k===ANIM_KEY){animMode=v;applyAnimMode();}
      if(k===CB_KEY){cbMode=v;applyCbMode();}
      if(k===DIR_KEY){dirMode=v;paintFromGame();}
      if(k===REPEAT_KEY){repeatMode=v;loadCodeMeta();updateRepeatInfo();}
    });
  });
}
document.getElementById("statBtn").addEventListener("click",showStats);
document.getElementById("settBtn").addEventListener("click",showSettings);

/* ── HELP ─────────────────────────────────────────────────────────── */
function showHelp(){
  try{localStorage.setItem(HELP_KEY,"seen");}catch(e){}
  var T=t();
  var dailyLegend =
      '<p style="margin-top:8px"><span class="swatch" style="background:var(--correct)"></span>'+T.lgC+'</p>'+ 
      '<p><span class="swatch" style="background:var(--present)"></span>'+T.lgP+'</p>'+ 
      '<p><span class="swatch" style="background:var(--absent)"></span>'+T.lgA+'</p>'+ 
      '<p style="margin-top:8px">'+T.dirLegend+'</p>';
  var optionsNote = '<p style="margin-top:12px"><b>Opcje.</b> '+T.optionsInfo+'</p>';
  var html =
    '<p>'+T.howD+'</p>'+dailyLegend+
    '<p style="margin-top:14px">'+T.howW+'</p>'+optionsNote;
  modal.innerHTML=
    '<button class="modal-close" aria-label="Zamknij">×</button>'+
    '<h2>'+T.howH+'</h2>'+
    '<div class="howlist">'+html+'</div>'+
    '<button class="btn" id="closeBtn" style="margin-top:16px">OK</button>';
  scrim.classList.add("open");
  modal.querySelector(".modal-close").addEventListener("click",closeModal);
  modal.querySelector("#closeBtn").addEventListener("click",closeModal);
}
document.getElementById("helpBtn").addEventListener("click",showHelp);

/* ── KAFELEK TYGODNIÓWKI ──────────────────────────────────────────── */
function refreshWeektile(){
  var T=t(), badge=document.getElementById("wtBadge"), status=document.getElementById("wtStatus");
  document.getElementById("wtName").firstChild.textContent=T.weekName;
  var wg=loadSavedGame("weekly",WEEK_NO);
  var played = wg ? wg.status : null;
  if(played==="won"){ badge.className="badge won"; badge.textContent=T.bWon; status.textContent=T.wtWon; return; }
  if(played==="lost"){ badge.className="badge lost"; badge.textContent=T.bLost; status.textContent=T.wtLost; return; }
  // sprawdź, czy kod tygodnia istnieje
  rpc("kodka_has",{p_mode:"weekly",p_idx:WEEK_NO}).then(function(has){
    if(has){ badge.className="badge new"; badge.textContent=T.bNew; status.textContent=T.wtNew; }
    else { badge.className="badge soon"; badge.textContent=T.bSoon; status.textContent=T.wtSoon; }
  }).catch(function(){ badge.className="badge soon"; badge.textContent=T.bSoon; status.textContent=T.wtSoon; });
}

document.getElementById("weektile").addEventListener("click",function(){ switchView("weekly"); });
document.getElementById("subback").addEventListener("click",function(){ switchView("daily"); });

function switchView(v){
  view=v; current="";
  document.getElementById("weektile").classList.toggle("hidden", v==="weekly");
  loadGame(); renderStatic();
  if(v==="weekly") fetchWeeklyHint();
  if(v==="weekly" && game.status==="playing"){
    // jeśli kod jeszcze nie istnieje — komunikat „w przygotowaniu”
    rpc("kodka_has",{p_mode:"weekly",p_idx:WEEK_NO}).then(function(has){ if(!has) toast(t().soon); });
  }
  if(game.status!=="playing") openFinishedModal(250);
  window.scrollTo(0,0);
}

/* ── ARCHIWUM DNI ─────────────────────────────────────────────────── */
var calScrim=document.getElementById("calScrim"), calViewYear, calViewMonth;
function loadDailyDay(no){
  if(no<1||no>TODAY_NO)return;
  view="daily";DAY_NO=no;current="";
  document.getElementById("weektile").classList.remove("hidden");
  loadGame();renderStatic();refreshWeektile();
  if(game.status!=="playing")openFinishedModal(250);
  window.scrollTo(0,0);
}
function updateNavBar(){
  var T=t(), nav=document.getElementById("navBar"); if(!nav)return;
  nav.classList.toggle("hidden",view!=="daily");
  if(view!=="daily")return;
  document.getElementById("navDayNo").textContent="Kłōdka #"+DAY_NO;
  document.getElementById("navDayLabel").innerHTML=(DAY_NO===TODAY_NO?T.today:fmtDate(dateOfDayNo(DAY_NO)))+(DAY_NO<TODAY_NO?"<span class='archive-badge'>"+T.archive+"</span>":"");
  document.getElementById("prevBtn").disabled=DAY_NO<=1;
  document.getElementById("nextBtn").disabled=DAY_NO>=TODAY_NO;
}
document.getElementById("prevBtn").addEventListener("click",function(){loadDailyDay(DAY_NO-1);});
document.getElementById("nextBtn").addEventListener("click",function(){loadDailyDay(DAY_NO+1);});
function openCalendar(){var d=dateOfDayNo(DAY_NO);calViewYear=d.getFullYear();calViewMonth=d.getMonth();renderCalendar();calScrim.classList.add("open");}
function closeCalendar(){calScrim.classList.remove("open");}
document.getElementById("calBtn").addEventListener("click",openCalendar);
document.getElementById("calClose").addEventListener("click",closeCalendar);
calScrim.addEventListener("click",function(e){if(e.target===calScrim)closeCalendar();});
document.getElementById("calPrev").addEventListener("click",function(){calViewMonth--;if(calViewMonth<0){calViewMonth=11;calViewYear--;}renderCalendar();});
document.getElementById("calNext").addEventListener("click",function(){calViewMonth++;if(calViewMonth>11){calViewMonth=0;calViewYear++;}renderCalendar();});
function renderCalendar(){
  var T=t(), months=["Styczeń","Luty","Marzec","Kwiecień","Maj","Czerwiec","Lipiec","Sierpień","Wrzesień","Październik","Listopad","Grudzień"];
  document.getElementById("calTitle").textContent=T.archive+" — "+months[calViewMonth]+" "+calViewYear;
  var grid=document.getElementById("calGrid");grid.innerHTML="";
  ["Pn","Wt","Śr","Cz","Pt","Sb","Nd"].forEach(function(d){var el=document.createElement("div");el.className="cal-dow";el.textContent=d;grid.appendChild(el);});
  var first=new Date(calViewYear,calViewMonth,1), dow=(first.getDay()+6)%7;
  for(var e=0;e<dow;e++){var empty=document.createElement("div");empty.className="cal-day empty";grid.appendChild(empty);}
  var daysInMonth=new Date(calViewYear,calViewMonth+1,0).getDate();
  for(var d=1;d<=daysInMonth;d++){
    var date=new Date(calViewYear,calViewMonth,d), dayNo=Math.floor((midnight(date)-midnight(EPOCH))/86400000)+1;
    var el=document.createElement("div");el.textContent=d;
    if(dayNo<1||dayNo>TODAY_NO){el.className="cal-day future";grid.appendChild(el);continue;}
    var dg=loadSavedGame("daily",dayNo);
    var cls="cal-day";
    if(dayNo===TODAY_NO)cls+=" today";else if(dayNo<TODAY_NO)cls+=" past";
    if(dayNo===DAY_NO)cls+=" active";
    if(dg&&dg.status==="won")cls+=" played won";
    else if(dg&&dg.status==="lost")cls+=" played";
    el.className=cls;
    (function(no){el.addEventListener("click",function(){closeCalendar();loadDailyDay(no);});})(dayNo);
    grid.appendChild(el);
  }
  var epochMonth=new Date(EPOCH.getFullYear(),EPOCH.getMonth(),1), curView=new Date(calViewYear,calViewMonth,1), maxMonth=new Date(dateOfDayNo(TODAY_NO).getFullYear(),dateOfDayNo(TODAY_NO).getMonth(),1);
  document.getElementById("calPrev").disabled=curView<=epochMonth;
  document.getElementById("calNext").disabled=curView>=maxMonth;
}

/* ── START ────────────────────────────────────────────────────────── */
loadGame();
renderStatic();
refreshWeektile();
fetchWeeklyHint();
if(game.status!=="playing") openFinishedModal(400);
else if(!localStorage.getItem(HELP_KEY)){
  setTimeout(function(){
    if(!document.getElementById("scrim").classList.contains("open")) showHelp();
  },650);
}
</script>
