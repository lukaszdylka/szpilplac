<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odznaki · Admin · Szpilplac</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;600;800;900&display=swap&subset=latin,latin-ext" rel="stylesheet">
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#f0e8d4;--surface:#fbf7ee;--surface2:#f3ecda;--ink:#23201a;--ink2:#6a6150;--line:#c9bfa6;--green:#2f4a39;--gold:#bf8a3a;--danger:#b5482f;--ok:#3f8a5a}
[data-theme=dark]{--bg:#161310;--surface:#262018;--surface2:#2e2820;--ink:#ede5d0;--ink2:#9a907a;--line:#3d3629;--green:#4a7a56;--gold:#d4a04a;--danger:#d76a4f;--ok:#4a9a6a}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%}
body{font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--ink);padding:0 16px 40px}
a{color:inherit;text-decoration:none}
button,input,textarea{font:inherit}
button{cursor:pointer}
header,main{width:100%;max-width:1100px;margin:0 auto}
header{padding:24px 0 16px}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
h1{font-family:Oswald,system-ui,sans-serif;text-transform:uppercase;font-size:clamp(38px,7vw,64px);line-height:.95;margin:0}
.sub{color:var(--ink2);font-size:13px;line-height:1.45;margin-top:8px}
.nav{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.btn{border:1px solid var(--line);background:var(--surface2);color:var(--ink);border-radius:999px;padding:10px 13px;font-size:12px;font-weight:900;display:inline-flex;align-items:center;justify-content:center}
.btn:hover{background:var(--surface)}
.btn.primary{background:var(--green);border-color:var(--green);color:#fff}
.btn.danger{color:var(--danger)}
.btn.gold{background:rgba(191,138,58,.16);border-color:var(--gold)}
main{display:grid;grid-template-columns:1.1fr .9fr;gap:14px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:16px;min-width:0}
.card h2{font-family:Oswald,system-ui,sans-serif;text-transform:uppercase;letter-spacing:.03em;margin:0 0 10px;font-size:23px}
.msg{border:1px solid var(--line);background:var(--surface2);border-radius:14px;padding:12px;color:var(--ink2);font-size:13px;line-height:1.45;margin-bottom:12px}
.msg.ok{border-color:var(--ok);color:var(--ok);background:rgba(63,138,90,.10)}
.msg.err{border-color:var(--danger);color:var(--danger);background:rgba(181,72,47,.10)}
.hidden{display:none!important}
.list{display:grid;gap:9px}
.item{border:1px solid var(--line);border-radius:15px;background:var(--surface2);padding:10px;display:grid;grid-template-columns:58px 1fr auto;gap:10px;align-items:center}
.item.off{opacity:.56}
.ico svg{width:52px;height:62px;display:block}
.name{font-family:Oswald,system-ui,sans-serif;text-transform:uppercase;font-size:18px;line-height:1.05}
.meta{font-size:12px;color:var(--ink2);line-height:1.35;margin-top:4px}
.actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.field{display:grid;gap:6px;margin-bottom:10px;font-size:12px;font-weight:900;color:var(--ink2)}
input,textarea{width:100%;border:1px solid var(--line);border-radius:12px;background:var(--surface2);color:var(--ink);padding:10px 11px}
textarea{min-height:150px;font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:12px}
.row{display:grid;grid-template-columns:1fr 120px;gap:10px}
.check{display:flex;gap:8px;align-items:center;font-size:13px;color:var(--ink2);font-weight:800;margin:4px 0 12px}
.preview{border:1px dashed var(--line);border-radius:15px;background:var(--surface2);min-height:86px;display:grid;place-items:center;margin-bottom:12px}
.preview svg{width:64px;height:76px}
@media(max-width:860px){main{grid-template-columns:1fr}.topbar{display:grid}.nav{justify-content:flex-start}.item{grid-template-columns:52px 1fr}.actions{grid-column:1/-1;justify-content:flex-start}}
</style>
</head>
<body>
<header>
  <div class="topbar">
    <div>
      <h1>Odznaki</h1>
      <div class="sub">Dodawanie, edycja i ukrywanie odznak widocznych w panelu gracza.</div>
    </div>
    <nav class="nav">
      <a class="btn" href="admin.html">Admin</a>
      <a class="btn" href="konto.html">Profil</a>
      <button class="btn" id="themeBtn" type="button">Motyw</button>
    </nav>
  </div>
</header>

<main>
  <section class="card">
    <h2>Lista</h2>
    <div id="msg" class="msg">Sprawdzam dostęp...</div>
    <div id="list" class="list hidden"></div>
  </section>

  <section class="card">
    <h2>Edycja</h2>
    <form id="form">
      <label class="field">ID<input id="aId" placeholder="np. nowa_odznaka" required></label>
      <label class="field">Nazwa<input id="aLabel" placeholder="Nazwa odznaki" required></label>
      <label class="field">Opis dla zdobytej odznaki<input id="aDesc" placeholder="Za co gracz ją zdobył"></label>
      <div class="row">
        <label class="field">Kolejność<input id="aSort" type="number" value="100"></label>
        <label class="field">Aktywna<select id="aActive"><option value="true">tak</option><option value="false">nie</option></select></label>
      </div>
      <label class="field">SVG<textarea id="aSvg" placeholder="<svg ...></svg>"></textarea></label>
      <div class="preview" id="preview">Podgląd</div>
      <button class="btn primary" type="submit">Zapisz odznakę</button>
      <button class="btn" type="button" id="clearBtn">Wyczyść formularz</button>
    </form>
  </section>
</main>

<script>
(function(){
  "use strict";
  var AUTH_STORAGE_KEY="szpilplac-auth-v05";
  var sb=null, rows=[];

  function $(id){return document.getElementById(id);}
  function esc(x){return String(x==null?"":x).replace(/[&<>"']/g,function(ch){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]||ch;});}
  function setMsg(text,type){$("msg").textContent=text;$("msg").className="msg"+(type?(" "+type):"");}
  function applyTheme(t){document.documentElement.dataset.theme=t;try{localStorage.setItem("szpilplac_theme",t);}catch(e){}}
  function initTheme(){try{applyTheme(localStorage.getItem("szpilplac_theme")==="dark"?"dark":"light");}catch(e){applyTheme("light");}}
  function cfg(){return {url:(window.SZPILPLAC_CONFIG&&window.SZPILPLAC_CONFIG.SUPABASE_URL)||window.SUPABASE_URL||"",key:(window.SZPILPLAC_CONFIG&&window.SZPILPLAC_CONFIG.SUPABASE_ANON_KEY)||window.SUPABASE_ANON_KEY||""};}
  function client(){
    if(sb)return sb;
    var c=cfg();
    if(!c.url||!c.key||!window.supabase)throw new Error("Nie udało się przygotować panelu.");
    sb=window.supabase.createClient(c.url,c.key,{auth:{storageKey:AUTH_STORAGE_KEY,detectSessionInUrl:false,persistSession:true,autoRefreshToken:true}});
    return sb;
  }
  async function load(){
    setMsg("Ładuję odznaki...");
    var c=client();
    var session=await c.auth.getSession();
    if(!session || !session.data || !session.data.session){setMsg("Zaloguj się kontem admina.","err");return;}
    var res=await c.rpc("szpilplac_admin_achievements_list");
    if(res.error)throw res.error;
    rows=res.data||[];
    render();
    $("list").classList.remove("hidden");
    setMsg("Gotowe.","ok");
  }
  function render(){
    $("list").innerHTML=rows.map(function(r){
      return '<article class="item '+(r.is_active?'':'off')+'">'+
        '<div class="ico">'+(r.svg||"")+'</div>'+
        '<div><div class="name">'+esc(r.label)+'</div><div class="meta">'+esc(r.id)+' · zdobyte: '+esc(r.earned_count||0)+' · '+(r.is_active?'widoczna':'ukryta')+'</div></div>'+
        '<div class="actions"><button class="btn" data-edit="'+esc(r.id)+'" type="button">Edytuj</button><button class="btn '+(r.is_active?'danger':'gold')+'" data-toggle="'+esc(r.id)+'" data-active="'+(r.is_active?'false':'true')+'" type="button">'+(r.is_active?'Ukryj':'Pokaż')+'</button></div>'+
      '</article>';
    }).join("");
  }
  function fill(r){
    $("aId").value=r.id||"";
    $("aLabel").value=r.label||"";
    $("aDesc").value=r.description||"";
    $("aSort").value=r.sort_order||100;
    $("aActive").value=r.is_active?"true":"false";
    $("aSvg").value=r.svg||"";
    preview();
    $("aLabel").focus();
  }
  function clearForm(){
    fill({id:"",label:"",description:"",sort_order:100,is_active:true,svg:""});
    $("aId").focus();
  }
  function preview(){
    var svg=$("aSvg").value.trim();
    $("preview").innerHTML=svg || "Podgląd";
  }
  async function save(e){
    e.preventDefault();
    var c=client();
    setMsg("Zapisuję...");
    var res=await c.rpc("szpilplac_admin_upsert_achievement",{
      p_id:$("aId").value.trim(),
      p_label:$("aLabel").value.trim(),
      p_description:$("aDesc").value.trim(),
      p_svg:$("aSvg").value.trim(),
      p_is_active:$("aActive").value==="true",
      p_sort_order:Number($("aSort").value||100)
    });
    if(res.error)throw res.error;
    setMsg("Odznaka zapisana.","ok");
    await load();
  }
  async function toggle(id,active){
    var c=client();
    setMsg("Zmieniam widoczność...");
    var res=await c.rpc("szpilplac_admin_set_achievement_active",{p_id:id,p_is_active:active});
    if(res.error)throw res.error;
    await load();
  }

  document.addEventListener("click",function(e){
    var edit=e.target.closest("[data-edit]");
    if(edit){var r=rows.find(function(x){return x.id===edit.dataset.edit;});if(r)fill(r);}
    var tog=e.target.closest("[data-toggle]");
    if(tog){toggle(tog.dataset.toggle,tog.dataset.active==="true").catch(function(err){setMsg(err.message||String(err),"err");});}
  });
  $("form").addEventListener("submit",function(e){save(e).catch(function(err){setMsg(err.message||String(err),"err");});});
  $("clearBtn").addEventListener("click",clearForm);
  $("aSvg").addEventListener("input",preview);
  $("themeBtn").addEventListener("click",function(){applyTheme(document.documentElement.dataset.theme==="dark"?"light":"dark");});
  initTheme();
  load().catch(function(err){setMsg(err.message||String(err),"err");});
})();
</script>
</body>
</html>
