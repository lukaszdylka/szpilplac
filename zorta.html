<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Zorta · Szpilplac · Familock</title>
<meta name="description" content="Co tydzień jedna śląska zagadka — poukładaj pięć rzeczy we właściwej kolejności. Gra od Familocka Starzik.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@400;600;800&display=swap&subset=latin,latin-ext" rel="stylesheet">
<style>
:root{
  --bg:#f0e8d4;--surface:#fbf7ee;--surface2:#f3ecda;--ink:#23201a;--ink2:#6a6150;
  --line:#c9bfa6;--green:#2f4a39;--gold:#bf8a3a;--correct:#3f8a5a;--miss:#b9b09a;
}
[data-theme=light]{--bg:#f0e8d4;--surface:#fbf7ee;--surface2:#f3ecda;--ink:#23201a;--ink2:#6a6150;--line:#c9bfa6;--green:#2f4a39;--gold:#bf8a3a;--correct:#3f8a5a;--miss:#b9b09a;}
[data-theme=dark]{--bg:#161310;--surface:#262018;--surface2:#2e2820;--ink:#ede5d0;--ink2:#9a907a;--line:#3d3629;--green:#4a7a56;--gold:#d4a04a;--correct:#4a9a6a;--miss:#5a5448;}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:"Inter",system-ui,sans-serif;color:var(--ink);background:var(--bg);
  -webkit-font-smoothing:antialiased;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{color:inherit;text-decoration:none}
.wrap{max-width:520px;margin:0 auto;padding:0 16px 48px;display:flex;flex-direction:column;min-height:100vh}

/* HEADER */
header{width:100%;padding:14px 2px 10px}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
.back{font-size:12px;font-weight:600;color:var(--green);display:inline-flex;align-items:center;gap:4px}
.back:hover{text-decoration:underline}
.controls{display:flex;gap:5px;align-items:center}
.lang-tog{display:flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:var(--surface2)}
.lang-tog button{font-size:11px;font-weight:700;padding:5px 10px;color:var(--ink2)}
.lang-tog button.on{background:var(--green);color:#fff}
.icon-btn{width:32px;height:32px;border-radius:999px;border:1px solid var(--line);
  background:var(--surface2);display:flex;align-items:center;justify-content:center;color:var(--ink2)}
.icon-btn:hover{background:var(--surface);color:var(--ink)}
.icon-btn svg{display:block;flex:none}
.brand{margin-top:4px}
.brand h1{font-family:"Oswald";font-weight:700;text-transform:uppercase;letter-spacing:.08em;
  font-size:28px;margin:0;line-height:1}
.brand p{margin:3px 0 0;font-size:12px;color:var(--ink2);letter-spacing:.02em}

/* WEEK NAV */
.weeknav{display:flex;align-items:center;justify-content:center;gap:14px;margin:4px 0 14px}
.weeknav button{width:34px;height:34px;border-radius:9px;border:1.5px solid var(--line);
  background:var(--surface);font-size:18px;color:var(--ink);line-height:1}
.weeknav button[disabled]{opacity:.32;cursor:default}
.weeknav .wk{font-family:"Oswald";font-size:15px;letter-spacing:.04em;color:var(--ink);
  text-align:center;min-width:150px}
.weeknav .wk small{display:block;font-family:"Inter";font-weight:600;font-size:11px;color:var(--ink2);letter-spacing:0}

/* BANNER */
.banner{background:var(--surface);border:1.5px solid var(--line);border-radius:16px;
  padding:16px 16px 14px;margin-bottom:16px;position:relative;overflow:hidden}
.banner .eyebrow{font-family:"Oswald";font-weight:500;text-transform:uppercase;letter-spacing:.16em;
  font-size:11px;color:var(--gold)}
.banner .crit{font-family:"Oswald";font-weight:700;font-size:19px;margin:3px 0 10px;color:var(--ink);line-height:1.1}
.dir{display:flex;align-items:center;gap:10px;background:var(--surface2);border-radius:10px;
  padding:9px 12px;font-size:13px;color:var(--ink);line-height:1.3}
.dir .arrow{font-family:"Oswald";color:var(--green);font-size:20px;flex:none}
[data-theme=dark] .dir .arrow{color:var(--gold)}

/* LIST */
.list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:9px}
.row{display:flex;align-items:center;gap:11px;background:var(--surface);border:1.5px solid var(--line);
  border-radius:13px;padding:11px 12px;transition:border-color .15s,background .15s,transform .12s,opacity .12s}
.row.can-drag{cursor:grab;touch-action:none;user-select:none;-webkit-user-select:none}
.row.drag-source{opacity:.25;transform:scale(.985)}
.row.drop-target{border-color:var(--gold);background:var(--surface2);box-shadow:0 0 0 2px rgba(191,138,58,.18) inset}
.drag-ghost{position:fixed;left:0;top:0;z-index:1000;pointer-events:none;width:300px;
  box-shadow:0 18px 36px -18px rgba(0,0,0,.65);transform:rotate(-1deg) scale(1.03);
  opacity:.96;background:var(--surface)!important;border-color:var(--gold)!important}
.row.sel{border-color:var(--gold);background:var(--surface2)}
.row.fixed{border-color:var(--correct)}
.row.fixed .rank{background:var(--correct);color:#fff;border-color:var(--correct)}
.rank{font-family:"Oswald";font-weight:700;font-size:16px;width:30px;height:30px;flex:none;
  border:1.5px solid var(--line);border-radius:8px;display:grid;place-items:center;color:var(--ink2)}
.name{flex:1;min-width:0;font-weight:600;font-size:15px;line-height:1.2}
.val{font-family:"Oswald";font-weight:500;font-size:13px;color:var(--green);margin-left:6px;white-space:nowrap}
[data-theme=dark] .val{color:var(--gold)}
.arrows{display:flex;flex-direction:column;gap:2px;flex:none}
.arrows button{width:30px;height:18px;border:1.5px solid var(--line);border-radius:6px;
  background:var(--surface2);font-size:11px;line-height:1;color:var(--ink);display:grid;place-items:center}
.arrows button[disabled]{opacity:.3;cursor:default}
.tick{flex:none;width:20px;text-align:center;color:var(--correct);font-weight:800;font-size:16px}

/* ATTEMPTS + ACTION */
.attempts{display:flex;align-items:center;justify-content:center;gap:7px;margin:16px 0 12px}
.attempts .dot{width:11px;height:11px;border-radius:50%;border:1.5px solid var(--line);background:transparent}
.attempts .dot.used{background:var(--miss);border-color:var(--miss)}
.attempts .lab{font-size:12px;color:var(--ink2);margin-left:4px}
.cta-check{width:100%;padding:14px;border-radius:13px;background:var(--green);color:#fbf7ee;
  font-family:"Oswald";font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-size:16px}
.cta-check:active{transform:translateY(1px)}
.cta-check[disabled]{opacity:.5;cursor:default}
[data-theme=dark] .cta-check{color:#161310}

/* RESULT */
.result{margin-top:18px;background:var(--surface);border:1.5px solid var(--line);border-radius:16px;padding:18px;display:none}
.result.show{display:block}
.result h2{font-family:"Oswald";text-transform:uppercase;font-size:20px;margin:0 0 4px;color:var(--ink);letter-spacing:.04em}
.result .sub{font-size:13px;color:var(--ink2);margin-bottom:12px}
.result .src{font-size:11px;color:var(--ink2);margin-top:10px}
.share{margin-top:14px;width:100%;padding:12px;border-radius:12px;border:1.5px solid var(--green);
  color:var(--green);font-family:"Oswald";font-weight:700;text-transform:uppercase;letter-spacing:.06em;font-size:14px;background:transparent}
[data-theme=dark] .share{border-color:var(--gold);color:var(--gold)}
.foot{margin-top:auto;padding-top:22px;text-align:center}
.foot a{color:var(--green);font-weight:700;text-decoration:none;font-size:13px}
[data-theme=dark] .foot a{color:var(--gold)}

/* MODAL + TOAST */
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;padding:20px;z-index:30}
.scrim.show{display:flex}
.modal{background:var(--surface);border:1.5px solid var(--line);border-radius:18px;padding:22px;max-width:420px;width:100%}
.modal h2{font-family:"Oswald";text-transform:uppercase;font-size:20px;margin:0 0 12px;color:var(--ink);letter-spacing:.04em}
.modal p{font-size:14px;line-height:1.5;color:var(--ink);margin:0 0 10px}
.modal .x{float:right;font-size:20px;color:var(--ink2);margin-top:-4px}
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:var(--bg);padding:10px 18px;border-radius:30px;font-size:13px;font-weight:600;
  opacity:0;pointer-events:none;transition:.25s;z-index:40}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.notice{background:var(--surface);border:1.5px solid var(--line);border-radius:14px;padding:14px 15px;margin:0 0 14px;font-size:13px;line-height:1.45;color:var(--ink2);text-align:center}
.notice b{font-family:"Oswald";text-transform:uppercase;letter-spacing:.04em;color:var(--ink);font-size:15px}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <a class="back" href="index.html">← Szpilplac</a>
      <div class="controls">
        <div class="lang-tog" role="group" aria-label="Język">
          <button id="lPl" class="on">PL</button>
          <button id="lSzl">ŚL</button>
        </div>
        <button class="icon-btn" id="themeBtn" title="Motyw" aria-label="Zmień motyw"></button>
        <button class="icon-btn" id="helpBtn" title="Jak grać" aria-label="Jak grać">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="8" cy="8" r="6.5"/><path d="M6 6.5a2 2 0 113 1.73c-.6.35-1 .97-1 1.77"/><circle cx="8" cy="12" r=".7" fill="currentColor" stroke="none"/></svg>
        </button>
      </div>
    </div>
    <div class="brand">
      <h1>Zorta</h1>
      <p id="tagline">Co tydzień jedna śląska zagadka — poukładaj</p>
    </div>
  </header>

  <div class="weeknav">
    <button id="prevWk" title="Poprzedni tydzień">‹</button>
    <div class="wk" id="wkLabel">Tydzień —<small></small></div>

  <div class="banner" id="banner" style="display:none">

</div>

<div class="scrim" id="helpScrim">
  <div class="modal">
    <button class="x" id="helpClose">✕</button>
    <h2 id="howTitle">Jak grać</h2>
    <div id="howBody"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="config.js"></script>
<script>
/* ── STORE (z fallbackiem jak w Słōwku) ─────────────────────────────── */
var store=(function(){var m={},ok=false;
  try{localStorage.setItem("__t","1");localStorage.removeItem("__t");ok=true;}catch(e){}
  return{get:function(k){try{return ok?localStorage.getItem(k):(m[k]||null);}catch(e){return m[k]||null;}},
         set:function(k,v){try{ok?localStorage.setItem(k,v):(m[k]=v);}catch(e){m[k]=v;}}};})();

/* ── KONFIGURACJA ───────────────────────────────────────────────────── */
var SUPABASE_URL=(window.SZPILPLAC_CONFIG&&window.SZPILPLAC_CONFIG.SUPABASE_URL)||"";
var SUPABASE_ANON_KEY=(window.SZPILPLAC_CONFIG&&window.SZPILPLAC_CONFIG.SUPABASE_ANON_KEY)||"";
function loadConfig(){
  return (SUPABASE_URL&&SUPABASE_ANON_KEY) ? Promise.resolve() : Promise.reject(new Error("config"));
}
var TEST_PASSWORD="starzik";
var MAX_TRIES=4;
var LANG_KEY="familock_lang", THEME_KEY="szpilplac_theme";

var IS_TESTER=(function(){try{return new URLSearchParams(location.search).get("test")===TEST_PASSWORD;}catch(e){return false;}})();

/* ── NUMERACJA TYGODNIA (epoka 2026-06-23, czas Polski) ─────────────── */
function warsawDay(d){
  var p=new Intl.DateTimeFormat("en-CA",{timeZone:"Europe/Warsaw",year:"numeric",month:"2-digit",day:"2-digit"}).formatToParts(d),o={};
  p.forEach(function(x){if(x.type!=="literal")o[x.type]=Number(x.value);});
  return Date.UTC(o.year,o.month-1,o.day);
}
function todayWeek(){return Math.max(0,Math.floor((warsawDay(new Date())-Date.UTC(2026,5,23))/86400000/7));}
var TW=todayWeek();
var currentWeek=TW;

/* ── RPC + STATY ────────────────────────────────────────────────────── */
function rpc(fn,args){
  return fetch(SUPABASE_URL+"/rest/v1/rpc/"+fn,{method:"POST",
    headers:{"Content-Type":"application/json","Accept":"application/json",
      "apikey":SUPABASE_ANON_KEY,"Authorization":"Bearer "+SUPABASE_ANON_KEY},
    body:JSON.stringify(args||{})}).then(function(r){
      return r.text().then(function(t){
        var data=null;try{data=t?JSON.parse(t):null;}catch(e){data=t;}
        if(!r.ok){var msg=(data&&(data.message||data.details||data.hint||data.code))||t||r.status;throw new Error(fn+" "+r.status+" "+msg);}
        return data;
      });
    });
}
function trackEvent(p){
  fetch(SUPABASE_URL+"/rest/v1/szpilplac_events",{method:"POST",
    headers:{"Content-Type":"application/json","apikey":SUPABASE_ANON_KEY,
      "Authorization":"Bearer "+SUPABASE_ANON_KEY,"Prefer":"return=minimal"},
    body:JSON.stringify(p)}).catch(function(){});
}

/* ── NAPISY ─────────────────────────────────────────────────────────── */
var S={
  pl:{tag:"Co tydzień jedna śląska zagadka — poukładaj",check:"Sprawdź",
    triesLab:"prób",win:"Poukładane!",lose:"Nie tym razem",
    winSub:["Perfekcyjnie!","Brawo!","Idealnie!","Ekstra!"],loseSub:"Tak wyglądała właściwa kolejność:",
    correctOrder:"Właściwa kolejność:",share:"Podziel się wynikiem",copied:"Skopiowano do schowka",
    howT:"Jak grać",how:"Co tydzień dostajesz pięć rzeczy ze Śląska i jedno kryterium — uszereguj je we właściwej kolejności (strzałka pokazuje od czego do czego).<br><br>Stuknij jeden kafelek, potem drugi — zamienią się miejscami. Strzałkami ▲▼ przesuniesz po jednym. Masz 4 próby. Po każdej zielone pozycje są na właściwym miejscu.<br><br>Strzałkami ‹ › u góry cofniesz się do wcześniejszych tygodni.",
    wk:"Tydzień",today:"ten tydzień",tester:"tryb testera",load:"Ładowanie…",
    err:"Nie udało się wczytać zagadki. Spróbuj odświeżyć."},
  sl:{tag:"Co tydziyń jedna ślōnsko zagodka — poukłŏdej",check:"Wejrzij",
    triesLab:"prōb",win:"Poukłŏdane!",lose:"Niy tym razym",
    winSub:["Perfekt!","Brawo!","Idealnie!","Ekstra!"],loseSub:"Tak szła dobro kolejność:",
    correctOrder:"Dobro kolejność:",share:"Podziel sie wynikym",copied:"Skopiowane",
    howT:"Jak grać",how:"Co tydziyń dostŏwosz piyńć rzeczy ze Ślōnska i jedno kryterium — poukłŏdej je po porządku (strzałka pokazuje ôd czego do czego).<br><br>Klyknij jedyn kafelek, potym drugi — zamiyniōm sie miyjscami. Strzałkami ▲▼ przesuniesz po jednym. Mŏsz 4 prōby.<br><br>Strzałkami ‹ › na wiyrchu cŏfniesz sie do wcześniyjszych tydni.",
    wk:"Tydziyń",today:"tyn tydziyń",tester:"tryb testera",load:"Ładowanie…",
    err:"Niy szło wczytać zagodki. Sprōbuj ôdświyżyć."}
};
var lang=(store.get(LANG_KEY)==="szl"||store.get(LANG_KEY)==="SL")?"sl":"pl";
function L(){return S[lang];}

/* Etykiety kierunku per kryterium (rosnaco = wg rosnącej wartości) */
var DIR={
  "liczba mieszkańców":      {a:"od najmniej ludnego → do najludniejszego", d:"od najludniejszego → do najmniej ludnego"},
  "powierzchnia miasta":     {a:"od najmniejszego → do największego",       d:"od największego → do najmniejszego"},
  "rok nadania praw miejskich":{a:"od najstarszych praw → do najnowszych",   d:"od najnowszych praw → do najstarszych"},
  "rok wydarzenia":          {a:"od najdawniejszego → do najnowszego",       d:"od najnowszego → do najdawniejszego"},
  "rok urodzenia":           {a:"od najstarszego → do najmłodszego",         d:"od najmłodszego → do najstarszego"},
  "rok założenia klubu":     {a:"od najstarszego klubu → do najmłodszego",   d:"od najmłodszego klubu → do najstarszego"},
  "położenie: północ–południe":{a:"od najdalej na południe → na północ",     d:"od najdalej na północ → na południe"},
  "położenie: zachód–wschód":{a:"od najdalej na zachód → na wschód",         d:"od najdalej na wschód → na zachód"}
};
function dirText(kryt,kier){var m=DIR[kryt]||{a:"od najmniejszej wartości → do największej",d:"od największej → do najmniejszej"};return kier==="rosnaco"?m.a:m.d;}

/* ── STAN PER TYDZIEŃ ───────────────────────────────────────────────── */
function wkKey(w){return "zorta_d"+w;}
function loadState(w){try{return JSON.parse(store.get(wkKey(w))||"null");}catch(e){return null;}}
function saveState(w,s){store.set(wkKey(w),JSON.stringify(s));}
function clearState(w){try{store.set(wkKey(w),"");}catch(e){}}
function sameMembers(a,b){
  if(!Array.isArray(a)||!Array.isArray(b)||a.length!==b.length)return false;
  return a.slice().sort().join("\u0001")===b.slice().sort().join("\u0001");
}
function sanitizeState(st,pozycje){
  if(!st||!Array.isArray(st.order)||!sameMembers(st.order,pozycje))return null;
  var h=Array.isArray(st.history)?st.history:[];
  h=h.filter(function(m){return Array.isArray(m)&&m.length===pozycje.length;});
  var stStatus=(st.status==="won"||st.status==="lost")?st.status:"playing";
  if(stStatus==="playing"&&h.length>=MAX_TRIES)return null;
  if(h.length>MAX_TRIES)h=h.slice(0,MAX_TRIES);
  return {order:st.order.slice(),history:h,status:stStatus};
}

var meta=null;      // dane z zorta_day
var order=[];       // bieżąca kolejność nazw (od pozycji 1)
var history=[];     // tablica masek z prób
var status="playing";
var selIdx=-1;      // wybrany kafelek (do zamiany dwoma stuknięciami)
var revealMap=null; // {nazwa:wartosc} po zakończeniu
var revealOrder=null;
var dragFrom=-1;
var dragTo=-1;
var dragMoved=false;
var dragStartX=0;
var dragStartY=0;
var dragOffsetX=0;
var dragOffsetY=0;
var dragGhost=null;
var suppressClick=false;

var DEMO=false;
var DEMO_META={
  kategoria:"miasta",
  kryterium:"liczba mieszkańców",
  kierunek:"rosnaco",
  jednostka:"os.",
  zrodlo:"tryb podglądu lokalnego",
  pozycje:["Chorzów","Katowice","Świętochłowice","Gliwice","Bytom"]
};
var DEMO_VALUES={"Świętochłowice":49000,"Chorzów":103000,"Bytom":153000,"Gliwice":171000,"Katowice":280000};
var DEMO_ORDER=["Świętochłowice","Chorzów","Bytom","Gliwice","Katowice"];
function startDemo(reason){
  DEMO=true;
  showNotice("<b>Tryb podglądu</b><br>Nie widzę Supabase albo pliku <code>config.js</code>, więc pokazuję testową zagadkę. Po wrzuceniu na serwer obok <code>config.js</code> gra pobierze prawdziwe dane.");
  loadWeek(TW);
}
function demoLoadWeek(w){
  currentWeek=w;selIdx=-1;revealMap=null;revealOrder=null;
  $("result").classList.remove("show");
  $("banner").style.display="block";
  updateWeekNav();
  meta=DEMO_META;
  $("eyebrow").textContent=meta.kategoria.toUpperCase();
  $("crit").textContent=meta.kryterium.charAt(0).toUpperCase()+meta.kryterium.slice(1);
  $("dirText").textContent=dirText(meta.kryterium,meta.kierunek);
  $("dirArrow").textContent=(meta.kierunek==="rosnaco")?"↓":"↑";
  var st=sanitizeState(loadState(w),meta.pozycje);
  if(st){order=st.order;history=st.history;status=st.status;}
  else{order=meta.pozycje.slice();history=[];status="playing";clearState(w);}
  renderList();renderAttempts();
  if(status==="playing"){$("checkBtn").style.display="block";$("checkBtn").disabled=false;}
  else{revealMap=DEMO_VALUES;revealOrder=DEMO_ORDER;showResult(status==="won");}
}
function demoCheck(){
  if(status!=="playing")return;
  var mask=order.map(function(name,i){return name===DEMO_ORDER[i];});
  history.push(mask);
  var ok=mask.every(Boolean);
  if(ok){status="won";revealMap=DEMO_VALUES;revealOrder=DEMO_ORDER;persist();finishUp(true);}
  else if(history.length>=MAX_TRIES){status="lost";revealMap=DEMO_VALUES;revealOrder=DEMO_ORDER;persist();finishUp(false);}
  else{persist();renderList();renderAttempts();}
}

/* ── RENDER ─────────────────────────────────────────────────────────── */
var $=function(id){return document.getElementById(id);};
function showNotice(html){var n=$("notice");if(!n)return;n.innerHTML=html;n.style.display="block";}
function hideNotice(){var n=$("notice");if(!n)return;n.style.display="none";}

function lastMask(){return history.length?history[history.length-1]:null;}

function renderList(){
  var ul=$("list");ul.innerHTML="";
  var locked=(status!=="playing");
  var mask=lastMask();
  order.forEach(function(name,i){
    var li=document.createElement("li");li.className="row";li.dataset.index=i;
    if(!locked)li.className+=" can-drag";
    if(selIdx===i)li.className+=" sel";
    if(mask&&mask[i])li.className+=" fixed";
    var fixed=!!(mask&&mask[i]);
    var html='<div class="rank">'+(i+1)+'</div><div class="name">'+name+'</div>';
    if(!locked){
      html+='<div class="arrows">'
        +'<button data-up="'+i+'" '+(i===0?'disabled':'')+'>▲</button>'
        +'<button data-down="'+i+'" '+(i===order.length-1?'disabled':'')+'>▼</button></div>';
    }else if(fixed){ html+='<div class="tick">✓</div>'; }
    li.innerHTML=html;
    if(!locked){
      li.addEventListener("click",function(e){
        if(e.target.closest(".arrows"))return;
        if(suppressClick||dragMoved)return;
        pick(i);
      });
      attachDrag(li,i);
    }
    ul.appendChild(li);
  });
  ul.querySelectorAll("[data-up]").forEach(function(b){b.addEventListener("click",function(e){e.stopPropagation();move(+b.dataset.up,-1);});});
  ul.querySelectorAll("[data-down]").forEach(function(b){b.addEventListener("click",function(e){e.stopPropagation();move(+b.dataset.down,1);});});
}

function removeDragGhost(){
  if(dragGhost&&dragGhost.parentNode)dragGhost.parentNode.removeChild(dragGhost);
  dragGhost=null;
}
function clearDragClasses(){
  document.querySelectorAll(".row.drag-source,.row.drop-target").forEach(function(el){
    el.classList.remove("drag-source","drop-target");
  });
  removeDragGhost();
}
function makeDragGhost(li,e){
  removeDragGhost();
  var rect=li.getBoundingClientRect();
  dragOffsetX=e.clientX-rect.left;
  dragOffsetY=e.clientY-rect.top;
  dragGhost=li.cloneNode(true);
  dragGhost.className="row drag-ghost";
  dragGhost.style.width=rect.width+"px";
  dragGhost.style.height=rect.height+"px";
  document.body.appendChild(dragGhost);
  positionDragGhost(e);
  li.classList.add("drag-source");
}
function positionDragGhost(e){
  if(!dragGhost)return;
  dragGhost.style.left=(e.clientX-dragOffsetX)+"px";
  dragGhost.style.top=(e.clientY-dragOffsetY)+"px";
}
function reorder(from,to){
  if(from<0||to<0||from===to||from>=order.length||to>=order.length)return;
  var item=order.splice(from,1)[0];
  order.splice(to,0,item);
  selIdx=-1;persist();renderList();
}
function dragOverIndex(x,y){
  var rows=[].slice.call(document.querySelectorAll("#list .row"));
  if(!rows.length)return -1;
  for(var r=0;r<rows.length;r++){
    var rect=rows[r].getBoundingClientRect();
    if(y>=rect.top&&y<=rect.bottom)return +rows[r].dataset.index;
  }
  var first=rows[0].getBoundingClientRect();
  var last=rows[rows.length-1].getBoundingClientRect();
  if(y<first.top)return 0;
  if(y>last.bottom)return rows.length-1;
  return -1;
}
function markDropTarget(i){
  document.querySelectorAll(".row.drop-target").forEach(function(el){el.classList.remove("drop-target");});
  var row=document.querySelector('#list .row[data-index="'+i+'"]');
  if(row)row.classList.add("drop-target");
}
function attachDrag(li,i){
  li.addEventListener("pointerdown",function(e){
    if(e.button!=null&&e.button!==0)return;
    if(e.target.closest(".arrows"))return;
    dragFrom=i;dragTo=i;dragMoved=false;dragStartX=e.clientX;dragStartY=e.clientY;
    try{li.setPointerCapture&&li.setPointerCapture(e.pointerId);}catch(err){}
  });
  li.addEventListener("pointermove",function(e){
    if(dragFrom!==i)return;
    var dist=Math.abs(e.clientX-dragStartX)+Math.abs(e.clientY-dragStartY);
    if(!dragMoved&&dist>7){dragMoved=true;makeDragGhost(li,e);}
    if(dragMoved){
      e.preventDefault();
      positionDragGhost(e);
      var target=dragOverIndex(e.clientX,e.clientY);
      if(target>=0){dragTo=target;markDropTarget(target);}
    }
  });
  li.addEventListener("pointerup",function(e){
    if(dragFrom===i&&dragMoved){
      e.preventDefault();
      suppressClick=true;
      reorder(dragFrom,dragTo);
      setTimeout(function(){suppressClick=false;dragMoved=false;},180);
    }else{
      setTimeout(function(){dragMoved=false;},0);
    }
    try{li.releasePointerCapture&&li.releasePointerCapture(e.pointerId);}catch(err){}
    clearDragClasses();dragFrom=-1;
  });
  li.addEventListener("pointercancel",function(){
    clearDragClasses();dragFrom=-1;dragMoved=false;setTimeout(function(){suppressClick=false;},80);
  });
}

function pick(i){
  if(status!=="playing")return;
  if(selIdx===-1){selIdx=i;}
  else if(selIdx===i){selIdx=-1;}
  else{var t=order[selIdx];order[selIdx]=order[i];order[i]=t;selIdx=-1;persist();}
  renderList();
}
function move(i,dir){
  var j=i+dir;if(j<0||j>=order.length)return;
  var t=order[i];order[i]=order[j];order[j]=t;selIdx=-1;persist();renderList();
}
function persist(){saveState(currentWeek,{order:order,history:history,status:status});}

function renderAttempts(){
  var box=$("attempts");box.innerHTML="";box.style.display=(status==="playing")?"flex":"none";
  var used=Math.min(history.length,MAX_TRIES);
  for(var i=0;i<MAX_TRIES;i++){var d=document.createElement("span");d.className="dot"+(i<used?" used":"");box.appendChild(d);}
  var lab=document.createElement("span");lab.className="lab";
  lab.textContent=Math.max(0,MAX_TRIES-history.length)+" "+L().triesLab;box.appendChild(lab);
}

function fmtVal(v,unit){
  if(unit==="os."){return Number(v).toLocaleString("pl-PL")+" os.";}
  if(unit==="°N"||unit==="°E"){return Number(v).toFixed(3).replace(".",",")+" "+unit;}
  if(unit==="km²"){return v+" km²";}
  if(unit==="rok"){return v;}
  return v+(unit?(" "+unit):"");
}

function showResult(won){
  $("attempts").style.display="none";$("checkBtn").style.display="none";
  var r=$("result");r.classList.add("show");
  $("resTitle").textContent=won?L().win:L().lose;
  $("resSub").textContent=won?L().winSub[Math.floor(Math.random()*L().winSub.length)]:L().loseSub;
  // lista poprawnej kolejności z wartościami
  var ul=$("resList");ul.innerHTML="";
  var corr=revealOrder||order;
  corr.forEach(function(name,i){
    var li=document.createElement("li");li.className="row";
    var val=(revealMap&&revealMap[name]!=null)?'<span class="val">'+fmtVal(revealMap[name],meta.jednostka)+'</span>':'';
    li.innerHTML='<div class="rank">'+(i+1)+'</div><div class="name">'+name+'</div>'+val;
    ul.appendChild(li);
  });
  $("resSrc").textContent=(meta.zrodlo?("źródło: "+meta.zrodlo):"");
}

/* ── PRÓBA ──────────────────────────────────────────────────────────── */
function check(){
  if(DEMO){demoCheck();return;}
  if(status!=="playing")return;
  if(history.length>=MAX_TRIES){history=[];persist();renderAttempts();}
  $("checkBtn").disabled=true;
  rpc("zorta_guess",{p_week:currentWeek,p_order:order}).then(function(res){
    $("checkBtn").disabled=false;
    if(res&&res.blad){toast("Błąd listy: "+res.blad);return;}
    history.push(res.maska);
    if(res.ok){
      status="won";revealMap=res.wartosci;revealOrder=res.kolejnosc;
      persist();finishUp(true);
    }else if(history.length>=MAX_TRIES){
      status="lost";persist();
      rpc("zorta_reveal",{p_week:currentWeek}).then(function(rv){
        revealMap=rv.wartosci;revealOrder=rv.kolejnosc;finishUp(false);
      }).catch(function(){finishUp(false);});
    }else{
      persist();renderList();renderAttempts();
    }
  }).catch(function(err){
    $("checkBtn").disabled=false;
    console.warn("Zorta guess error",err);
    showNotice("<b>Błąd sprawdzania</b><br>Dane tygodnia się wczytały, ale funkcja <code>zorta_guess</code> w Supabase zwróciła błąd. Najczęściej pomaga ponowne wgranie końcówki <code>zorta.sql</code> z funkcjami RPC.");
    toast("Błąd sprawdzania. Zobacz konsolę.");
  });
}

function finishUp(won){
  renderList();renderAttempts();showResult(won);
  if(!DEMO&&currentWeek<=TW){ // nie loguj „przyszłych" testerskich tygodni
    trackEvent({game:"zorta",puzzle_no:currentWeek+1,puzzle_word:meta.kategoria,
      won:won,tries:history.length,max_tries:MAX_TRIES,lang:lang,
      mode:IS_TESTER?"tester":"supabase"});
  }
}

/* ── ŁADOWANIE TYGODNIA ─────────────────────────────────────────────── */
function loadWeek(w){
  if(DEMO){demoLoadWeek(w);return;}
  currentWeek=w;selIdx=-1;
  $("result").classList.remove("show");$("banner").style.display="none";
  $("list").innerHTML="";$("checkBtn").style.display="none";$("attempts").style.display="none";
  updateWeekNav();
  rpc("zorta_day",{p_week:w}).then(function(m){
    hideNotice();
    meta=m;
    $("banner").style.display="block";
    $("eyebrow").textContent=m.kategoria.toUpperCase();
    $("crit").textContent=m.kryterium.charAt(0).toUpperCase()+m.kryterium.slice(1);
    $("dirText").textContent=dirText(m.kryterium,m.kierunek);
    $("dirArrow").textContent=(m.kierunek==="rosnaco")?"↓":"↑";
    var st=sanitizeState(loadState(w),m.pozycje);
    if(st){
      order=st.order;history=st.history;status=st.status;
    }else{order=m.pozycje.slice();history=[];status="playing";clearState(w);}
    renderList();renderAttempts();
    if(status==="playing"){
      $("checkBtn").style.display="block";$("checkBtn").disabled=false;
    }else{
      // odtwórz ujawnienie
      if(status==="won"){
        rpc("zorta_reveal",{p_week:w}).then(function(rv){revealMap=rv.wartosci;revealOrder=rv.kolejnosc;showResult(true);}).catch(function(){showResult(true);});
      }else{
        rpc("zorta_reveal",{p_week:w}).then(function(rv){revealMap=rv.wartosci;revealOrder=rv.kolejnosc;showResult(false);}).catch(function(){showResult(false);});
      }
    }
  }).catch(function(){showNotice("<b>Nie udało się wczytać zagadki</b><br>Sprawdź, czy w Supabase został wgrany <code>zorta.sql</code> i czy funkcje RPC są dostępne.");toast(L().err);});
}

function updateWeekNav(){
  $("prevWk").disabled=(currentWeek<=0);
  $("nextWk").disabled=(!IS_TESTER && currentWeek>=TW);
  var tag=(currentWeek===TW)?(" · "+L().today):(IS_TESTER&&currentWeek>TW?(" · "+L().tester):"");
  $("wkLabel").innerHTML=L().wk+" "+(currentWeek+1)+"<small>"+(tag?tag.replace(" · ",""):"&nbsp;")+"</small>";
}

/* ── SHARE ──────────────────────────────────────────────────────────── */
function buildShare(){
  var head="Zorta · "+L().wk.toLowerCase()+" "+(currentWeek+1)+" · "+(status==="won"?history.length:"X")+"/"+MAX_TRIES;
  var grid=history.map(function(m){return m.map(function(b){return b?"🟩":"⬜";}).join("");}).join("\n");
  return head+"\n"+grid+"\nszpilplac.familock.pl";
}
function share(){
  var txt=buildShare();
  if(navigator.share){navigator.share({text:txt}).catch(function(){});return;}
  navigator.clipboard.writeText(txt).then(function(){toast(L().copied);}).catch(function(){toast(txt);});
}

/* ── UI: motyw / język / pomoc / nawigacja ──────────────────────────── */
var ICO={
  sun:'<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="8" cy="8" r="3.5"/><line x1="8" y1=".5" x2="8" y2="2.5"/><line x1="8" y1="13.5" x2="8" y2="15.5"/><line x1=".5" y1="8" x2="2.5" y2="8"/><line x1="13.5" y1="8" x2="15.5" y2="8"/><line x1="2.57" y1="2.57" x2="3.99" y2="3.99"/><line x1="12.01" y1="12.01" x2="13.43" y2="13.43"/><line x1="13.43" y1="2.57" x2="12.01" y2="3.99"/><line x1="3.99" y1="12.01" x2="2.57" y2="13.43"/></svg>',
  moon:'<svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M13.5 10.5a5.5 5.5 0 01-7.07-7.07A6 6 0 1013.5 10.5z"/></svg>'
};
function applyTheme(t){document.documentElement.setAttribute("data-theme",t);store.set(THEME_KEY,t);$("themeBtn").innerHTML=(t==="dark")?ICO.sun:ICO.moon;}
function applyLang(){
  $("lPl").className=lang==="pl"?"on":"";
  $("lSzl").className=lang==="sl"?"on":"";
  $("tagline").textContent=L().tag;$("checkBtn").textContent=L().check;
  $("shareBtn").textContent=L().share;$("howTitle").textContent=L().howT;$("howBody").innerHTML=L().how;
  if(meta){ // odśwież teksty zależne od danych
    $("dirText").textContent=dirText(meta.kryterium,meta.kierunek);
  }
  updateWeekNav();renderAttempts();
}
function toast(t){var el=$("toast");el.textContent=t;el.classList.add("show");setTimeout(function(){el.classList.remove("show");},1900);}

$("themeBtn").addEventListener("click",function(){applyTheme(document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark");});
$("lPl").addEventListener("click",function(){lang="pl";store.set(LANG_KEY,"pl");applyLang();if(meta&&status!=="playing"){showResult(status==="won");}});
$("lSzl").addEventListener("click",function(){lang="sl";store.set(LANG_KEY,"szl");applyLang();if(meta&&status!=="playing"){showResult(status==="won");}});
$("helpBtn").addEventListener("click",function(){$("helpScrim").classList.add("show");});
$("helpClose").addEventListener("click",function(){$("helpScrim").classList.remove("show");});
$("helpScrim").addEventListener("click",function(e){if(e.target===$("helpScrim"))$("helpScrim").classList.remove("show");});
$("checkBtn").addEventListener("click",check);
$("shareBtn").addEventListener("click",share);
$("prevWk").addEventListener("click",function(){if(currentWeek>0)loadWeek(currentWeek-1);});
$("nextWk").addEventListener("click",function(){if(IS_TESTER||currentWeek<TW)loadWeek(currentWeek+1);});

/* ── START ──────────────────────────────────────────────────────────── */
applyTheme(store.get(THEME_KEY)==="dark"?"dark":"light");
applyLang();
loadConfig().then(function(){loadWeek(TW);}).catch(function(){startDemo("config");});
</script>
