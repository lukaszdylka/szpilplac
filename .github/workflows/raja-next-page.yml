name: One-shot Raja next page

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.head_commit.message == 'Add one-shot Raja next page generator' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Write page
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          data = """"""
          Path("raja-next.html").write_bytes(base64.b64decode(data))
          PY
      - name: Commit page
        run: |
          if git diff --quiet -- raja-next.html; then
            echo "No page changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add raja-next.html
          git commit -m "Add Raja next days preview"
          git push
