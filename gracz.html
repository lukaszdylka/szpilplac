<style>
:root{--bg:#f0e8d4;--surface:#fbf7ee;--surface2:#f3ecda;--ink:#23201a;--ink2:#6a6150;--line:#c9bfa6;--green:#2f4a39;--gold:#bf8a3a;--danger:#b5482f;--shadow:0 10px 28px -18px rgba(35,32,26,.55)}

*{box-sizing:border-box}html,body{margin:0;min-height:100%}
body{min-height:100vh;padding:0 16px 40px;background:radial-gradient(circle at top left,rgba(191,138,58,.14),transparent 34%),var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
:focus-visible{outline:3px solid var(--gold);outline-offset:3px;border-radius:8px}
header,main,footer{width:100%;max-width:780px}header{padding-top:18px}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:16px}.site-name{font-family:Oswald,system-ui,sans-serif;font-size:clamp(32px,6vw,46px);line-height:.95;text-transform:uppercase}.site-sub{margin-top:4px;color:var(--ink2);font-size:12px}.controls{display:flex;align-items:center;gap:7px;padding-top:8px}.icon-btn{width:36px;height:36px;display:grid;place-items:center;border:1px solid var(--line);border-radius:999px;background:var(--surface2);color:var(--ink2)}.icon-btn:hover{background:var(--surface);color:var(--ink)}
.card{border:1px solid var(--line);border-radius:18px;background:var(--surface);box-shadow:var(--shadow);padding:18px}
footer{margin-top:22px;color:var(--ink2);font-size:12px;text-align:center}.footer-links{display:flex;justify-content:center;gap:8px;flex-wrap:wrap}.footer-links a{min-height:32px;display:inline-flex;align-items:center;justify-content:center;padding:7px 11px;border:1px solid var(--line);border-radius:999px;background:var(--surface2);font-size:11px;font-weight:800}.footer-links a:hover{background:var(--surface);color:var(--green)}
@media(max-width:560px){body{padding-left:12px;padding-right:12px}.topbar{align-items:flex-start}.site-name{font-size:34px}.card{padding:15px;border-radius:16px}.controls{gap:4px}.icon-btn{width:32px;height:32px}}
</style>

<script>
(function(){
  "use strict";
  var KEY="szpilplac_theme";
  function apply(){var theme=localStorage.getItem(KEY)||"dark";document.documentElement.setAttribute("data-theme",theme);var b=document.getElementById("themeBtn");if(b)b.innerHTML=theme==="dark"?'<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="8" cy="8" r="3.5"/><line x1="8" y1="0.5" x2="8" y2="2.5"/><line x1="8" y1="13.5" x2="8" y2="15.5"/><line x1="0.5" y1="8" x2="2.5" y2="8"/><line x1="13.5" y1="8" x2="15.5" y2="8"/></svg>':'<svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M13.5 10.5a5.5 5.5 0 01-7.07-7.07A6 6 0 1013.5 10.5z"/></svg>';}
  apply();
  document.getElementById("themeBtn").addEventListener("click",function(){localStorage.setItem(KEY,(localStorage.getItem(KEY)||"dark")==="dark"?"light":"dark");apply();});
})();
</script>
