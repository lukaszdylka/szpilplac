<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pong · Szpilplac</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0e8d4;
  --surface:#fbf7ee;
  --surface2:#f3ecda;
  --ink:#23201a;
  --ink2:#6a6150;
  --line:#c9bfa6;
  --green:#2f4a39;
  --gold:#bf8a3a;
  --correct:#3f8a5a;
  --danger:#b5482f;
  --shadow:0 10px 28px -18px rgba(35,32,26,.55);
}
[data-theme=dark]{
  --bg:#161310;
  --surface:#262018;
  --surface2:#2e2820;
  --ink:#ede5d0;
  --ink2:#aaa18d;
  --line:#3d3629;
  --green:#4a7a56;
  --gold:#d4a04a;
  --correct:#4a9a6a;
  --danger:#d76a4f;
  --shadow:0 10px 30px -18px rgba(0,0,0,.7);
}
*{box-sizing:border-box; touch-action:manipulation;}
html,body{margin:0;min-height:100%}
body{
  min-height:100vh;
  padding:16px 14px 26px;
  background:var(--bg);
  color:var(--ink);
  font-family:Inter,system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  display:flex;
  flex-direction:column;
  align-items:center;
  transition:background-color .2s ease, color .2s ease;
  overscroll-behavior:none;
  user-select:none;
  -webkit-user-select:none;
}
.topbar{
  width:100%;
  max-width:700px;
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  margin-bottom:6px;
}
h1{
  margin:0 0 2px;
  font-family:Oswald,system-ui,sans-serif;
  font-size:clamp(28px,5vw,42px);
  letter-spacing:.04em;
  text-transform:uppercase;
  color:var(--ink);
}
.sub{
  color:var(--ink2);
  font-size:12px;
  letter-spacing:.03em;
  text-transform:uppercase;
  font-weight:700;
}
.theme-btn{
  width:38px;
  height:38px;
  flex:none;
  display:grid;
  place-items:center;
  border:1px solid var(--line);
  border-radius:999px;
  background:var(--surface2);
  color:var(--ink2);
  cursor:pointer;
}
.theme-btn:hover{background:var(--surface);color:var(--ink)}
#score{
  display:flex;
  align-items:center;
  gap:22px;
  margin:10px 0 12px;
  font-family:Oswald,system-ui,sans-serif;
  font-size:clamp(24px,5vw,30px);
  letter-spacing:.02em;
}
#score span{
  min-width:44px;
  text-align:center;
  padding:4px 10px;
  border:1px solid var(--line);
  border-radius:12px;
  background:var(--surface);
  box-shadow:var(--shadow);
}
#scoreLeft{color:var(--green)}
#scoreRight{color:var(--danger)}
.vs{color:var(--ink2);font-size:16px;font-weight:900}
.game-wrap{
  position:relative;
  width:100%;
  max-width:700px;
}
canvas{
  display:block;
  width:100%;
  height:auto;
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:22px;
  box-shadow:var(--shadow);
  touch-action:none;
}
#info{
  margin-top:14px;
  color:var(--ink2);
  font-size:12px;
  text-align:center;
  line-height:1.5;
}
#info .desktop-only{display:inline}
#info .mobile-only{display:none}
#startBtn{
  margin-top:14px;
  min-height:46px;
  padding:11px 28px;
  font:inherit;
  font-size:14px;
  font-weight:900;
  letter-spacing:.03em;
  text-transform:uppercase;
  border:none;
  border-radius:999px;
  background:var(--green);
  color:#fff;
  cursor:pointer;
  box-shadow:var(--shadow);
  transition:transform .12s ease, filter .12s ease;
}
#startBtn:hover{filter:brightness(1.08);transform:translateY(-1px)}
#startBtn:active{transform:translateY(0)}

/* Sterowanie dotykowe - widoczne tylko na urządzeniach dotykowych/wąskich ekranach */
.touch-controls{
  display:none;
  width:100%;
  max-width:700px;
  justify-content:space-between;
  gap:10px;
  margin-top:12px;
}
.touch-side{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.touch-btn{
  min-height:56px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:1px solid var(--line);
  border-radius:16px;
  background:var(--surface2);
  color:var(--ink);
  font-size:20px;
  font-weight:900;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.touch-btn:active{background:var(--surface);}
.touch-label{
  text-align:center;
  color:var(--ink2);
  font-size:10px;
  font-weight:900;
  letter-spacing:.06em;
  text-transform:uppercase;
  margin-bottom:-2px;
}

@media(pointer:coarse){
  .touch-controls{display:flex}
  #info .desktop-only{display:none}
  #info .mobile-only{display:inline}
}
@media(max-width:520px){
  .touch-controls{display:flex}
  #info .desktop-only{display:none}
  #info .mobile-only{display:inline}
}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <h1>Pong</h1>
    <div class="sub">Szpilplac · Familock</div>
  </div>
  <button class="theme-btn" id="themeBtn" type="button" aria-label="Zmień motyw"></button>
</div>

<div id="score"><span id="scoreLeft">0</span><span class="vs">:</span><span id="scoreRight">0</span></div>

<div class="game-wrap">
  <canvas id="game" width="700" height="420"></canvas>
</div>

<div id="info">
  <span class="desktop-only">Sterowanie: W / S lub ↑ / ↓</span>
  <span class="mobile-only">Sterowanie: przyciski poniżej lub przeciągnij palcem po ekranie</span>
  &nbsp;·&nbsp; Gra do 3 punktów &nbsp;·&nbsp; Wygrywaj pod rząd i bij rekord serii
</div>

<div class="touch-controls">
  <div class="touch-side">
    <div class="touch-label">Góra</div>
    <div class="touch-btn" id="btnUp">▲</div>
    <div class="touch-label">Dół</div>
    <div class="touch-btn" id="btnDown">▼</div>
  </div>
</div>

<button id="startBtn">Start</button>

<script src="minigry-stats.js?v=1" data-game="pong"></script>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const root = document.documentElement;
const THEME_KEY = 'pong_szpilplac_theme';

const ICO_SUN = '<svg width="17" height="17" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="8" cy="8" r="3.5"/><line x1="8" y1="0.5" x2="8" y2="2.5"/><line x1="8" y1="13.5" x2="8" y2="15.5"/><line x1="0.5" y1="8" x2="2.5" y2="8"/><line x1="13.5" y1="8" x2="15.5" y2="8"/><line x1="2.57" y1="2.57" x2="3.99" y2="3.99"/><line x1="12.01" y1="12.01" x2="13.43" y2="13.43"/><line x1="13.43" y1="2.57" x2="12.01" y2="3.99"/><line x1="3.99" y1="12.01" x2="2.57" y2="13.43"/></svg>';
const ICO_MOON = '<svg width="17" height="17" viewBox="0 0 16 16" fill="currentColor"><path d="M13.5 10.5a5.5 5.5 0 01-7.07-7.07A6 6 0 1013.5 10.5z"/></svg>';

function getStoredTheme(){
  try { return localStorage.getItem(THEME_KEY); } catch(e){ return null; }
}
function setStoredTheme(v){
  try { localStorage.setItem(THEME_KEY, v); } catch(e){}
}
function applyTheme(theme){
  root.setAttribute('data-theme', theme);
  document.getElementById('themeBtn').innerHTML = theme === 'dark' ? ICO_SUN : ICO_MOON;
  readColors();
}
function toggleTheme(){
  const cur = root.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
  const next = cur === 'dark' ? 'light' : 'dark';
  setStoredTheme(next);
  applyTheme(next);
}
document.getElementById('themeBtn').addEventListener('click', toggleTheme);

let COL = {};
function readColors(){
  const cs = getComputedStyle(root);
  COL = {
    ink: cs.getPropertyValue('--ink').trim(),
    line: cs.getPropertyValue('--line').trim(),
    green: cs.getPropertyValue('--green').trim(),
    gold: cs.getPropertyValue('--gold').trim(),
    correct: cs.getPropertyValue('--correct').trim(),
    danger: cs.getPropertyValue('--danger').trim(),
    surface2: cs.getPropertyValue('--surface2').trim()
  };
}

// Ustal motyw startowy: zapisany > preferencje systemowe > jasny (jak na Szpilplacu domyślnie ciemny)
const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
const initialTheme = getStoredTheme() || (prefersDark ? 'dark' : 'light');
applyTheme(initialTheme);

const paddleW = 12, paddleH = 90;
const playerSpeed = 6;
const cpuSpeed = 3.2;
const cpuDeadzone = 30;
const cpuReactionDelay = 6;
const winScore = 3;

/* ── rekordy w localStorage ── */
const REKORD_KEY = 'familock_pong_rekord';
function wczytajRek(){
  try { return JSON.parse(localStorage.getItem(REKORD_KEY)) || { seria:0, gemy:0 }; }
  catch(e){ return { seria:0, gemy:0 }; }
}
function zapiszRek(r){ try { localStorage.setItem(REKORD_KEY, JSON.stringify(r)); } catch(e){} }
let rekord = wczytajRek();
let seria = 0;            // wygrane z rzędu w tej sesji
let nowyRekord = false;

let player = { x: 20, y: H/2 - paddleH/2 };
let cpu = { x: W - 20 - paddleW, y: H/2 - paddleH/2 };

let ball = { x: W/2, y: H/2, r: 8, dx: 5, dy: 3 };
let ballHistory = [];

let scorePlayer = 0, scoreCpu = 0;
let running = false;
let gameOver = false;
let playerWon = false;

// --- Sterowanie klawiaturą ---
const keys = {};
document.addEventListener('keydown', e => { keys[e.key] = true; });
document.addEventListener('keyup', e => { keys[e.key] = false; });

// --- Sterowanie dotykiem: przyciski ---
let touchDir = 0; // -1 gora, 1 dol, 0 stop
function bindHold(el, dir) {
  if (!el) return;
  const start = (e) => { e.preventDefault(); touchDir = dir; };
  const end = (e) => { e.preventDefault(); if (touchDir === dir) touchDir = 0; };
  el.addEventListener('touchstart', start, { passive: false });
  el.addEventListener('touchend', end, { passive: false });
  el.addEventListener('touchcancel', end, { passive: false });
  el.addEventListener('mousedown', start);
  el.addEventListener('mouseup', end);
  el.addEventListener('mouseleave', end);
}
bindHold(document.getElementById('btnUp'), -1);
bindHold(document.getElementById('btnDown'), 1);

// --- Sterowanie dotykiem: przeciąganie palcem po canvasie ---
let dragging = false;
function canvasYToGame(clientY) {
  const rect = canvas.getBoundingClientRect();
  const scale = H / rect.height;
  return (clientY - rect.top) * scale;
}
canvas.addEventListener('touchstart', (e) => {
  dragging = true;
  const y = canvasYToGame(e.touches[0].clientY);
  player.y = Math.max(0, Math.min(H - paddleH, y - paddleH/2));
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchmove', (e) => {
  if (!dragging) return;
  const y = canvasYToGame(e.touches[0].clientY);
  player.y = Math.max(0, Math.min(H - paddleH, y - paddleH/2));
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchend', () => { dragging = false; });

function resetBall(direction) {
  ball.x = W/2;
  ball.y = H/2;
  ball.dx = 5 * direction;
  ball.dy = (Math.random() * 4 - 2) || 2;
  ballHistory = [];
}

function update(dt) {
  if (!running) return;

  if (keys['w'] || keys['W'] || keys['ArrowUp']) player.y -= playerSpeed * dt;
  if (keys['s'] || keys['S'] || keys['ArrowDown']) player.y += playerSpeed * dt;
  if (!dragging && touchDir !== 0) player.y += touchDir * playerSpeed * dt;
  player.y = Math.max(0, Math.min(H - paddleH, player.y));

  ballHistory.push(ball.y);
  if (ballHistory.length > cpuReactionDelay) ballHistory.shift();
  const seenBallY = ballHistory[0];

  const cpuCenter = cpu.y + paddleH/2;
  if (seenBallY < cpuCenter - cpuDeadzone) {
    cpu.y -= cpuSpeed * dt;
  } else if (seenBallY > cpuCenter + cpuDeadzone) {
    cpu.y += cpuSpeed * dt;
  }
  cpu.y = Math.max(0, Math.min(H - paddleH, cpu.y));

  ball.x += ball.dx * dt;
  ball.y += ball.dy * dt;

  if (ball.y - ball.r < 0 || ball.y + ball.r > H) {
    ball.dy *= -1;
    ball.y = Math.max(ball.r, Math.min(H - ball.r, ball.y));
  }

  if (ball.x - ball.r < player.x + paddleW &&
      ball.x - ball.r > player.x &&
      ball.y > player.y && ball.y < player.y + paddleH) {
    ball.dx = Math.abs(ball.dx) * 1.04;
    let hitPos = (ball.y - (player.y + paddleH/2)) / (paddleH/2);
    ball.dy = hitPos * 5.5;
    ball.x = player.x + paddleW + ball.r;
  }

  if (ball.x + ball.r > cpu.x &&
      ball.x + ball.r < cpu.x + paddleW &&
      ball.y > cpu.y && ball.y < cpu.y + paddleH) {
    ball.dx = -Math.abs(ball.dx) * 1.04;
    let hitPos = (ball.y - (cpu.y + paddleH/2)) / (paddleH/2);
    ball.dy = hitPos * 5.5;
    ball.x = cpu.x - ball.r;
  }

  if (ball.x < 0) {
    scoreCpu++;
    updateScore();
    checkWin();
    if (!gameOver) resetBall(1);
  } else if (ball.x > W) {
    scorePlayer++;
    updateScore();
    checkWin();
    if (!gameOver) resetBall(-1);
  }
}

function checkWin() {
  if (scorePlayer >= winScore) {
    running = false;
    gameOver = true;
    playerWon = true;
    seria++;
    rekord.gemy = (rekord.gemy || 0) + 1;
    nowyRekord = seria > (rekord.seria || 0);
    if (nowyRekord) rekord.seria = seria;
    zapiszRek(rekord);
  } else if (scoreCpu >= winScore) {
    running = false;
    gameOver = true;
    playerWon = false;
    seria = 0;
    nowyRekord = false;
  }
  if (gameOver && window.SZPILPLAC_MINIGRA_STATS) {
    window.SZPILPLAC_MINIGRA_STATS.finish({won:playerWon,score:scorePlayer,meta:{cpu:scoreCpu,seria:seria}});
  }
}

function updateScore() {
  document.getElementById('scoreLeft').textContent = scorePlayer;
  document.getElementById('scoreRight').textContent = scoreCpu;
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  ctx.strokeStyle = COL.line;
  ctx.setLineDash([8, 10]);
  ctx.beginPath();
  ctx.moveTo(W/2, 0);
  ctx.lineTo(W/2, H);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle = COL.green;
  ctx.fillRect(player.x, player.y, paddleW, paddleH);
  ctx.fillStyle = COL.danger;
  ctx.fillRect(cpu.x, cpu.y, paddleW, paddleH);

  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.fillStyle = COL.gold;
  ctx.fill();

  if (gameOver) {
    ctx.fillStyle = 'rgba(20,18,14,0.72)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';

    if (playerWon) {
      ctx.fillStyle = COL.correct;
      ctx.font = '700 30px Oswald, Segoe UI, Arial';
      ctx.fillText(nowyRekord ? 'NOWY REKORD!' : 'WYGRANA!', W/2, H/2 - 44);

      ctx.fillStyle = COL.gold;
      ctx.font = 'bold 40px Oswald, Segoe UI, Arial';
      ctx.fillText(scorePlayer + ':' + scoreCpu, W/2, H/2 + 4);

      ctx.fillStyle = '#f3ecda';
      ctx.font = '600 14px Inter, Segoe UI, Arial';
      ctx.fillText('Seria: ' + seria + '  ·  Rekord serii: ' + (rekord.seria || 0), W/2, H/2 + 38);
      ctx.fillStyle = COL.line;
      ctx.font = '600 12px Inter, Segoe UI, Arial';
      ctx.fillText('Rozegranych wygranych: ' + (rekord.gemy || 0), W/2, H/2 + 60);
    } else {
      ctx.fillStyle = COL.danger;
      ctx.font = '700 30px Oswald, Segoe UI, Arial';
      ctx.fillText('PRZEGRANA', W/2, H/2 - 18);

      ctx.fillStyle = '#f3ecda';
      ctx.font = '600 15px Inter, Segoe UI, Arial';
      ctx.fillText('Seria zerwana · rekord: ' + (rekord.seria || 0), W/2, H/2 + 16);
      ctx.font = '600 14px Inter, Segoe UI, Arial';
      ctx.fillText('Jeszcze raz?', W/2, H/2 + 42);
    }
  }
}

let ostatniT = performance.now();
function loop(t) {
  const dtMs = Math.min(50, t - ostatniT);
  ostatniT = t;
  const dt = (dtMs / 1000) * 60;   // 1.0 przy 60 fps — fizyka niezależna od 90/120 Hz
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

document.getElementById('startBtn').addEventListener('click', () => {
  scorePlayer = 0;
  scoreCpu = 0;
  gameOver = false;
  playerWon = false;
  updateScore();
  resetBall(Math.random() > 0.5 ? 1 : -1);
  player.y = H/2 - paddleH/2;
  cpu.y = H/2 - paddleH/2;
  running = true;
});

loop();
</script>


<!-- ── pasek Gierek (powrót + pełny ekran) ── -->
<style>
#gp-bar{position:fixed;top:calc(env(safe-area-inset-top,0px) + 8px);left:8px;z-index:2147483000;
  display:flex;gap:6px;font-family:system-ui,-apple-system,sans-serif;opacity:.55;transition:opacity .2s}
#gp-bar:hover,#gp-bar:active{opacity:1}
#gp-bar a,#gp-bar button{display:flex;align-items:center;justify-content:center;height:32px;min-width:32px;
  padding:0 9px;border:1px solid rgba(255,255,255,.25);border-radius:999px;background:rgba(20,18,14,.72);
  color:#ede5d0;font-size:14px;font-weight:700;line-height:1;text-decoration:none;cursor:pointer;
  -webkit-tap-highlight-color:transparent}
</style>
<div id="gp-bar">
  <a href="gierki.html" title="Wróć do gierek">&#8592;</a>
  <button id="gp-fs" type="button" title="Pełny ekran">&#9974;</button>
</div>
<script>
(function(){
  var el=document.documentElement;
  function pelny(){
    var f=el.requestFullscreen||el.webkitRequestFullscreen;
    if(document.fullscreenElement||document.webkitFullscreenElement){
      (document.exitFullscreen||document.webkitExitFullscreen).call(document);
    } else if(f){ try{ f.call(el,{navigationUI:"hide"}); }catch(e){ try{ f.call(el); }catch(e2){} } }
  }
  document.getElementById("gp-fs").addEventListener("click",function(e){ e.stopPropagation(); pelny(); });
  if(/[?&]fs=1/.test(location.search)){
    var raz=function(){ document.removeEventListener("pointerdown",raz,true); if(!document.fullscreenElement) pelny(); };
    document.addEventListener("pointerdown",raz,true);
  }
})();
</script>

</body>
</html>
