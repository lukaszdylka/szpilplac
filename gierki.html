<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Gierki · Szpilplac</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="description" content="Familockowe gierki: kopalnia, Na Wiyrch, jednoręki bandyta, pong. Zagraj od ręki w przeglądarce.">
<meta property="og:type" content="website">
<meta property="og:title" content="Gierki · Szpilplac">
<meta property="og:description" content="Familockowe gierki — zagraj od ręki.">
<meta property="og:image" content="https://szpilplac.familock.pl/og-image.svg">
<script src="config.js?v=13"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;600;800&display=swap&subset=latin,latin-ext" rel="stylesheet">
<style>
:root{
  --tlo:#12100d; --karta:#1e1a15; --karta2:#272118;
  --ink:#ede5d0; --ink2:#9a907a; --linia:#3d3629;
  --zielony:#4a9a6a; --zloty:#d4a04a; --czerwony:#d76a4f;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%}
body{min-height:100dvh;background:
   radial-gradient(1100px 500px at 50% -10%, #221d16 0%, transparent 60%), var(--tlo);
  color:var(--ink);font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased;
  padding:0 16px 44px;display:flex;flex-direction:column;align-items:center}
a{color:inherit;text-decoration:none}
header,main,footer{width:100%;max-width:860px}
header{padding:20px 0 6px}
.back{font-size:12px;font-weight:700;color:var(--zielony)}
h1{font-family:Oswald;font-size:clamp(30px,9vw,44px);text-transform:uppercase;letter-spacing:.05em;
  margin:6px 0 4px;line-height:1}
.sub{color:var(--ink2);font-size:13px;margin-bottom:18px}

.siatka{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:640px){.siatka{grid-template-columns:1fr 1fr}}

.karta{position:relative;display:flex;gap:14px;align-items:center;padding:16px;
  background:linear-gradient(160deg,var(--karta2),var(--karta));
  border:1px solid var(--linia);border-radius:16px;overflow:hidden;
  transition:transform .12s ease,border-color .12s ease,box-shadow .12s ease}
.karta:hover{transform:translateY(-2px);border-color:var(--zloty);
  box-shadow:0 18px 36px -22px rgba(0,0,0,.9)}
.karta:active{transform:translateY(0)}
.karta::after{content:"";position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(90deg,transparent 70%,rgba(212,160,74,.05))}
.ico{flex:none;width:58px;height:58px;border-radius:14px;display:flex;align-items:center;justify-content:center;
  font-size:29px;background:#0f0d0a;border:1px solid var(--linia)}
.txt{flex:1;min-width:0}
.txt h2{font-family:Oswald;font-size:21px;text-transform:uppercase;letter-spacing:.03em;margin:0 0 3px;line-height:1.1}
.txt p{margin:0;font-size:12.5px;color:var(--ink2);line-height:1.4}
.meta{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap}
.pill{font-size:9.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
  padding:3px 8px;border-radius:999px;border:1px solid var(--linia);color:var(--ink2)}
.pill.gra{color:var(--zielony);border-color:var(--zielony)}
.pill.prop{color:var(--zloty);border-color:var(--zloty)}
.graj{flex:none;align-self:center;font-family:Oswald;font-size:13px;text-transform:uppercase;letter-spacing:.06em;
  padding:8px 14px;border-radius:999px;background:var(--zielony);color:#fff}

.sep{display:flex;align-items:center;gap:10px;margin:22px 0 12px;color:var(--ink2);
  font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase}
.sep::before,.sep::after{content:"";flex:1;height:1px;background:var(--linia)}

footer{margin-top:28px;text-align:center;color:var(--ink2);font-size:12px;line-height:1.9}
footer a{color:var(--zielony);font-weight:700}
.made{opacity:.6}
</style>
</head>
<body>

<header>
  <a class="back" href="index.html">← Szpilplac</a>
  <h1>Gierki</h1>
  <div class="sub">Familockowe szpile na jeden raz — klikasz i grasz.</div>
</header>

<main>
  <div class="siatka" id="siatka"></div>
  <div id="zBazy"></div>
</main>

<footer>
  <a href="index.html">Szpilplac</a> · <a href="https://www.familock.pl" target="_blank" rel="noopener">Familock</a><br>
  <span class="made">Made in Świyntochłowice</span>
</footer>

<script>
"use strict";

/* ══ LISTA GIEREK — dopisujesz tu nową i tyle ══════════════════════════
   plik      — nazwa pliku w repo
   pelny     — true: otwiera się od razu na pełnym ekranie (po pierwszym dotknięciu)
   wynik     — co pokazuje plakietka (rekord trzymany w localStorage danej gry)
   ukryta    — true: nie pokazuje się na liście, ale link działa (tablet w roomie)
*/
var GRY = [
  { plik:"kopalnia.html",  ikona:"⛏️", tytul:"Starzik w kopalni",
    opis:"Zbierz cały wyngiel, wal kilofem we fledermausy, pilnuj metanu i wjedź szolą na wiyrch. Liczy się czas szychty.",
    wynik:"Rekord czasu", pelny:true },

  { plik:"na-wiyrch.html", ikona:"🏚️", tytul:"Na Wiyrch",
    opis:"Skacz po balkonach familoka coraz wyżej. Combo, przyspieszenie, jeden fałszywy krok i lecisz w dół.",
    wynik:"Rekord punktów", pelny:true },

  { plik:"bandyta.html",   ikona:"🎰", tytul:"Jednoręki bandyta",
    opis:"Pięć rund po trzy kręcenia. Trzymaj powtórki i składaj układy — sztyry take same to setka.",
    wynik:"Rekord punktów", pelny:true },

  { plik:"pong.html",      ikona:"🏓", tytul:"Pong",
    opis:"Klasyk do trzech punktów. Wygrywaj pod rząd i bij rekord serii.",
    wynik:"Rekord serii", pelny:true }
];

/* ══ opcjonalnie: dociąga też gierki wrzucone przez panel admina ══ */
var Z_BAZY = true;

/* ───────────────────────────────────────────────────────────────── */
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(c){
  return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]; }); }

function kafelek(g){
  var href = g.plik;
  if(g.pelny) href += (href.indexOf("?")>=0 ? "&" : "?")+"fs=1";
  return '<a class="karta" href="'+esc(href)+'">'+
    '<div class="ico">'+esc(g.ikona||"🎮")+'</div>'+
    '<div class="txt"><h2>'+esc(g.tytul)+'</h2><p>'+esc(g.opis||"")+'</p>'+
      '<div class="meta">'+(g.wynik?'<span class="pill gra">'+esc(g.wynik)+'</span>':'')+
      (g.pelny?'<span class="pill">Pełny ekran</span>':'')+'</div></div>'+
    '<div class="graj">Graj</div></a>';
}

document.getElementById("siatka").innerHTML =
  GRY.filter(function(g){ return !g.ukryta; }).map(kafelek).join("");

/* ── gierki z Supabase (panel admina) ── */
if(Z_BAZY){
  var URL_  = (window.SZPILPLAC_CONFIG && window.SZPILPLAC_CONFIG.SUPABASE_URL) || "";
  var ANON_ = (window.SZPILPLAC_CONFIG && window.SZPILPLAC_CONFIG.SUPABASE_ANON_KEY) || "";
  if(URL_ && ANON_){
    fetch(URL_+"/rest/v1/szpilplac_minigry?select=slug,tytul,opis,ikona,kategoria,typ,url,pelny&opublikowana=eq.true&order=kolejnosc.asc",
      { headers:{ apikey:ANON_, Authorization:"Bearer "+ANON_ } })
      .then(function(r){ return r.ok ? r.json() : []; })
      .then(function(rows){
        if(!rows || !rows.length) return;
        document.getElementById("zBazy").innerHTML =
          +
          rows.map(function(r){
            return kafelek({ plik:(r.typ==="link"&&r.url)?r.url:("minigra.html?g="+encodeURIComponent(r.slug)),
                             ikona:r.ikona, tytul:r.tytul, opis:r.opis, pelny:!!r.pelny });
          }).join("")+'</div>';
      }).catch(function(){});
  }
}
</script>
</body>
</html>
