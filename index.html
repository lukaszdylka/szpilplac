<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="description" content="Codzienne familockowe gry i zagadki z Familocka.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;600;800&display=swap&subset=latin,latin-ext" rel="stylesheet">
<style>
:root{--bg:#f0e8d4;--surface:#fbf7ee;--surface2:#f3ecda;--ink:#23201a;--ink2:#6a6150;--line:#c9bfa6;--green:#2f4a39;--gold:#bf8a3a;--correct:#3f8a5a;--sh:0 6px 18px -10px rgba(35,32,26,.4)}
[data-theme=dark]{--bg:#161310;--surface:#262018;--surface2:#2e2820;--ink:#ede5d0;--ink2:#9a907a;--line:#3d3629;--green:#4a7a56;--gold:#d4a04a;--correct:#4a9a6a}
*{box-sizing:border-box;transition:background-color .2s,color .2s,border-color .2s}html,body{margin:0;min-height:100%}body{font-family:"Inter",system-ui,sans-serif;color:var(--ink);background:var(--bg);display:flex;flex-direction:column;align-items:center;padding:0 16px 32px;min-height:100vh}button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}a{color:inherit;text-decoration:none}:focus-visible{outline:3px solid var(--gold);outline-offset:2px;border-radius:6px}
header{width:100%;max-width:480px;padding-top:20px}.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}.site-name{font-family:"Oswald";font-size:clamp(28px,9vw,42px);font-weight:700;text-transform:uppercase;color:var(--ink);line-height:1}.site-sub{font-size:12px;color:var(--ink2);margin-top:3px}.controls{display:flex;gap:6px;align-items:center}.lang-tog{display:flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:var(--surface2)}.lang-tog button{font-size:11px;font-weight:700;padding:5px 10px;color:var(--ink2)}.lang-tog button.on{background:var(--green);color:#fff}.icon-btn{width:32px;height:32px;border-radius:999px;border:1px solid var(--line);background:var(--surface2);display:flex;align-items:center;justify-content:center;color:var(--ink2)}
main{width:100%;max-width:480px;display:flex;flex-direction:column;gap:9px}.game-link{display:flex;align-items:center;gap:14px;padding:13px 15px;background:var(--surface);border:1px solid var(--line);border-radius:12px;box-shadow:var(--sh)}.game-link:hover{transform:translateY(-1px);box-shadow:0 10px 24px -10px rgba(35,32,26,.45)}.game-link.soon{opacity:.5;cursor:default}.game-icon{flex:none;width:42px;height:42px;border-radius:9px;border:1px solid var(--line);background:var(--surface2);display:flex;align-items:center;justify-content:center;color:var(--ink)}.lbl{flex:1;min-width:0}.lbl .name{font-family:"Oswald";font-size:19px;text-transform:uppercase;letter-spacing:.02em;line-height:1}.lbl .desc{font-size:12px;color:var(--ink2);margin-top:2px}.badge{font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:4px 9px;border-radius:999px;white-space:nowrap}.badge.live{background:var(--correct);color:#fff}.badge.done{color:var(--correct);border:1px solid var(--correct)}.badge.soon{background:var(--surface2);color:var(--ink2);border:1px solid var(--line)}.badge.week{background:var(--gold);color:#fff}.section-sep{display:flex;align-items:center;gap:10px;margin:6px 0 3px}.section-sep span{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink2);white-space:nowrap}.section-sep:before,.section-sep:after{content:"";flex:1;height:1px;background:var(--line)}.ext-link{display:flex;align-items:center;gap:14px;padding:12px 15px;background:var(--surface2);border:1px solid var(--line);border-radius:12px}.ext-icon{flex:none;width:42px;height:42px;border-radius:9px;border:1px solid var(--line);background:var(--bg);display:flex;align-items:center;justify-content:center;color:var(--ink2)}.ext-lbl{flex:1}.ext-lbl .name{font-family:"Oswald";font-size:17px;text-transform:uppercase}.ext-lbl .desc{font-size:11.5px;color:var(--ink2)}footer{width:100%;max-width:480px;text-align:center;color:var(--ink2);font-size:12px;margin-top:22px;line-height:1.8}footer a{color:var(--green);font-weight:600}
</style>
</head>
<body>
<header><div class="topbar"><div><div class="site-name">Szpilplac</div><div class="site-sub" id="sub"></div></div><div class="controls"><div class="lang-tog" role="group"><button id="lPl" class="on">PL</button><button id="lSzl">ŚL</button></div><button class="icon-btn" id="themeBtn" title="Zmień motyw"></button></div></div></header>
<main><div id="games"></div><div class="section-sep" id="sepLabel"><span>Familock</span></div><a class="ext-link" href="https://www.familock.pl" target="_blank" rel="noopener"><div class="ext-icon">⌂</div><div class="ext-lbl"><div class="name" id="er-name">Escape Room Familock</div><div class="desc" id="er-desc">Świętochłowice, zarezerwuj pokój</div></div><div>↗</div></a><a class="ext-link" href="https://gra.familock.pl" target="_blank" rel="noopener"><div class="ext-icon">▣</div><div class="ext-lbl"><div class="name" id="game-name">Starzik: TheSzpil</div><div class="desc" id="game-desc">Gra point and click online</div></div><div>↗</div></a></main>
<footer><a href="https://dylka.pl" target="_blank" rel="noopener">Łukasz Dyłka</a></footer>
<script>
"use strict";
var LK="familock_lang",TK="szpilplac_theme";var store=(function(){var m={},ok=false;try{localStorage.setItem("__t","1");localStorage.removeItem("__t");ok=true}catch(e){}return{get:function(k){try{return ok?localStorage.getItem(k):(m[k]||null)}catch(e){return m[k]||null}},set:function(k,v){try{ok?localStorage.setItem(k,v):(m[k]=v)}catch(e){m[k]=v}}}})();
var ICO={sun:'☀',moon:'☾',word:'▤',lock:'▣',conn:'▦',sort:'↕'};var theme=store.get(TK)||"light";function applyTheme(){document.documentElement.setAttribute("data-theme",theme);document.getElementById("themeBtn").textContent=theme==="dark"?ICO.moon:ICO.sun}document.getElementById("themeBtn").addEventListener("click",function(){theme=theme==="light"?"dark":"light";store.set(TK,theme);applyTheme()});applyTheme();
var GAME_TILES={slowko:{active:true,href:"slowko.html"},klodka:{active:true,href:"klodka.html"},zorta:{active:true,href:"zorta.html",period:"week"},cuzamen:{active:false,href:"cuzamen.html"}};function gameHref(id){var g=GAME_TILES[id];return g&&g.active?g.href:null}
var lang=store.get(LK)||"pl";var S={pl:{sub:"Codzienne familockowe gry i zagadki",live:"Dzisiaj",week:"Tydzień",done:"Zagrane",soon:"Wkrótce",sep:"Familock",erName:"Escape Room Familock",erDesc:"Świętochłowice, zarezerwuj pokój",gameName:"Starzik: TheSzpil",gameDesc:"Gra point and click online",games:[{id:"slowko",ico:ICO.word,name:"Słōwko",desc:"Zgadnij śląskie słowo dnia!"},{id:"klodka",ico:ICO.lock,name:"Kłōdka",desc:"Zgadnij 4-cyfrowy kod."},{id:"zorta",ico:ICO.sort,name:"Zorta",desc:"Ułóż pięć śląskich rzeczy w kolejności."},{id:"cuzamen",ico:ICO.conn,name:"Cuzamen Szpil",desc:"Znajdź cztery grupy po cztery słowa."}]},szl:{sub:"Codzienne familockowe szpile i zagadki",live:"Dzisiej",week:"Tydziyń",done:"Zagrane",soon:"Niydugo",sep:"Familock",erName:"Escape Room Familock",erDesc:"Świyntochłowice, rezerwacyjo",gameName:"Starzik: TheSzpil",gameDesc:"Szpil point and click w internecie",games:[{id:"slowko",ico:ICO.word,name:"Słōwko",desc:"Zgodnij ślōnskie słowo dnia!"},{id:"klodka",ico:ICO.lock,name:"Kłōdka",desc:"Zgodnij 4-cyfrowy kod."},{id:"zorta",ico:ICO.sort,name:"Zorta",desc:"Poukłŏdej piyńć ślōnskich rzeczy po porządku."},{id:"cuzamen",ico:ICO.conn,name:"Cuzamen Szpil",desc:"Znojdź sztyry grupy po sztyry słowa."}]}};
function daysSince(y,m,d){var s=new Date(y,m-1,d),n=new Date();function md(x){return new Date(x.getFullYear(),x.getMonth(),x.getDate())}return Math.floor((md(n)-md(s))/86400000)}var DAY=daysSince(2026,6,23);function parseStored(k){try{return JSON.parse(store.get(k)||"null")}catch(e){return null}}function isFinishedGame(x){if(!x)return false;if(x.status&&x.status!=="playing")return true;if(x.game&&x.game.status&&x.game.status!=="playing")return true;return false}
function playedToday(href){try{if(href==="slowko.html")return isFinishedGame(parseStored("slowko_d"+DAY));if(href==="klodka.html"){var kd1=parseStored("klodka_daily_v1_d"+(DAY+1));if(isFinishedGame(kd1))return true;var kd0=parseStored("klodka_daily_v1_d"+DAY);if(isFinishedGame(kd0))return true;var old=parseStored("klodka_daily_v1");if(old&&(old.day===DAY+1||old.day===DAY))return isFinishedGame(old);return false}if(href==="zorta.html"){var wk=Math.max(0,Math.floor(DAY/7));return isFinishedGame(parseStored("zorta_d"+wk))}if(href==="cuzamen.html"){var cg=parseStored("cuzamen_v1");return !!(cg&&cg.day===DAY&&isFinishedGame(cg))}return false}catch(e){return false}}
function render(){var s=S[lang]||S.pl;document.getElementById("sub").textContent=s.sub;document.getElementById("lPl").className=lang==="pl"?"on":"";document.getElementById("lSzl").className=lang==="szl"?"on":"";var wrap=document.getElementById("games");wrap.innerHTML="";s.games.forEach(function(g){var cfg=GAME_TILES[g.id]||{},href=gameHref(g.id),done=href&&playedToday(href),el=document.createElement(href?"a":"div");el.className="game-link"+(href?"":" soon");if(href)el.href=href;var badge=href?(done?s.done:(cfg.period==="week"?s.week:s.live)):s.soon;var bcls=href?(done?"done":(cfg.period==="week"?"week":"live")):"soon";el.innerHTML='<div class="game-icon">'+g.ico+'</div><div class="lbl"><div class="name">'+g.name+'</div><div class="desc">'+g.desc+'</div></div><div class="badge '+bcls+'">'+badge+'</div>';wrap.appendChild(el)});document.getElementById("sepLabel").querySelector("span").textContent=s.sep;document.getElementById("er-name").textContent=s.erName;document.getElementById("er-desc").textContent=s.erDesc;document.getElementById("game-name").textContent=s.gameName;document.getElementById("game-desc").innerHTML=s.gameDesc}
function refreshHome(){render()}document.getElementById("lPl").addEventListener("click",function(){lang="pl";store.set(LK,lang);refreshHome()});document.getElementById("lSzl").addEventListener("click",function(){lang="szl";store.set(LK,lang);refreshHome()});refreshHome();window.addEventListener("pageshow",refreshHome);document.addEventListener("visibilitychange",function(){if(!document.hidden)refreshHome()});window.addEventListener("focus",refreshHome);
</script>
</body>
</html>
