<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Szpilplac · Familock</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon.svg">
<meta name="description" content="Codzienne familockowe gry i zagadki z Familocka.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;600;800&display=swap&subset=latin,latin-ext" rel="stylesheet">
<style>
:root{
  --bg:#f0e8d4;--surface:#fbf7ee;--surface2:#f3ecda;
  --ink:#23201a;--ink2:#6a6150;--line:#c9bfa6;
  --green:#2f4a39;--gold:#bf8a3a;--correct:#3f8a5a;
  --sh:0 6px 18px -10px rgba(35,32,26,.4);
}
[data-theme=light]{--bg:#f0e8d4;--surface:#fbf7ee;--surface2:#f3ecda;--ink:#23201a;--ink2:#6a6150;--line:#c9bfa6;--green:#2f4a39;--gold:#bf8a3a;--correct:#3f8a5a;}
[data-theme=dark]{--bg:#161310;--surface:#262018;--surface2:#2e2820;--ink:#ede5d0;--ink2:#9a907a;--line:#3d3629;--green:#4a7a56;--gold:#d4a04a;--correct:#4a9a6a;}
*{box-sizing:border-box;transition:background-color .2s,color .2s,border-color .2s}
html,body{margin:0;min-height:100%}
body{font-family:"Inter",system-ui,sans-serif;color:var(--ink);background:var(--bg);
  -webkit-font-smoothing:antialiased;display:flex;flex-direction:column;
  align-items:center;padding:0 16px 32px;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{color:inherit;text-decoration:none}
:focus-visible{outline:3px solid var(--gold);outline-offset:2px;border-radius:6px}

header{width:100%;max-width:480px;padding-top:20px}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.site-name{font-family:"Oswald";font-size:clamp(28px,9vw,42px);font-weight:700;
  letter-spacing:.01em;text-transform:uppercase;color:var(--ink);line-height:1}
.site-sub{font-size:12px;color:var(--ink2);margin-top:3px}
.controls{display:flex;gap:6px;align-items:center}
.lang-tog{display:flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:var(--surface2)}
.lang-tog button{font-size:11px;font-weight:700;padding:5px 10px;color:var(--ink2)}
.lang-tog button.on{background:var(--green);color:#fff}
.icon-btn{width:32px;height:32px;border-radius:999px;border:1px solid var(--line);
  background:var(--surface2);display:flex;align-items:center;justify-content:center;color:var(--ink2)}
.icon-btn:hover{background:var(--surface);color:var(--ink)}
.icon-btn svg{display:block;flex:none}

main{width:100%;max-width:480px;display:flex;flex-direction:column;gap:9px}
.game-link{display:flex;align-items:center;gap:14px;padding:13px 15px;
  background:var(--surface);border:1px solid var(--line);border-radius:12px;
  box-shadow:var(--sh);transition:transform .1s,box-shadow .1s}
.game-link:hover{transform:translateY(-1px);box-shadow:0 10px 24px -10px rgba(35,32,26,.45)}
.game-link.soon{opacity:.5;cursor:default}
.game-link.soon:hover{transform:none;box-shadow:var(--sh)}
.game-icon{flex:none;width:42px;height:42px;border-radius:9px;border:1px solid var(--line);
  background:var(--surface2);display:flex;align-items:center;justify-content:center;color:var(--ink)}
.game-icon svg{display:block}
.lbl{flex:1;min-width:0}
.lbl .name{font-family:"Oswald";font-size:19px;text-transform:uppercase;letter-spacing:.02em;line-height:1}
.lbl .desc{font-size:12px;color:var(--ink2);margin-top:2px}
.badge{font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
  padding:4px 9px;border-radius:999px;white-space:nowrap}
.badge.live{background:var(--correct);color:#fff}
.badge.done{color:var(--correct);border:1px solid var(--correct)}
.badge.soon{background:var(--surface2);color:var(--ink2);border:1px solid var(--line)}
.section-sep{display:flex;align-items:center;gap:10px;margin:6px 0 3px}
.section-sep span{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--ink2);white-space:nowrap}
.section-sep::before,.section-sep::after{content:"";flex:1;height:1px;background:var(--line)}
.ext-links{display:flex;flex-direction:column;gap:9px}
.ext-link{display:flex;align-items:center;gap:14px;padding:12px 15px;
  background:var(--surface2);border:1px solid var(--line);border-radius:12px;
  transition:transform .1s,box-shadow .1s}
.ext-link:hover{transform:translateY(-1px);box-shadow:0 8px 20px -10px rgba(35,32,26,.35);background:var(--surface)}
.ext-icon{flex:none;width:42px;height:42px;border-radius:9px;border:1px solid var(--line);
  background:var(--bg);display:flex;align-items:center;justify-content:center;color:var(--ink2)}
.ext-icon svg{display:block}
.ext-lbl{flex:1;min-width:0}
.ext-lbl .name{font-family:"Oswald";font-size:17px;text-transform:uppercase;letter-spacing:.02em;line-height:1;color:var(--ink)}
.ext-lbl .desc{font-size:11.5px;color:var(--ink2);margin-top:2px}
.ext-arr{color:var(--ink2);font-size:14px;flex:none}
footer{width:100%;max-width:480px;text-align:center;color:var(--ink2);font-size:12px;margin-top:22px;line-height:1.8}
footer a{color:var(--green);font-weight:600}
footer a:hover{text-decoration:underline}
.footer-sources{margin-top:10px;font-size:11px;color:var(--ink2);opacity:.7;line-height:1.6}
.footer-sources a{color:var(--ink2);font-weight:400}
.footer-sources a:hover{color:var(--green);text-decoration:underline}
.footer-social{margin-top:12px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.footer-social a{display:inline-flex;align-items:center;justify-content:center;gap:6px;
  min-height:32px;padding:7px 11px;border-radius:999px;border:1px solid var(--line);
  background:var(--surface2);color:var(--ink2);font-size:11px;font-weight:700;line-height:1.2}
.footer-social a:hover{background:var(--surface);color:var(--green);text-decoration:none}
.buycoffee{margin-top:10px}
</style>

<body>
<header>
  <div class="topbar">
    <div>
      <div class="site-name">Szpilplac</div>

  <div class="ext-links">
    <a class="ext-link" href="https://www.familock.pl" target="_blank" rel="noopener">
      <div class="ext-icon"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L10 3l7 6.5V17a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M7 18v-6h6v6"/></svg></div>
      <div class="ext-lbl"><div class="name" id="er-name">Escape Room Familock</div><div class="desc" id="er-desc">Świętochłowice — zarezerwuj pokój</div></div>

    </a>

      <div class="ext-icon"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="16" height="11" rx="2"/><path d="M6 10h2m-1-1v2"/><circle cx="13" cy="9.5" r=".7" fill="currentColor" stroke="none"/><circle cx="15" cy="11" r=".7" fill="currentColor" stroke="none"/></svg></div>
      <div class="ext-lbl"><div class="name" id="game-name">Starzik: TheSzpil</div><div class="desc" id="game-desc">Gra point&amp;click online — za darmo</div></div>
      <div class="ext-arr">↗</div>
    </a>

</main>

    </a>

<script>
"use strict";
var LK="familock_lang",TK="szpilplac_theme";
var store=(function(){var m={},ok=false;
  try{localStorage.setItem("__t","1");localStorage.removeItem("__t");ok=true;}catch(e){}
  return{get:function(k){try{return ok?localStorage.getItem(k):(m[k]||null);}catch(e){return m[k]||null;}},
         set:function(k,v){try{ok?localStorage.setItem(k,v):(m[k]=v);}catch(e){m[k]=v;}}};})();
var ICO={
  sun:'<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="8" cy="8" r="3.5"/><line x1="8" y1="0.5" x2="8" y2="2.5"/><line x1="8" y1="13.5" x2="8" y2="15.5"/><line x1="0.5" y1="8" x2="2.5" y2="8"/><line x1="13.5" y1="8" x2="15.5" y2="8"/><line x1="2.57" y1="2.57" x2="3.99" y2="3.99"/><line x1="12.01" y1="12.01" x2="13.43" y2="13.43"/><line x1="13.43" y1="2.57" x2="12.01" y2="3.99"/><line x1="3.99" y1="12.01" x2="2.57" y2="13.43"/></svg>',
  moon:'<svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M13.5 10.5a5.5 5.5 0 01-7.07-7.07A6 6 0 1013.5 10.5z"/></svg>',
  word:'<svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="16" height="12" rx="2"/><line x1="6" y1="8" x2="6" y2="12"/><line x1="6" y1="10" x2="9" y2="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="9" y1="8" x2="9" y2="12"/></svg>',
  lock:'<svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="9" width="12" height="9" rx="2"/><path d="M7 9V6a3 3 0 016 0v3"/><circle cx="10" cy="13.5" r="1.2" fill="currentColor" stroke="none"/></svg>',
  conn:'<svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="7" height="7" rx="1.5"/><rect x="11" y="2" width="7" height="7" rx="1.5"/><rect x="2" y="11" width="7" height="7" rx="1.5"/><rect x="11" y="11" width="7" height="7" rx="1.5"/></svg>',
  sort:'<svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4h10"/><path d="M7 8h6"/><path d="M9 12h2"/><path d="M6 16h8"/><path d="M16 5l2 2 2-2" transform="translate(-2 7)"/></svg>'
};
var THEME_ICONS={light:ICO.sun,dark:ICO.moon};
var theme=store.get(TK)||"light";
function applyTheme(){document.documentElement.setAttribute("data-theme",theme);document.getElementById("themeBtn").innerHTML=THEME_ICONS[theme];}
document.getElementById("themeBtn").addEventListener("click",function(){theme=theme==="light"?"dark":"light";store.set(TK,theme);applyTheme();});
applyTheme();
var GAME_TILES={
  slowko:{active:true, href:"slowko.html"},
  klodka:{active:true, href:"klodka.html"},
  zorta:{active:false, href:"zorta.html"},
  cuzamen:{active:false, href:"cuzamen.html"}
};
function gameHref(id){var g=GAME_TILES[id];return g&&g.active?g.href:null;}
var lang=store.get(LK)||"pl";
var S={
  pl:{sub:"Codzienne familockowe gry i zagadki",live:"Dzisiaj",done:"Zagrane",soon:"Wkrótce",sep:"Familock",erName:"Escape Room Familock",erDesc:"Świętochłowice — zarezerwuj pokój",gameName:"Starzik: TheSzpil",gameDesc:"Gra point&click online — za darmo",
    games:[
      {id:"slowko", ico:ICO.word,name:"Słōwko",desc:"Zgadnij śląskie słowo dnia!"},
      {id:"klodka", ico:ICO.lock,name:"Kłōdka",desc:"Zgadnij 4-cyfrowy kod."},
      {id:"zorta", ico:ICO.sort,name:"Zorta",desc:"Ułóż pięć śląskich rzeczy w kolejności."},
      {id:"cuzamen",ico:ICO.conn,name:"Cuzamen Szpil",desc:"Znajdź cztery grupy po cztery słowa."}
    ]},
  szl:{sub:"Codzienne familockowe szpile i zagadki",live:"Dzisiej",done:"Zagrane",soon:"Niydugo",sep:"Familock",erName:"Escape Room Familock",erDesc:"Świyntochłowice — rezerwacyjo",gameName:"Starzik: TheSzpil",gameDesc:"Szpil point&click w internecie.",
    games:[
      {id:"slowko", ico:ICO.word,name:"Słōwko",desc:"Zgodnij ślōnskie słowo dnia!"},
      {id:"klodka", ico:ICO.lock,name:"Kłōdka",desc:"Zgodnij 4-cyfrowy kod."},
      {id:"zorta", ico:ICO.sort,name:"Zorta",desc:"Poukłŏdej piyńć ślōnskich rzeczy po porządku."},
      {id:"cuzamen",ico:ICO.conn,name:"Cuzamen Szpil",desc:"Znojdź sztyry grupy po sztyry słowa."}
    ]}
};
function daysSince(y,m,d){var s=new Date(y,m-1,d),n=new Date();function md(x){return new Date(x.getFullYear(),x.getMonth(),x.getDate());}return Math.floor((md(n)-md(s))/86400000);}
var DAY=daysSince(2026,6,23);
function parseStored(k){try{return JSON.parse(store.get(k)||"null");}catch(e){return null;}}
function isFinishedGame(x){if(!x)return false;if(x.status&&x.status!=="playing")return true;if(x.game&&x.game.status&&x.game.status!=="playing")return true;return false;}
function playedToday(href){
  try{
    if(href==="slowko.html"){return isFinishedGame(parseStored("slowko_d"+DAY));}
    if(href==="klodka.html"){
      var kd1=parseStored("klodka_daily_v1_d"+(DAY+1));if(isFinishedGame(kd1))return true;
      var kd0=parseStored("klodka_daily_v1_d"+DAY);if(isFinishedGame(kd0))return true;
      var old=parseStored("klodka_daily_v1");if(old&&(old.day===DAY+1||old.day===DAY))return isFinishedGame(old);
      return false;
    }
    if(href==="cuzamen.html"){
      var cg=parseStored("cuzamen_v1");
      return !!(cg&&cg.day===DAY&&isFinishedGame(cg));
    }
    return false;
  }catch(e){return false;}
}
function render(){
  var s=S[lang]||S.pl;
  document.getElementById("sub").textContent=s.sub;
  document.getElementById("lPl").className=lang==="pl"?"on":"";
  document.getElementById("lSzl").className=lang==="szl"?"on":"";
  var wrap=document.getElementById("games");wrap.innerHTML="";
  s.games.forEach(function(g){
    var href=gameHref(g.id);
    var done=href&&playedToday(href);
    var el=document.createElement(href?"a":"div");
    el.className="game-link"+(href?"":" soon");
    if(href)el.href=href;
    var badge=href?(done?s.done:s.live):s.soon;
    var bcls=href?(done?"done":"live"):"soon";
    el.innerHTML='<div class="game-icon">'+g.ico+'</div><div class="lbl"><div class="name">'+g.name+'</div><div class="desc">'+g.desc+'</div></div><div class="badge '+bcls+'">'+badge+'</div>';
    wrap.appendChild(el);
  });
  document.getElementById("sepLabel").querySelector("span").textContent=s.sep;
  document.getElementById("er-name").textContent=s.erName;
  document.getElementById("er-desc").textContent=s.erDesc;
  document.getElementById("game-name").textContent=s.gameName;
  document.getElementById("game-desc").innerHTML=s.gameDesc;
}
function refreshHome(){render();}
document.getElementById("lPl").addEventListener("click",function(){lang="pl";store.set(LK,lang);refreshHome();});
document.getElementById("lSzl").addEventListener("click",function(){lang="szl";store.set(LK,lang);refreshHome();});
refreshHome();
window.addEventListener("pageshow",refreshHome);
document.addEventListener("visibilitychange",function(){if(!document.hidden)refreshHome();});
window.addEventListener("focus",refreshHome);
</script>
</body>
</html>
