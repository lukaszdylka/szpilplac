<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;600;800;900&display=swap&subset=latin,latin-ext" rel="stylesheet">
<style>
:root{
  --bg:#f0e8d4;
  --surface:#fbf7ee;
  --surface2:#f3ecda;
  --ink:#23201a;
  --ink2:#6a6150;
  --line:#c9bfa6;
  --green:#2f4a39;
  --gold:#bf8a3a;
  --correct:#3f8a5a;
  --danger:#b5482f;
  --shadow:0 10px 28px -18px rgba(35,32,26,.55);
}
[data-theme=dark]{
  --bg:#161310;
  --surface:#262018;
  --surface2:#2e2820;
  --ink:#ede5d0;
  --ink2:#aaa18d;
  --line:#3d3629;
  --green:#4a7a56;
  --gold:#d4a04a;
  --correct:#4a9a6a;
  --danger:#d76a4f;
  --shadow:0 10px 30px -18px rgba(0,0,0,.7);
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%}
body{
  min-height:100vh;
  padding:0 16px 30px;
  background:var(--bg);
  color:var(--ink);
  font-family:Inter,system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  display:flex;
  flex-direction:column;
  align-items:center;
}
a{color:inherit;text-decoration:none}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
:focus-visible{outline:3px solid var(--gold);outline-offset:3px;border-radius:8px}
header,main,footer{width:100%;max-width:1040px}
header{padding-top:18px}
.topbar{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:16px;
  margin-bottom:16px;
}
.site-name{
  font-family:Oswald,system-ui,sans-serif;
  font-size:clamp(34px,5vw,48px);
  line-height:.95;
  text-transform:uppercase;
  letter-spacing:.01em;
}
.site-sub{
  margin-top:4px;
  color:var(--ink2);
  font-size:12px;
}
.controls{
  display:flex;
  align-items:center;
  gap:7px;
  padding-top:8px;
}
.lang-tog{
  display:flex;
  overflow:hidden;
  border:1px solid var(--line);
  border-radius:999px;
  background:var(--surface2);
}
.lang-tog button{
  min-width:34px;
  padding:6px 10px;
  color:var(--ink2);
  font-size:11px;
  font-weight:900;
}
.lang-tog button.on{
  background:var(--green);
  color:#fff;
}
.icon-btn{
  width:34px;
  height:34px;
  display:grid;
  place-items:center;
  border:1px solid var(--line);
  border-radius:999px;
  background:var(--surface2);
  color:var(--ink2);
}
.icon-btn:hover{background:var(--surface);color:var(--ink)}
.account-btn{ text-decoration:none; flex:none; }
.account-btn svg{ display:block; }
.account-btn:hover{ color:var(--gold); }

.ranking-btn{
  text-decoration:none;
  flex:none;
}
.ranking-btn svg{
  display:block;
}
.ranking-btn:hover{
  color:var(--gold);
}
.player-menu-wrap{
  position:relative;
  flex:none;
}
.player-menu{
  position:absolute;
  top:calc(100% + 9px);
  right:0;
  z-index:40;
  width:min(285px,calc(100vw - 24px));
  display:none;
  padding:10px;
  border:1px solid var(--line);
  border-radius:17px;
  background:var(--surface);
  color:var(--ink);
  box-shadow:0 22px 55px -30px rgba(0,0,0,.72);
}
.player-menu.open{
  display:block;
}
.player-menu::before{
  content:"";
  position:absolute;
  top:-6px;
  right:13px;
  width:10px;
  height:10px;
  transform:rotate(45deg);
  border-left:1px solid var(--line);
  border-top:1px solid var(--line);
  background:var(--surface);
}
.player-menu-head{
  padding:8px 9px 10px;
  border-bottom:1px solid var(--line);
  margin-bottom:8px;
}
.player-menu-kicker{
  color:var(--gold);
  font-size:10px;
  font-weight:900;
  letter-spacing:.07em;
  text-transform:uppercase;
}
.player-menu-name{
  margin-top:3px;
  font-family:Oswald,system-ui,sans-serif;
  font-size:20px;
  line-height:1.05;
  text-transform:uppercase;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.player-menu-meta{
  margin-top:4px;
  color:var(--ink2);
  font-size:12px;
  font-weight:800;
  line-height:1.35;
}
.player-menu-actions{
  display:grid;
  gap:7px;
}
.player-menu-actions a,
.player-menu-actions button{
  min-height:38px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:9px;
  width:100%;
  padding:9px 11px;
  border:1px solid var(--line);
  border-radius:12px;
  background:var(--surface2);
  color:var(--ink);
  font:inherit;
  font-size:12.5px;
  font-weight:900;
  text-align:left;
}
.player-menu-actions a:hover,
.player-menu-actions button:hover{
  color:var(--green);
  background:var(--surface);
}
.player-menu-actions .gold{
  border-color:var(--gold);
  background:rgba(191,138,58,.14);
}
.player-menu-actions .danger{
  color:var(--danger);
}
.player-menu-actions .danger:hover{
  color:var(--danger);
}
.coffee-btn{
  text-decoration:none;
  flex:none;
}
.coffee-btn svg{
  display:block;
}
.coffee-btn:hover{
  color:var(--gold);
}

main{
  display:flex;
  flex-direction:column;
  gap:16px;
}
.hero{
  position:relative;
  overflow:hidden;
  border:1px solid var(--line);
  border-radius:22px;
  background:
    radial-gradient(circle at 88% 16%, rgba(191,138,58,.10), transparent 24%),
    radial-gradient(circle at 14% 20%, rgba(191,138,58,.14), transparent 28%),
    linear-gradient(135deg,var(--surface),var(--surface2));
  box-shadow:var(--shadow);
  padding:24px 24px 22px;
}
.hero::after{
  content:"";
  position:absolute;
  right:-78px;
  top:-92px;
  width:230px;
  height:230px;
  border-radius:999px;
  border:34px solid rgba(191,138,58,.10);
  pointer-events:none;
}
.kicker{
  position:relative;
  z-index:1;
  color:var(--green);
  font-size:11px;
  font-weight:900;
  letter-spacing:.13em;
  text-transform:uppercase;
  margin-bottom:9px;
}
.hero h1{
  position:relative;
  z-index:1;
  max-width:780px;
  margin:0;
  font-family:Oswald,system-ui,sans-serif;
  font-size:clamp(32px,4.4vw,54px);
  line-height:1.09;
  letter-spacing:.005em;
  text-transform:uppercase;
}
.hero p{
  position:relative;
  z-index:1;
  max-width:700px;
  margin:12px 0 0;
  color:var(--ink2);
  font-size:14px;
  line-height:1.58;
}
.hero-actions{
  position:relative;
  z-index:1;
  display:flex;
  flex-wrap:wrap;
  gap:9px;
  margin-top:17px;
}
.layout{
  display:grid;
  grid-template-columns:minmax(0,1.35fr) minmax(310px,.65fr);
  gap:16px;
  align-items:start;
}
.left,.side{
  display:flex;
  flex-direction:column;
  gap:12px;
  min-width:0;
}
.section-title{
  display:flex;
  align-items:center;
  gap:10px;
  color:var(--ink2);
  font-size:11px;
  font-weight:900;
  letter-spacing:.1em;
  text-transform:uppercase;
}
.section-title::after{
  content:"";
  flex:1;
  height:1px;
  background:var(--line);
}
.games{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:12px;
}
.game-link{
  position:relative;
  min-height:124px;
  overflow:hidden;
  display:flex;
  align-items:flex-start;
  gap:13px;
  padding:16px;
  border:1px solid var(--line);
  border-radius:18px;
  background:var(--surface);
  box-shadow:var(--shadow);
  transition:transform .12s ease,box-shadow .12s ease,background-color .2s ease;
}
.game-link::after{
  content:"";
  position:absolute;
  right:-48px;
  bottom:-58px;
  width:132px;
  height:132px;
  border-radius:999px;
  border:22px solid rgba(191,138,58,.08);
  pointer-events:none;
}
.game-link:hover{
  transform:translateY(-2px);
  box-shadow:0 14px 32px -20px rgba(35,32,26,.65);
}
.game-link.soon{
  opacity:.62;
  cursor:default;
}
.game-link.soon:hover{
  transform:none;
  box-shadow:var(--shadow);
}
.game-icon{
  position:relative;
  z-index:1;
  flex:0 0 48px;
  width:48px;
  height:48px;
  display:grid;
  place-items:center;
  border:1px solid var(--line);
  border-radius:14px;
  background:var(--surface2);
  color:var(--ink);
}
.game-icon svg{display:block}
.game-text{
  position:relative;
  z-index:1;
  min-width:0;
  flex:1;
  padding-right:50px;
}
.game-name{
  font-family:Oswald,system-ui,sans-serif;
  font-size:24px;
  line-height:1;
  letter-spacing:.02em;
  text-transform:uppercase;
}
.game-desc{
  margin-top:6px;
  color:var(--ink2);
  font-size:12.5px;
  line-height:1.36;
}
.badge{
  position:absolute;
  top:12px;
  right:12px;
  z-index:2;
  padding:4px 9px;
  border-radius:999px;
  font-size:10.5px;
  font-weight:900;
  letter-spacing:.05em;
  text-transform:uppercase;
  white-space:nowrap;
}
.badge.live{background:var(--correct);color:#fff}
.badge.done{border:1px solid var(--correct);background:var(--surface);color:var(--correct)}
.badge.soon{border:1px solid var(--line);background:var(--surface2);color:var(--ink2)}
.ext-links{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:12px;
}
.ext-link{
  min-height:78px;
  display:flex;
  align-items:center;
  gap:14px;
  padding:12px 15px;
  border:1px solid var(--line);
  border-radius:16px;
  background:var(--surface2);
  transition:transform .12s ease,background-color .2s ease,box-shadow .12s ease;
}
.ext-link:hover{
  transform:translateY(-1px);
  background:var(--surface);
  box-shadow:0 10px 24px -18px rgba(35,32,26,.45);
}
.ext-icon{
  flex:0 0 42px;
  width:42px;
  height:42px;
  display:grid;
  place-items:center;
  border:1px solid var(--line);
  border-radius:12px;
  background:var(--bg);
  color:var(--ink2);
}
.ext-name{
  font-family:Oswald,system-ui,sans-serif;
  font-size:17px;
  line-height:1;
  letter-spacing:.02em;
  text-transform:uppercase;
}
.ext-desc{
  margin-top:3px;
  color:var(--ink2);
  font-size:11.5px;
  line-height:1.3;
}
.ext-arr{margin-left:auto;color:var(--ink2);font-size:14px}
.player-card,.mini-card{
  border:1px solid var(--line);
  border-radius:20px;
  background:var(--surface);
  box-shadow:var(--shadow);
}
.player-card{padding:16px}
.player-top{
  display:flex;
  align-items:center;
  gap:12px;
}
.player-avatar{
  flex:0 0 66px;
  width:66px;
  height:66px;
  min-width:66px;
  max-width:66px;
  min-height:66px;
  max-height:66px;
  overflow:hidden;
  display:grid;
  place-items:center;
  border:2px solid var(--line);
  border-radius:999px;
  background:var(--surface2);
  isolation:isolate;
}
.player-avatar.has-avatar{border-color:var(--gold)}
.player-avatar-img{
  width:100%;
  height:100%;
  display:block;
  overflow:hidden;
  border-radius:999px;
}
.player-avatar-img>svg{
  width:100%!important;
  height:100%!important;
  max-width:100%!important;
  max-height:100%!important;
  min-width:0!important;
  min-height:0!important;
  display:block!important;
  position:static!important;
  transform:none!important;
}
.player-name{min-width:0;flex:1}
.player-label{
  margin-bottom:4px;
  color:var(--ink2);
  font-size:10.5px;
  font-weight:900;
  letter-spacing:.08em;
  text-transform:uppercase;
}
.player-login{
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  font-family:Oswald,system-ui,sans-serif;
  font-size:25px;
  line-height:1;
  text-transform:uppercase;
}
.player-sub{
  margin-top:5px;
  color:var(--ink2);
  font-size:12.5px;
  line-height:1.4;
}
.player-stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:13px;
}
.player-stat{
  padding:11px;
  border:1px solid var(--line);
  border-radius:14px;
  background:var(--surface2);
}
.player-stat span{
  display:block;
  color:var(--ink2);
  font-size:10px;
  font-weight:900;
  letter-spacing:.06em;
  text-transform:uppercase;
}
.player-stat b{
  display:block;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  margin-top:4px;
  font-family:Oswald,system-ui,sans-serif;
  font-size:23px;
  line-height:1.05;
}
.player-actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:13px;
}
.player-actions.guest{
  grid-template-columns:1fr 1fr;
}
.player-actions.guest .wide{
  grid-column:1/-1;
}
.btn{
  min-height:40px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:9px 12px;
  border-radius:12px;
  background:var(--green);
  color:#fff;
  font-size:12px;
  font-weight:900;
  text-align:center;
}
.btn:hover{filter:brightness(1.05);transform:translateY(-1px)}
.btn.secondary{
  border:1px solid var(--line);
  background:var(--surface2);
  color:var(--ink);
}
.btn.gold{
  background:var(--gold);
  color:#20170d;
}
.mini-card{
  padding:14px;
  background:var(--surface2);
  color:var(--ink2);
  font-size:12.5px;
  line-height:1.45;
}
.mini-card b{
  display:block;
  margin-bottom:4px;
  color:var(--ink);
  font-family:Oswald,system-ui,sans-serif;
  font-size:17px;
  line-height:1;
  letter-spacing:.03em;
  text-transform:uppercase;
}
footer.site-footer{
  margin-top:24px;
  color:var(--ink2);
  font-size:12px;
  text-align:center;
}
.footer-icons{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}
.footer-icons a{
  width:38px;
  height:38px;
  display:grid;
  place-items:center;
  border:1px solid var(--line);
  border-radius:999px;
  background:var(--surface2);
  color:var(--green);
  box-shadow:0 8px 18px -16px rgba(35,32,26,.55);
}
.footer-icons a:hover{
  background:var(--surface);
  color:var(--gold);
  transform:translateY(-1px);
}
.footer-nav{
  display:flex;
  justify-content:center;
  gap:8px;
  flex-wrap:wrap;
  margin-top:12px;
}
.footer-nav a{
  min-height:30px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:6px 12px;
  border:1px solid var(--line);
  border-radius:999px;
  background:rgba(191,138,58,.08);
  color:var(--ink);
  font-size:11px;
  font-weight:900;
}
.footer-nav a:hover{
  background:var(--surface2);
  color:var(--green);
}
.footer-legal{
  display:flex;
  justify-content:center;
  gap:7px;
  flex-wrap:wrap;
  margin-top:12px;
  color:var(--ink2);
  font-size:11px;
  line-height:1.6;
  opacity:.82;
}
.footer-legal a{
  color:var(--ink2);
  font-weight:700;
}
.footer-legal a:hover{
  color:var(--green);
  text-decoration:underline;
}
.modal-scrim{
  position:fixed;
  inset:0;
  z-index:9999;
  display:none;
  align-items:center;
  justify-content:center;
  padding:16px;
  background:rgba(0,0,0,.58);
}
.modal-scrim.open{display:flex}
.modal{
  position:relative;
  width:100%;
  max-width:456px;
  max-height:90vh;
  overflow:auto;
  padding:20px;
  border:1px solid var(--line);
  border-radius:18px;
  background:var(--surface);
  color:var(--ink);
  box-shadow:0 24px 54px -18px rgba(0,0,0,.65);
}
.modal-close{
  position:absolute;
  top:12px;
  right:12px;
  width:34px;
  height:34px;
  display:grid;
  place-items:center;
  border:1px solid var(--line);
  border-radius:999px;
  background:var(--surface2);
  color:var(--ink2);
  font-size:20px;
  line-height:1;
}
.modal h2{
  margin:0 42px 7px 0;
  font-family:Oswald,system-ui,sans-serif;
  font-size:25px;
  line-height:1.04;
  letter-spacing:.03em;
  text-transform:uppercase;
}
.modal-intro{
  margin:0 0 15px;
  color:var(--ink2);
  font-size:13px;
  line-height:1.45;
}
.form{
  display:grid;
  gap:12px;
}
.field{
  display:grid;
  gap:6px;
  font-size:13px;
  font-weight:900;
}
.field small,.small{
  color:var(--ink2);
  font-size:11.5px;
  font-weight:600;
  line-height:1.35;
}
.field input,.field select{
  width:100%;
  padding:12px;
  border:1px solid var(--line);
  border-radius:11px;
  background:#e8eef9;
  color:#000;
  font:inherit;
  font-size:15px;
  outline:none;
}
.field input:focus,.field select:focus{
  border-color:var(--gold);
  box-shadow:0 0 0 3px rgba(191,138,58,.2);
}
.check{
  display:flex;
  align-items:flex-start;
  gap:9px;
  color:var(--ink2);
  font-size:12.5px;
  line-height:1.4;
}
.check input{margin-top:3px;accent-color:var(--green)}
.check a,.modal-links button{
  color:var(--green);
  font-weight:900;
  text-decoration:underline;
}
.submit{
  padding:12px 15px;
  border-radius:12px;
  background:var(--green);
  color:#fff;
  font-weight:900;
  font-size:14px;
}
.submit.gold{
  background:var(--gold);
  color:#20170d;
}
.submit:disabled{opacity:.55;cursor:not-allowed}
.modal-links{
  display:flex;
  align-items:center;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
  margin-top:13px;
  color:var(--ink2);
  font-size:12.5px;
}
.msg{
  display:none;
  margin:0 0 13px;
  padding:11px 13px;
  border:1px solid var(--line);
  border-radius:12px;
  background:var(--surface2);
  color:var(--ink2);
  font-size:13px;
  line-height:1.45;
  white-space:pre-wrap;
}
.msg.ok{
  display:block;
  border-color:var(--correct);
  background:rgba(63,138,90,.1);
  color:var(--correct);
}
.msg.err{
  display:block;
  border-color:var(--danger);
  background:rgba(181,72,47,.1);

function loadScript(src,testFn){
  if(typeof testFn === "function" && testFn())return Promise.resolve();
  return new Promise(function(resolve,reject){
    var existing = Array.prototype.slice.call(document.scripts || []).find(function(s){
      return s.src && s.src.indexOf(src.split("?")[0]) !== -1;
    });
    if(existing){
      if(typeof testFn !== "function" || testFn())return resolve();
      existing.addEventListener("load",resolve,{once:true});
      existing.addEventListener("error",reject,{once:true});
      return;
    }
    var sc = document.createElement("script");
    sc.src = src;
    sc.async = false;
    sc.onload = resolve;
    sc.onerror = function(){reject(new Error("Nie załadowano " + src));};
    document.head.appendChild(sc);
  });
}
async function client(){
  if(sb)return sb;

  if(!cfg.SUPABASE_URL || !cfg.SUPABASE_ANON_KEY)throw new Error(t("configErr"));
  if(!window.supabase)throw new Error(t("libErr"));
  if(window.__SZPILPLAC_SUPABASE_CLIENT){
    sb = window.__SZPILPLAC_SUPABASE_CLIENT;
    return sb;
  }
  sb = window.supabase.createClient(cfg.SUPABASE_URL,cfg.SUPABASE_ANON_KEY,{
    auth:{
      storageKey:AUTH_STORAGE_KEY,
      detectSessionInUrl:false,
      persistSession:true,
      autoRefreshToken:true

  return sb;
}
function readStoredSession(){

  }catch(e){
    return null;
  }
}
async function getSession(){

  try{

    if(r && r.data && r.data.session)return r.data.session;
  }catch(e){}
  var stored = readStoredSession();

    try{
      var s = await c.auth.setSession({
        access_token:stored.access_token,
        refresh_token:stored.refresh_token
      });
      if(s && s.data && s.data.session)return s.data.session;
    }catch(e){}
    return stored;
  }
  return null;
}
function cleanSvg(svg){
  svg = String(svg || "");
  svg = svg.replace(/<script[\s\S]*?<\/script>/gi,"");
  svg = svg.replace(/<style[\s\S]*?<\/style>/gi,"");
  svg = svg.replace(/\son\w+="[^"]*"/gi,"");
  svg = svg.replace(/\son\w+='[^']*'/gi,"");
  svg = svg.replace(/javascript:/gi,"");
  svg = svg.replace(/<svg\b([^>]*)>/i,function(match,attrs){
    attrs = attrs.replace(/\s(width|height|style)="[^"]*"/gi,"");
    attrs = attrs.replace(/\s(width|height|style)='[^']*'/gi,"");
    if(!/preserveAspectRatio=/i.test(attrs))attrs += ' preserveAspectRatio="xMidYMid meet"';
    return "<svg" + attrs + ">";
  });
  return svg;
}

function warsawParts(d){

function setBusy(flag,text){
  busy = !!flag;
  var btn = document.getElementById("authSubmit");
  if(btn)btn.disabled = busy;
  if(text)setMsg(text,"");
}
function niceError(err){
  var p = pack();
  var msg = err && err.message ? err.message : String(err || p.unknown);
  var low = msg.toLowerCase();
  if(low.indexOf("already") !== -1 || low.indexOf("registered") !== -1 || low.indexOf("user already") !== -1)return p.already;
  if(low.indexOf("invalid login credentials") !== -1 || low.indexOf("invalid") !== -1)return p.invalid;
  if(low.indexOf("email not confirmed") !== -1 || low.indexOf("not confirmed") !== -1)return p.emailConfirm;
  if(low.indexOf("duplicate") !== -1 || low.indexOf("unique") !== -1 || low.indexOf("profiles_login_key") !== -1)return p.duplicate;
  return msg;
}
async function checkLoginAvailable(login){
  var c = await client();
  try{
    var res = await c.rpc("is_login_available",{p_login:login});
    if(res.error)return true;
    return res.data === true;
  }catch(e){
    return true;
  }
}
async function ensureProfileAfterSession(data,formData){
  if(!data || !data.user || !data.session)return;
  var c = await client();
  var userId = data.user.id;
  try{
    await c.from("profiles").upsert({
      id:userId,
      login:formData.login,
      display_name:formData.login,
      voivodeship:formData.voivodeship,
      city:formData.city,
      show_in_ranking:true
    },{onConflict:"id"});
  }catch(e){}
  try{
    await c.from("user_consents").insert({
      user_id:userId,
      terms_version:TERMS_VERSION,
      privacy_version:PRIVACY_VERSION,
      marketing_consent:!!formData.marketing_consent,
      marketing_consent_at:formData.marketing_consent ? new Date().toISOString() : null
    });
  }catch(e){}
}
async function submitRegister(){
  var p = pack();
  var login = document.getElementById("regLogin").value.trim();
  var email = document.getElementById("regEmail").value.trim();
  var pass1 = document.getElementById("regPassword").value;
  var pass2 = document.getElementById("regPassword2").value;
  var voiv = opt(document.getElementById("regVoiv").value);
  var city = cleanCity(document.getElementById("regCity").value);
  var terms = document.getElementById("regTerms").checked;
  var marketing = document.getElementById("regMarketing").checked;
  if(!LOGIN_RE.test(login))throw new Error(p.loginBad);
  if(pass1.length < 8)throw new Error(p.passShort);
  if(pass1 !== pass2)throw new Error(p.passDiff);
  if(!terms)throw new Error(p.termsBad);
  setBusy(true,p.creating);
  var available = await checkLoginAvailable(login);
  if(!available)throw new Error(p.duplicate);
  var c = await client();
  var formData = {login:login,voivodeship:voiv,city:city || null,marketing_consent:marketing};
  var res = await c.auth.signUp({
    email:email,
    password:pass1,
    options:{
      emailRedirectTo:window.location.origin + "/konto.html",
      data:{
        login:login,
        display_name:login,
        voivodeship:voiv,
        city:city || null,
        terms_version:TERMS_VERSION,
        privacy_version:PRIVACY_VERSION,
        terms_accepted:true,
        privacy_accepted:true,
        marketing_consent:marketing
      }
    }
  });
  if(res.error)throw res.error;
  await ensureProfileAfterSession(res.data,formData);
  if(res.data && res.data.session){
    setMsg(p.createdSession,"ok");
    setTimeout(function(){window.location.reload();},1200);
  }else{
    setMsg(p.createdMail,"ok");
  }
}
async function submitLogin(){
  var p = pack();
  var email = document.getElementById("loginEmail").value.trim();
  var password = document.getElementById("loginPassword").value;
  setBusy(true,p.logging);
  var c = await client();
  var res = await c.auth.signInWithPassword({email:email,password:password});
  if(res.error)throw res.error;
  setMsg(p.logged,"ok");
  setTimeout(function(){window.location.reload();},900);
}
async function submitReset(){
  var p = pack();
  var email = document.getElementById("resetEmail").value.trim();
  setBusy(true,p.resetting);
  var c = await client();
  var res = await c.auth.resetPasswordForEmail(email,{redirectTo:window.location.origin + "/konto.html"});
  if(res.error)throw res.error;
  setMsg(p.resetSent,"ok");
}
async function submitAuth(){
  if(busy)return;
  var p = pack();
  try{
    if(authMode === "register")await submitRegister();
    else if(authMode === "login")await submitLogin();
    else await submitReset();
  }catch(err){
    var prefix = authMode === "register" ? p.errRegister : (authMode === "login" ? p.errLogin : p.errReset);
    setMsg(prefix + niceError(err),"err");
  }finally{
    setBusy(false);
  }
}
