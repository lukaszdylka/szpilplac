
<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking · Szpilplac · Familock</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="description" content="Ranking graczy Szpilplaca Familock.">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;600;800;900&display=swap&subset=latin,latin-ext" rel="stylesheet">

<style>
:root{
  --bg:#f0e8d4;
  --surface:#fbf7ee;
  --surface2:#f3ecda;
  --ink:#23201a;
  --ink2:#6a6150;
  --line:#c9bfa6;
  --green:#2f4a39;
  --gold:#bf8a3a;
  --correct:#3f8a5a;
  --danger:#b5482f;
  --shadow:0 10px 28px -18px rgba(35,32,26,.55);
}
[data-theme=dark]{
  --bg:#161310;
  --surface:#262018;
  --surface2:#2e2820;
  --ink:#ede5d0;
  --ink2:#aaa18d;
  --line:#3d3629;
  --green:#4a7a56;
  --gold:#d4a04a;
  --correct:#4a9a6a;
  --danger:#d76a4f;
  --shadow:0 10px 30px -18px rgba(0,0,0,.7);
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%}
body{
  min-height:100vh;
  padding:0 16px 40px;
  background:var(--bg);
  color:var(--ink);
  font-family:Inter,system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  display:flex;
  flex-direction:column;
  align-items:center;
}
a{color:inherit;text-decoration:none}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
:focus-visible{outline:3px solid var(--gold);outline-offset:3px;border-radius:8px}
header,main,footer{width:100%;max-width:780px}
header{padding-top:18px}
.topbar{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:16px;
  margin-bottom:16px;
}
.site-name{
  font-family:Oswald,system-ui,sans-serif;
  font-size:clamp(32px,6vw,46px);
  line-height:.95;
  letter-spacing:.01em;
  text-transform:uppercase;
}
.site-sub{
  margin-top:4px;
  color:var(--ink2);
  font-size:12px;
}
.controls{
  display:flex;
  align-items:center;
  gap:7px;
  padding-top:8px;
}
.lang-tog{
  display:flex;
  overflow:hidden;
  border:1px solid var(--line);
  border-radius:999px;
  background:var(--surface2);
}
.lang-tog button{
  min-width:34px;
  padding:6px 10px;
  color:var(--ink2);
  font-size:11px;
  font-weight:900;
}
.lang-tog button.on{
  background:var(--green);
  color:#fff;
}
.icon-btn{
  width:34px;
  height:34px;
  display:grid;
  place-items:center;
  border:1px solid var(--line);
  border-radius:999px;
  background:var(--surface2);
  color:var(--ink2);
}
.icon-btn:hover{background:var(--surface);color:var(--ink)}
main{
  display:flex;
  flex-direction:column;
  gap:14px;
}
.card{
  border:1px solid var(--line);
  border-radius:18px;
  background:var(--surface);
  box-shadow:var(--shadow);
  padding:18px;
}
.card h2{
  margin:0 0 6px;
  color:var(--ink);
  font-family:Oswald,system-ui,sans-serif;
  font-size:24px;
  line-height:1.04;
  letter-spacing:.03em;
  text-transform:uppercase;
}
.intro{
  margin:0 0 14px;
  color:var(--ink2);
  font-size:13px;
  line-height:1.5;
}
.btn{
  min-height:40px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:9px 13px;
  border-radius:12px;
  background:var(--green);
  color:#fff;
  font-size:13px;
  font-weight:900;
  text-align:center;
}
.btn:hover{filter:brightness(1.05);transform:translateY(-1px)}
.btn.secondary{
  border:1px solid var(--line);
  background:var(--surface2);
  color:var(--ink);
}
.btn.gold{
  background:var(--gold);
  color:#20170d;
}
.msg{
  display:none;
  margin:0;
  padding:11px 12px;
  border:1px solid var(--line);
  border-radius:12px;
  background:var(--surface2);
  color:var(--ink2);
  font-size:13px;
  line-height:1.5;
  white-space:pre-wrap;
}
.msg.ok{display:block;border-color:var(--correct);background:rgba(63,138,90,.1);color:var(--correct)}
.msg.err{display:block;border-color:var(--danger);background:rgba(181,72,47,.1);color:var(--danger)}
.account-strip{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
}
.account-name{
  font-family:Oswald,system-ui,sans-serif;
  font-size:20px;
  line-height:1;
  letter-spacing:.02em;
  text-transform:uppercase;
}
.account-meta{
  margin-top:4px;
  color:var(--ink2);
  font-size:12.5px;
  line-height:1.45;
}
.tabs{
  display:flex;
  gap:5px;
  padding:5px;
  border:1px solid var(--line);
  border-radius:999px;
  background:var(--surface2);
  margin:0 0 14px;
}
.tab{
  flex:1;
  padding:9px 8px;
  border-radius:999px;
  color:var(--ink2);
  font-size:12px;
  font-weight:900;
  letter-spacing:.04em;
  text-transform:uppercase;
}
.tab.active{
  background:var(--green);
  color:#fff;
}
.rank-list{
  display:flex;
  flex-direction:column;
  gap:9px;
}
.rank-row{
  display:grid;
  grid-template-columns:40px 48px minmax(0,1fr) auto;
  gap:10px;
  align-items:center;
  padding:10px;
  border:1px solid var(--line);
  border-radius:15px;
  background:var(--surface2);
}
.rank-row.me{
  border-color:var(--gold);
  box-shadow:0 0 0 2px rgba(191,138,58,.18);
}
.place{
  color:var(--green);
  font-family:Oswald,system-ui,sans-serif;
  font-size:21px;
  text-align:center;
}
.rank-avatar{
  width:48px;
  height:48px;
  min-width:48px;
  max-width:48px;
  min-height:48px;
  max-height:48px;
  overflow:hidden;
  display:grid;
  place-items:center;
  border:2px solid var(--line);
  border-radius:999px;
  background:var(--surface);
  isolation:isolate;
}
.rank-row.me .rank-avatar{border-color:var(--gold)}
.rank-avatar-img{
  width:100%;
  height:100%;
  display:block;
  overflow:hidden;
  border-radius:999px;
}
.rank-avatar-img>svg{
  width:100%!important;
  height:100%!important;
  max-width:100%!important;
  max-height:100%!important;
  min-width:0!important;
  min-height:0!important;
  display:block!important;
  position:static!important;
  transform:none!important;
}
.player{min-width:0}
.login{
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  font-family:Oswald,system-ui,sans-serif;
  font-size:18px;
  line-height:1;
  letter-spacing:.02em;
  text-transform:uppercase;
}
.rank-name{
  margin-top:3px;
  color:var(--ink2);
  font-size:11px;
  font-weight:900;
  letter-spacing:.04em;
  text-transform:uppercase;
}
.points{text-align:right}
.points strong{
  display:block;
  color:var(--ink);
  font-family:Oswald,system-ui,sans-serif;
  font-size:23px;
  line-height:1;
}
.points span{
  display:block;
  margin-top:2px;
  color:var(--ink2);
  font-size:11px;
  font-weight:800;
  text-transform:uppercase;
}
.details{
  grid-column:3/5;
  margin-top:2px;
  padding-top:8px;
  border-top:1px solid var(--line);
  color:var(--ink2);
  font-size:11.5px;
  line-height:1.4;
}
.empty{
  padding:20px 10px;
  color:var(--ink2);
  line-height:1.5;
  text-align:center;
}
.empty strong{
  display:block;
  color:var(--ink);
  font-family:Oswald,system-ui,sans-serif;
  font-size:18px;
  text-transform:uppercase;
  margin-bottom:4px;
}
.actions{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:14px;
}
.rules-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
  margin-top:12px;
}
.rule-box{
  border:1px solid var(--line);
  border-radius:14px;
  background:var(--surface2);
  padding:12px;
}
.rule-box.wide{grid-column:1/-1}
.rule-title{
  margin-bottom:7px;
  color:var(--ink);
  font-family:Oswald,system-ui,sans-serif;
  font-size:17px;
  line-height:1;
  letter-spacing:.03em;
  text-transform:uppercase;
}
.rule-text{
  color:var(--ink2);
  font-size:12px;
  line-height:1.45;
}
.rule-list{
  list-style:none;
  padding:0;
  margin:8px 0 0;
  display:grid;
  gap:5px;
}
.rule-list li{
  display:flex;
  justify-content:space-between;
  gap:8px;
  padding-top:5px;
  border-top:1px dashed var(--line);
  color:var(--ink2);
  font-size:12px;
}
.rule-list li:first-child{border-top:0;padding-top:0}
.rule-list span:last-child{
  color:var(--green);
  font-weight:900;
  white-space:nowrap;
}
.rank-track{
  display:flex;
  flex-wrap:wrap;
  gap:7px;
  margin-top:9px;
}
.rank-pill{
  padding:7px 10px;
  border:1px solid var(--line);
  border-radius:999px;
  background:var(--surface);
  color:var(--ink);
  font-size:11px;
  font-weight:900;
}
.rank-pill small{
  margin-left:4px;
  color:var(--ink2);
  font-weight:800;
}
.note{
  margin-top:12px;
  padding:10px 11px;
  border:1px solid rgba(191,138,58,.42);
  border-radius:13px;
  background:rgba(191,138,58,.10);
  color:var(--ink2);
  font-size:12px;
  line-height:1.45;
}
footer{
  margin-top:22px;
  color:var(--ink2);
  font-size:12px;
  text-align:center;
}
.footer-links{
  display:flex;
  justify-content:center;
  gap:8px;
  flex-wrap:wrap;
}
.footer-links a{
  min-height:32px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:7px 11px;
  border:1px solid var(--line);
  border-radius:999px;
  background:var(--surface2);
  color:var(--ink2);
  font-size:11px;
  font-weight:800;
}
.footer-links a:hover{background:var(--surface);color:var(--green)}
@media(max-width:560px){
  body{padding-left:12px;padding-right:12px}
  .topbar{align-items:flex-start}
  .site-name{font-size:34px}
  .rank-row{
    grid-template-columns:34px 42px minmax(0,1fr) auto;
    padding:9px;
    gap:8px;
  }
  .rank-avatar{
    width:42px;
    height:42px;
    min-width:42px;
    max-width:42px;
    min-height:42px;
    max-height:42px;
  }
  .login{font-size:16px}
  .points strong{font-size:20px}
  .details{grid-column:2/5}
  .rules-grid{grid-template-columns:1fr}
}
@media(max-width:390px){
  .rank-row{
    grid-template-columns:30px 38px minmax(0,1fr);
  }
  .points{
    grid-column:3/4;
    text-align:left;
  }
  .details{grid-column:2/4}
}
@media(prefers-reduced-motion:reduce){
  *{transition:none!important}
}
</style>

<header>
  <div class="topbar">
    <div>
      <div class="site-name">Szpilplac</div>
      <div class="site-sub" id="siteSub"></div>
    </div>
    <div class="controls">
      <a class="icon-btn" href="index.html" title="Szpilplac" aria-label="Wróć do Szpilplaca">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L10 3l7 6.5V17a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M7 18v-6h6v6"/></svg>
      </a>
      <div class="lang-tog" role="group" aria-label="Język">
        <button id="langPl" type="button">PL</button>
        <button id="langSzl" type="button">ŚL</button>
      </div>
      <button class="icon-btn" id="themeBtn" type="button" title="Zmień motyw" aria-label="Zmień motyw"></button>
    </div>
  </div>
</header>

<main>
  <div id="globalMsg" class="msg"></div>

  <section class="card">
    <div class="account-strip">
      <div>
        <div class="account-name" id="accountName"></div>
        <div class="account-meta" id="accountMeta"></div>
      </div>
      <a class="btn secondary" href="konto.html" id="accountBtn"></a>
    </div>
  </section>

  <section class="card">
    <h2 id="rankingTitle"></h2>
    <p class="intro" id="rankingIntro"></p>

    <div class="tabs">
      <button class="tab active" type="button" data-ranking="weekly" id="tabWeekly"></button>
      <button class="tab" type="button" data-ranking="all" id="tabAll"></button>
    </div>

    <div id="rankingList" class="rank-list"></div>

    <div class="actions">
      <button class="btn secondary" type="button" id="refreshBtn"></button>
      <a class="btn gold" href="konto.html" id="rankingAccountAction"></a>
    </div>
  </section>

  <section class="card" id="rulesCard"></section>
</main>

<footer>
  <div class="footer-links">
    <a href="index.html" id="footerHome"></a>
    <a href="konto.html" id="footerAccount"></a>
    <a href="https://familock.pl" rel="noopener" id="footerFamilock"></a>
  </div>
</footer>

function lang(){
  try{
    var l = store.get(LK) || document.documentElement.lang || "pl";
    return l === "szl" ? "szl" : "pl";
  }catch(e){
    return "pl";
  }
}
function p(){
  return COPY[lang()] || COPY.pl;
}
function t(key){
  return p()[key] || COPY.pl[key] || key;
}
function esc(v){
  return String(v == null ? "" : v).replace(/[&<>"']/g,function(ch){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch];
  });
}
function applyTheme(){
  var theme = store.get(TK) || "dark";
  document.documentElement.setAttribute("data-theme",theme);
  document.getElementById("themeBtn").innerHTML = theme === "light" ? ICO.sun : ICO.moon;
}
function toggleTheme(){
  var theme = store.get(TK) || "dark";
  store.set(TK,theme === "light" ? "dark" : "light");
  applyTheme();
}
function setMsg(text,type){
  var el = document.getElementById("globalMsg");
  el.textContent = text || "";
  el.className = "msg" + (text ? (" " + (type || "")) : "");
}
function clearMsg(){
  setMsg("");
}
function initSupabase(){
  var cfg = window.SZPILPLAC_CONFIG || {};
  if(!cfg.SUPABASE_URL || !cfg.SUPABASE_ANON_KEY){
    setMsg(t("errConfig"),"err");
    return false;
  }
  if(!window.supabase){
    setMsg(t("errLib"),"err");
    return false;
  }
  if(window.__SZPILPLAC_SUPABASE_CLIENT){
    sb = window.__SZPILPLAC_SUPABASE_CLIENT;
  }else{
    sb = window.supabase.createClient(cfg.SUPABASE_URL,cfg.SUPABASE_ANON_KEY,{
      auth:{storageKey:AUTH_STORAGE_KEY,detectSessionInUrl:false,persistSession:true,autoRefreshToken:true}
    });
    window.__SZPILPLAC_SUPABASE_CLIENT = sb;
  }
  return true;
}
function readStoredSession(){
  try{
    var raw = localStorage.getItem(AUTH_STORAGE_KEY);
    if(!raw)return null;
    var data = JSON.parse(raw);
    return data.currentSession || data.session || data;
  }catch(e){
    return null;
  }
}
async function getSession(){
  try{
    var r = await sb.auth.getSession();
    if(r && r.data && r.data.session)return r.data.session;
  }catch(e){}
  var stored = readStoredSession();
  if(stored && stored.access_token && stored.refresh_token){
    try{
      var s = await sb.auth.setSession({access_token:stored.access_token,refresh_token:stored.refresh_token});
      if(s && s.data && s.data.session)return s.data.session;
    }catch(e){}
    return stored;
  }
  return null;
}
function cleanSvg(svg){
  svg = String(svg || "");
  svg = svg.replace(/<script[\s\S]*?<\/script>/gi,"");
  svg = svg.replace(/<style[\s\S]*?<\/style>/gi,"");
  svg = svg.replace(/\son\w+="[^"]*"/gi,"");
  svg = svg.replace(/\son\w+='[^']*'/gi,"");
  svg = svg.replace(/javascript:/gi,"");
  svg = svg.replace(/<svg\b([^>]*)>/i,function(match,attrs){
    attrs = attrs.replace(/\s(width|height|style)="[^"]*"/gi,"");
    attrs = attrs.replace(/\s(width|height|style)='[^']*'/gi,"");
    if(!/preserveAspectRatio=/i.test(attrs))attrs += ' preserveAspectRatio="xMidYMid meet"';
    return "<svg" + attrs + ">";
  });
  return svg;
}
async function loadAvatars(keys){
  var uniq = Array.from(new Set((keys || []).filter(Boolean)));
  var missing = uniq.filter(function(k){return !avatarMap[k];});
  if(!missing.length)return;
  try{
    var res = await sb.from("szpilplac_avatars").select("id,label,svg").in("id",missing).eq("is_active",true);
    if(!res.error && res.data){
      res.data.forEach(function(a){
        avatarMap[a.id] = {label:a.label || "Avatar",svg:cleanSvg(a.svg)};
      });
    }
  }catch(e){}
}
function avatarHtml(key){
  var av = key && avatarMap[key] ? avatarMap[key] : null;
  var svg = av ? av.svg : PLACEHOLDER_AVATAR;
  return '<div class="rank-avatar"><span class="rank-avatar-img">'+svg+'</span></div>';
}
async function loadAccount(){
  currentUser = null;
  currentProfile = null;
  var session = await getSession();
  if(session && session.user)currentUser = session.user;
  if(!currentUser){
    renderAccount();
    return;
  }
  try{
    var res = await sb.from("profiles").select("id,login,display_name,rank_name,show_in_ranking,avatar_key").eq("id",currentUser.id).single();
    if(!res.error && res.data)currentProfile = res.data;
  }catch(e){}
  renderAccount();
}
function renderAccount(){
  var name = document.getElementById("accountName");
  var meta = document.getElementById("accountMeta");
  var btn = document.getElementById("accountBtn");
  var action = document.getElementById("rankingAccountAction");
  if(currentProfile){
    var login = currentProfile.login || currentProfile.display_name || "gracz";
    var rank = currentProfile.rank_name || "Gorol";
    name.textContent = t("loggedAs").replace("{login}",login);
    meta.textContent = t("loggedMeta").replace("{rank}",rank);
    btn.textContent = t("profileBtn");
    if(action)action.textContent = t("profileBtn");
  }else if(currentUser){
    name.textContent = t("loggedAs").replace("{login}",currentUser.email || "konto");
    meta.textContent = t("loggedMeta").replace("{rank}","Gorol");
    btn.textContent = t("profileBtn");
    if(action)action.textContent = t("profileBtn");
  }else{
    name.textContent = t("guestTitle");
    meta.textContent = t("guestMeta");
    btn.textContent = t("accountBtn");
    if(action)action.textContent = t("createAccount");
  }
}
function renderLang(){
  document.documentElement.lang = lang() === "szl" ? "szl" : "pl";
  document.getElementById("langPl").className = lang() === "pl" ? "on" : "";
  document.getElementById("langSzl").className = lang() === "szl" ? "on" : "";
  document.getElementById("siteSub").textContent = t("sub");
  document.getElementById("rankingTitle").textContent = t("title");
  document.getElementById("rankingIntro").textContent = t("intro");
  document.getElementById("tabWeekly").textContent = t("tabWeekly");
  document.getElementById("tabAll").textContent = t("tabAll");
  document.getElementById("refreshBtn").textContent = t("refresh");
  document.getElementById("footerHome").textContent = t("footerHome");
  document.getElementById("footerAccount").textContent = t("footerAccount");
  document.getElementById("footerFamilock").textContent = t("footerFamilock");
  renderAccount();
  renderRules();
}
function rows(items){
  return '<ul class="rule-list">'+items.map(function(item){
    return '<li><span>'+esc(item[0])+'</span><span>'+esc(item[1])+'</span></li>';
  }).join("")+'</ul>';
}
function renderRules(){
  var c = p();
  var bulletRows = c.bullets.map(function(b){return [b,""];});
  var bulletHtml = '<ul class="rule-list">'+bulletRows.map(function(item){
    return '<li><span>'+esc(item[0])+'</span></li>';
  }).join("")+'</ul>';
  document.getElementById("rulesCard").innerHTML =
    '<h2>'+esc(c.rulesTitle)+'</h2>'+
    '<p class="intro">'+esc(c.rulesLead)+'</p>'+
    '<div class="rules-grid">'+
      '<div class="rule-box wide"><div class="rule-title">'+esc(c.generalTitle)+'</div><div class="rule-text">'+esc(c.generalText)+'</div>'+bulletHtml+'</div>'+
      '<div class="rule-box"><div class="rule-title">'+esc(c.slowkoTitle)+'</div><div class="rule-text">'+esc(c.slowkoText)+'</div>'+rows(c.slowkoRows)+'</div>'+
      '<div class="rule-box"><div class="rule-title">'+esc(c.klodkaTitle)+'</div><div class="rule-text">'+esc(c.klodkaText)+'</div>'+rows(c.klodkaRows)+'</div>'+
      '<div class="rule-box"><div class="rule-title">'+esc(c.rajaTitle)+'</div><div class="rule-text">'+esc(c.rajaText)+'</div>'+rows(c.rajaRows)+'</div>'+
      '<div class="rule-box"><div class="rule-title">'+esc(c.ranksTitle)+'</div><div class="rule-text">'+esc(c.ranksText)+'</div><div class="rank-track">'+c.ranks.map(function(r){return '<span class="rank-pill">'+esc(r[0])+'<small>'+esc(r[1])+'</small></span>';}).join("")+'</div></div>'+
    '</div>'+
    '<div class="note"><b>'+esc(c.rulesTitle)+'</b><br>'+esc(c.note)+'</div>';
}
async function loadRanking(){
  if(!sb)return;
  clearMsg();
  var list = document.getElementById("rankingList");
  list.innerHTML = '<div class="empty">'+esc(t("loading"))+'</div>';
  var view = currentRanking === "weekly" ? "ranking_weekly" : "ranking_all_time";
  var res = await sb.from(view)
    .select("user_id,login,display_name,avatar_key,rank_name,games_played,wins,points,last_play")
    .order("points",{ascending:false})
    .order("wins",{ascending:false})
    .limit(100);
  if(res.error && String(res.error.message || "").indexOf("avatar_key") !== -1){
    res = await sb.from(view)
      .select("user_id,login,display_name,rank_name,games_played,wins,points,last_play")
      .order("points",{ascending:false})
      .order("wins",{ascending:false})
      .limit(100);
  }
  if(res.error){
    list.innerHTML = "";
    setMsg(t("errRanking") + (res.error.message || String(res.error)),"err");
    return;
  }
  var rowsData = res.data || [];
  await loadAvatars(rowsData.map(function(r){return r.avatar_key;}));
  renderRanking(rowsData);
}
function renderRanking(rowsData){
  var list = document.getElementById("rankingList");
  if(!rowsData.length){
    list.innerHTML = '<div class="empty"><strong>'+esc(t("emptyTitle"))+'</strong>'+esc(t("emptyText"))+'</div>';
    return;
  }
  var myId = currentProfile && currentProfile.id ? currentProfile.id : null;
  var myLogin = currentProfile && currentProfile.login ? String(currentProfile.login).toLowerCase() : null;
  list.innerHTML = rowsData.map(function(row,idx){
    var login = row.login || row.display_name || "gracz";
    var isMe = (myId && row.user_id === myId) || (myLogin && String(login).toLowerCase() === myLogin);
    var last = row.last_play ? new Date(row.last_play).toLocaleString("pl-PL") : t("noDate");
    var rank = row.rank_name || "Gorol";
    var points = Number(row.points) || 0;
    var games = Number(row.games_played) || 0;
    var wins = Number(row.wins) || 0;
    return '<div class="rank-row '+(isMe ? "me" : "")+'">'+
      '<div class="place">'+(idx+1)+'</div>'+
      avatarHtml(row.avatar_key)+
      '<div class="player">'+
        '<div class="login">'+esc(login)+(isMe ? ' · '+esc(t("you")) : '')+'</div>'+
        '<div class="rank-name">'+esc(rank)+'</div>'+
      '</div>'+
      '<div class="points"><strong>'+esc(points)+'</strong><span>'+esc(t("points"))+'</span></div>'+
      '<div class="details">'+
        esc(games)+' '+esc(t("games"))+' · '+
        esc(wins)+' '+esc(t("wins"))+' · '+
        esc(t("last"))+': '+esc(last)+
      '</div>'+
    '</div>';
  }).join("");
}
document.getElementById("themeBtn").addEventListener("click",toggleTheme);
document.getElementById("langPl").addEventListener("click",function(){store.set(LK,"pl");renderLang();loadRanking();});
document.getElementById("langSzl").addEventListener("click",function(){store.set(LK,"szl");renderLang();loadRanking();});
document.querySelectorAll(".tab").forEach(function(btn){
  btn.addEventListener("click",function(){
    currentRanking = btn.getAttribute("data-ranking");
    document.querySelectorAll(".tab").forEach(function(b){b.classList.toggle("active",b === btn);});
    loadRanking();
  });
});
document.getElementById("refreshBtn").addEventListener("click",function(){loadAccount().then(loadRanking);});
async function boot(){
  applyTheme();
  renderLang();
  if(!initSupabase())return;
  await loadAccount();
  await loadRanking();
}
console.info("Szpilplac ranking.html v45 clean");
boot();
